server:
  port: 3000
  data_dir: ./data

database:
  path: ./data/deploy.db

jwt:
  secret: "deploy-manager-secret-key-2024"
  expire_hours: 2
  refresh_expire_days: 7

log:
  level: info
  path: ./data/deploy.log

admin:
  username: admin
  password: ""

deploy:
  # 部署日志保留最近几次(0 或不填 = 默认 5)
  log_keep_last: 5
  # 部署日志字节上限,字节数(0 或不填 = 默认 1MB)
  log_max_bytes: 1048576
  # 部署日志块分隔符(用于按块切分保留历史)
  log_separator: "====== 开始更新部署 ======"
