<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础设施 - 部署管理系统</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <style>
body { font-size: 10px; }
.dark .dark\:bg-gray-800 { background-color: #1f2937; }
.dark .dark\:bg-gray-900 { background-color: #111827; }
.dark .dark\:bg-gray-700 { background-color: #374151; }
.dark .dark\:bg-gray-600 { background-color: #4b5563; }
.dark .dark\:bg-blue-500 { background-color: #3b82f6; }
.dark .dark\:bg-blue-900 { background-color: #1e3a5f; }
.dark .dark\:bg-green-500 { background-color: #22c55e; }
.dark .dark\:bg-green-900 { background-color: #14532d; }
.dark .dark\:bg-purple-500 { background-color: #a855f7; }
.dark .dark\:bg-purple-900 { background-color: #3b0764; }
.dark .dark\:bg-red-500 { background-color: #ef4444; }
.dark .dark\:bg-red-900 { background-color: #7f1d1d; }
.dark .dark\:bg-yellow-900 { background-color: #713f12; }
.dark .dark\:text-white { color: #fff; }
.dark .dark\:text-gray-300 { color: #d1d5db; }
.dark .dark\:text-gray-400 { color: #9ca3af; }
.dark .dark\:text-blue-200 { color: #bfdbfe; }
.dark .dark\:text-blue-400 { color: #60a5fa; }
.dark .dark\:text-green-200 { color: #bbf7d0; }
.dark .dark\:text-green-400 { color: #4ade80; }
.dark .dark\:text-purple-200 { color: #e9d5ff; }
.dark .dark\:text-red-200 { color: #fecaca; }
.dark .dark\:text-red-400 { color: #f87171; }
.dark .dark\:text-yellow-200 { color: #fef08a; }
.dark .dark\:border-gray-600 { border-color: #4b5563; }
.dark .dark\:border-gray-700 { border-color: #374151; }
.dark .dark\:divide-gray-700 > * + * { border-color: #374151; }
.dark .dark\:hover\:bg-gray-600:hover { background-color: #4b5563; }
.dark .dark\:hover\:bg-gray-700:hover { background-color: #374151; }
.dark .dark\:hover\:text-gray-200:hover { color: #e5e7eb; }
.dark .dark\:hover\:text-gray-300:hover { color: #d1d5db; }
.dark .dark\:hover\:text-white:hover { color: #fff; }
</style>
    <script defer src="/static/js/alpine.min.js"></script>
    <script>
(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})()
function toggleTheme(){var d=document.documentElement;if(d.classList.contains('dark')){d.classList.remove('dark');localStorage.setItem('theme','light')}else{d.classList.add('dark');localStorage.setItem('theme','dark')}}
</script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .log-output { font-family: 'Consolas', monospace; font-size: 12px; white-space: pre-wrap; }
    </style>

<script>
window.addEventListener('beforeunload',function(){localStorage.removeItem('access_token');localStorage.removeItem('user');});
</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen text-sm" x-data="infrastructureApp()" x-init="init()">
<div class="container mx-auto p-4">
    <div x-show="toastMessage" x-transition class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded shadow-lg text-white font-semibold" :class="toastType === 'success' ? 'bg-green-500' : 'bg-red-500'" x-text="toastMessage" @click="toastMessage = ''"></div>
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center space-x-4">
            <a href="/" class="text-gray-600 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white">🏠 首页</a>
            <a onclick="toggleTheme()" class="cursor-pointer text-gray-600 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white">🌓</a>
            <h1 class="text-sm font-bold text-gray-800 dark:text-white">基础设施</h1>
        </div>
        <div class="space-x-2">
            <button @click="activeTab = 'scenarios'" :class="activeTab === 'scenarios' ? 'bg-blue-600' : 'bg-gray-600'" class="hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm">场景管理</button>
            <button @click="activeTab = 'executions'" :class="activeTab === 'executions' ? 'bg-blue-600' : 'bg-gray-600'" class="hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm">执行记录</button>
            <button @click="activeTab = 'execute'" :class="activeTab === 'execute' ? 'bg-blue-600' : 'bg-gray-600'" class="hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm">批量执行</button>
        </div>
    </div>

    <div x-show="activeTab === 'scenarios'" class="space-y-4">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-semibold text-gray-800 dark:text-white">场景列表</h2>
                <button @click="showAddModal = true" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm">添加场景</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="scenario in scenarios" :key="scenario.id">
                    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded p-4">
                        <h3 class="text-sm font-semibold text-gray-800 dark:text-white" x-text="scenario.name"></h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" x-text="scenario.description || '无描述'"></p>
                        <p class="text-xs text-gray-400 mt-2" x-text="'创建于: ' + new Date(scenario.created_at).toLocaleString()"></p>
                        <div class="flex space-x-2 mt-3">
                            <button @click="editScenario(scenario)" class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded text-sm">编辑</button>
                            <button @click="executeScenario(scenario)" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-sm">执行</button>
                            <button @click="deleteScenario(scenario.id)" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm">删除</button>
                        </div>
                    </div>
                </template>
                <div x-show="scenarios.length === 0" class="col-span-full text-center text-gray-500 py-8">暂无场景，点击添加创建</div>
            </div>
        </div>
    </div>

    <div x-show="activeTab === 'executions'" class="space-y-4">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded p-4">
            <h2 class="text-sm font-semibold text-gray-800 dark:text-white mb-4">执行记录</h2>
            <div class="space-y-3">
                <template x-for="exec in executions" :key="exec.id">
                    <div class="border border-gray-300 dark:border-gray-600 rounded p-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="font-medium text-gray-800 dark:text-white" x-text="'执行 #' + exec.id"></span>
                                <span :class="exec.status === 'completed' ? 'bg-green-500' : 'bg-yellow-500'" class="ml-2 px-2 py-0.5 text-xs text-white rounded" x-text="exec.status"></span>
                            </div>
                            <span class="text-xs text-gray-500" x-text="new Date(exec.created_at).toLocaleString()"></span>
                        </div>
                        <pre x-show="exec.output" class="log-output mt-2 p-2 bg-gray-100 dark:bg-gray-900 rounded text-xs" x-text="exec.output"></pre>
                    </div>
                </template>
                <div x-show="executions.length === 0" class="text-center text-gray-500 py-8">暂无执行记录</div>
            </div>
        </div>
    </div>

    <div x-show="activeTab === 'execute'" class="space-y-4">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded p-4">
            <h2 class="text-sm font-semibold text-gray-800 dark:text-white mb-4">批量执行</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-700 dark:text-gray-300 mb-2">选择场景</label>
                    <select x-model="selectedScenarioId" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white">
                        <option value="">-- 选择场景 --</option>
                        <template x-for="s in scenarios" :key="s.id">
                            <option :value="s.id" x-text="s.name"></option>
                        </template>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-700 dark:text-gray-300 mb-2">选择服务器（可多选）</label>
                    <div class="border border-gray-300 dark:border-gray-600 rounded max-h-48 overflow-y-auto p-2 space-y-1">
                        <template x-for="server in servers" :key="server.id">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" :value="server.id" x-model="selectedServers" class="w-4 h-4">
                                <span class="text-sm text-gray-700 dark:text-gray-300" x-text="server.name + ' (' + server.ip + ')'"></span>
                            </label>
                        </template>
                    </div>
                </div>
            </div>
            <button @click="runExecution()" :disabled="!selectedScenarioId || selectedServers.length === 0" class="mt-4 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white px-6 py-2 rounded">执行</button>
        </div>
    </div>

    <div x-show="showAddModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded p-6 w-full max-w-lg" style="max-height: 80vh; overflow-y: auto;">
            <h3 class="text-sm font-semibold mb-4 text-gray-800 dark:text-white" x-text="editingScenario ? '编辑场景' : '添加场景'"></h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">名称</label>
                    <input type="text" x-model="formData.name" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">描述</label>
                    <input type="text" x-model="formData.description" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">执行命令</label>
                    <textarea x-model="formData.playbook" rows="3" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white font-mono text-sm" placeholder="例如: bash install.sh 或 ./setup.sh"></textarea>
                </div>
                <div>
                    <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">目标服务器（多选）</label>
                    <div class="max-h-40 overflow-y-auto border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 p-2">
                        <template x-for="server in servers" :key="server.id">
                            <label class="flex items-center space-x-2 text-sm text-gray-700 dark:text-gray-300 py-1 cursor-pointer">
                                <input type="checkbox" :value="server.id" x-model="formData.server_ids" class="w-4 h-4">
                                <span x-text="server.name + ' (' + server.ip + ')'"></span>
                            </label>
                        </template>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">安装脚本 (.sh, .py 等)</label>
                        <input type="file" id="scriptFiles" multiple class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white text-sm">
                        <div x-show="editingScenario && scriptFileList.length > 0" class="mt-2 space-y-1">
                            <template x-for="(file, idx) in scriptFileList" :key="idx">
                                <div class="flex items-center justify-between text-xs bg-gray-100 dark:bg-gray-600 px-2 py-1 rounded">
                                    <button type="button" @click="editFile(editingScenario.id, file, 'scripts')" class="truncate max-w-[150px] text-blue-600 hover:text-blue-800 text-left" x-text="file"></button>
                                    <button type="button" @click="deleteFile(editingScenario.id, file, 'scripts')" class="text-red-500 hover:text-red-700 ml-2">✕</button>
                                </div>
                            </template>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">安装包 (.tar.gz, .zip 等)</label>
                        <input type="file" id="packageFiles" multiple class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white text-sm">
                        <div x-show="editingScenario && packageFileList.length > 0" class="mt-2 space-y-1">
                            <template x-for="(file, idx) in packageFileList" :key="idx">
                                <div class="flex items-center justify-between text-xs bg-gray-100 dark:bg-gray-600 px-2 py-1 rounded">
                                    <span x-text="file" class="truncate max-w-[150px]"></span>
                                    <button type="button" @click="deleteFile(editingScenario.id, file, 'packages')" class="text-red-500 hover:text-red-700 ml-2">✕</button>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex justify-end space-x-2 mt-6">
                <button @click="showAddModal = false; editingScenario = null" class="px-4 py-2 text-gray-700 dark:text-gray-300">取消</button>
                <button @click="saveScenario()" class="px-4 py-2 bg-blue-600 text-white rounded">保存</button>
            </div>
        </div>
    </div>

    <div x-show="showEditFileModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded p-6 w-full max-w-3xl max-h-[80vh] flex flex-col">
            <h3 class="text-sm font-semibold mb-4 text-gray-800 dark:text-white">编辑文件: <span x-text="editingFileName"></span></h3>
            <textarea x-model="editingFileContent" class="flex-1 w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white font-mono text-sm resize-none" rows="20"></textarea>
            <div class="flex justify-end space-x-2 mt-4">
                <button @click="showEditFileModal = false" class="px-4 py-2 text-gray-700 dark:text-gray-300">取消</button>
                <button @click="saveFile()" class="px-4 py-2 bg-blue-600 text-white rounded">保存</button>
            </div>
        </div>
    </div>

    <div x-show="showTemplateModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded p-6 w-full max-w-4xl max-h-[90vh] flex flex-col">
            <h3 class="text-sm font-semibold mb-4 text-gray-800 dark:text-white" x-text="editingTemplate ? '编辑模板' : '添加模板'"></h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">名称</label>
                    <input type="text" x-model="templateForm.name" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-700 dark:text-gray-300 mb-1">描述</label>
                    <input type="text" x-model="templateForm.description" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white">
                </div>
                <div class="flex-1 flex flex-col">
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm text-gray-700 dark:text-gray-300">docker-compose.yml 内容</label>
                        <button @click="validateTemplate()" class="text-xs bg-gray-500 hover:bg-gray-600 text-white px-2 py-1 rounded">验证语法</button>
                    </div>
                    <textarea x-model="templateForm.content" class="flex-1 w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white font-mono text-sm resize-none" rows="20" placeholder="version: '3.8'&#10;services:&#10;  web:&#10;    image: nginx"></textarea>
                    <div x-show="templateValidationResult !== null" class="mt-2 text-sm" :class="templateValidationResult?.valid ? 'text-green-600' : 'text-red-600'" x-text="templateValidationResult?.errors?.join(', ')"></div>
                </div>
            </div>
            <div class="flex justify-end space-x-2 mt-6">
                <button @click="showTemplateModal = false; editingTemplate = null" class="px-4 py-2 text-gray-700 dark:text-gray-300">取消</button>
                <button @click="saveTemplate()" class="px-4 py-2 bg-blue-600 text-white rounded">保存</button>
            </div>
        </div>
    </div>

    <div x-show="showExecConfirmModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded p-6 w-full max-w-lg">
            <h3 class="text-sm font-semibold mb-4 text-gray-800 dark:text-white">执行确认</h3>
            <div class="space-y-3">
                <div class="text-gray-700 dark:text-gray-300">
                    <span class="font-semibold">场景:</span> <span x-text="execConfirmScenario?.name"></span>
                </div>
                <div class="text-gray-700 dark:text-gray-300">
                    <span class="font-semibold">目标服务器:</span>
                </div>
                <div class="max-h-40 overflow-y-auto border border-gray-300 dark:border-gray-600 rounded p-2">
                    <template x-for="server in execConfirmServers" :key="server.id">
                        <div class="text-sm text-gray-600 dark:text-gray-400 py-1" x-text="server.name + ' (' + server.ip + ')'"></div>
                    </template>
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button @click="showExecConfirmModal = false" class="px-4 py-2 text-gray-700 dark:text-gray-300">取消</button>
                <button @click="confirmExecute()" class="px-4 py-2 bg-green-600 text-white rounded">确认执行</button>
            </div>
        </div>
    </div>
</div>
<script>
function infrastructureApp() {
    return {
        token: '',
        activeTab: 'scenarios',
        scenarios: [],
        executions: [],
        servers: [],
        showAddModal: false,
        editingScenario: null,
        showEditFileModal: false,
        editingFileName: '',
        editingFileContent: '',
        editingFileType: '',
        toastMessage: '',
        toastType: 'success',
        runningExecution: null,
        selectedScenarioId: '',
        selectedServers: [],
        formData: { name: '', description: '', playbook: '', server_ids: [] },
        scriptFileList: [],
        packageFileList: [],
        templates: [],
        showTemplateModal: false,
        editingTemplate: null,
        templateForm: { name: '', description: '', content: '' },
        templateValidationResult: null,
        showExecConfirmModal: false,
        execConfirmScenario: null,
        execConfirmServers: [],
        init() {
            var _t = localStorage.getItem('access_token');
            if (!_t) { window.location.href = '/login'; return; }
            try { var _p = JSON.parse(atob(_t.split('.')[1])); if (_p.exp * 1000 < Date.now()) { localStorage.removeItem('access_token'); window.location.href = '/login'; return; } } catch(e) {}
            const params = new URLSearchParams(window.location.search);
            this.token = params.get('token');
            if (!this.token) { window.location.href = '/login'; return; }
            this.loadScenarios();
            this.loadTemplates();
            this.loadServers();
            this.loadExecutions();
        },
        getAuthHeader() { return { 'Authorization': 'Bearer ' + this.token }; },
        async loadScenarios() {
            try {
                const res = await fetch('/api/infrastructure/scenarios', { headers: this.getAuthHeader() });
                const data = await res.json();
                if (res.ok) this.scenarios = data.scenarios || [];
            } catch(e) { console.error(e); }
        },
        async loadServers() {
            try {
                const res = await fetch('/api/servers', { headers: this.getAuthHeader() });
                const data = await res.json();
                if (res.ok) this.servers = data.servers || [];
            } catch(e) { console.error(e); }
        },
        async loadExecutions() {
            try {
                const res = await fetch('/api/infrastructure/executions', { headers: this.getAuthHeader() });
                const data = await res.json();
                if (res.ok) this.executions = data.executions || [];
            } catch(e) { console.error(e); }
        },
        async loadTemplates() {
            try {
                const res = await fetch('/api/infrastructure/templates', { headers: this.getAuthHeader() });
                const data = await res.json();
                if (res.ok) this.templates = data.templates || [];
            } catch(e) { console.error(e); }
        },
        showMessage(msg, type = 'success') {
            this.toastMessage = msg;
            this.toastType = type;
            setTimeout(() => this.toastMessage = '', 3000);
        },
        editScenario(scenario) {
            this.editingScenario = scenario;
            let serverIds = [];
            if (scenario.server_ids) {
                try { serverIds = JSON.parse(scenario.server_ids); } catch(e) { serverIds = []; }
            }
            this.formData = { name: scenario.name, description: scenario.description, playbook: scenario.playbook, server_ids: serverIds };
            this.scriptFileList = scenario.script_files ? scenario.script_files.split(',') : [];
            this.packageFileList = scenario.package_files ? scenario.package_files.split(',') : [];
            this.showAddModal = true;
        },
        async saveScenario() {
            if (!this.formData.name) return;
            const url = this.editingScenario ? '/api/infrastructure/scenarios/' + this.editingScenario.id : '/api/infrastructure/scenarios';
            const method = this.editingScenario ? 'PUT' : 'POST';
            try {
                const res = await fetch(url, { method, headers: { ...this.getAuthHeader(), 'Content-Type': 'application/json' }, body: JSON.stringify(this.formData) });
                const data = await res.json();
                if (res.ok) {
                    const scriptInput = document.getElementById('scriptFiles');
                    const packageInput = document.getElementById('packageFiles');
                    
                    if (scriptInput && scriptInput.files.length > 0) {
                        const formData = new FormData();
                        for (let i = 0; i < scriptInput.files.length; i++) {
                            formData.append('files', scriptInput.files[i]);
                        }
                        await fetch('/api/infrastructure/scenarios/' + data.id + '/files?type=scripts', {
                            method: 'POST',
                            headers: this.getAuthHeader(),
                            body: formData
                        });
                    }
                    
                    if (packageInput && packageInput.files.length > 0) {
                        const formData = new FormData();
                        for (let i = 0; i < packageInput.files.length; i++) {
                            formData.append('files', packageInput.files[i]);
                        }
                        await fetch('/api/infrastructure/scenarios/' + data.id + '/files?type=packages', {
                            method: 'POST',
                            headers: this.getAuthHeader(),
                            body: formData
                        });
                    }
                    
                    this.showAddModal = false;
                    this.editingScenario = null;
                    this.formData = { name: '', description: '', playbook: '', server_ids: [] };
                    this.loadScenarios();
                }
            } catch(e) { console.error(e); }
        },
        async deleteScenario(id) {
            if (!confirm('确定要删除此场景吗？')) return;
            try {
                await fetch('/api/infrastructure/scenarios/' + id, { method: 'DELETE', headers: this.getAuthHeader() });
                this.loadScenarios();
            } catch(e) { console.error(e); }
        },
        async deleteFile(scenarioId, filename, fileType) {
            if (!confirm('确定要删除文件 ' + filename + ' 吗？')) return;
            try {
                const res = await fetch('/api/infrastructure/scenarios/' + scenarioId + '/files/' + filename + '?type=' + fileType, { method: 'DELETE', headers: this.getAuthHeader() });
                if (res.ok) {
                    if (fileType === 'scripts') {
                        this.scriptFileList = this.scriptFileList.filter(f => f !== filename);
                    } else {
                        this.packageFileList = this.packageFileList.filter(f => f !== filename);
                    }
                    this.loadScenarios();
                }
            } catch(e) { console.error(e); }
        },
        async editFile(scenarioId, filename, fileType) {
            if (fileType === 'packages') {
                alert('安装包不支持编辑');
                return;
            }
            try {
                const res = await fetch('/api/infrastructure/scenarios/' + scenarioId + '/files/' + filename + '?type=' + fileType, { headers: this.getAuthHeader() });
                const data = await res.json();
                if (res.ok) {
                    this.editingScenario = { id: scenarioId };
                    this.editingFileName = filename;
                    this.editingFileType = fileType;
                    this.editingFileContent = data.content;
                    this.showEditFileModal = true;
                }
            } catch(e) { console.error(e); }
        },
        async saveFile() {
            try {
                const res = await fetch('/api/infrastructure/scenarios/' + this.editingScenario.id + '/files/' + this.editingFileName + '?type=' + this.editingFileType, {
                    method: 'PUT',
                    headers: { ...this.getAuthHeader(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: this.editingFileContent })
                });
                if (res.ok) {
                    this.showEditFileModal = false;
                    this.toastMessage = '保存成功';
                    this.toastType = 'success';
                    setTimeout(() => this.toastMessage = '', 3000);
                }
            } catch(e) { 
                this.toastMessage = '保存失败: ' + e.message;
                this.toastType = 'error';
            }
        },
        editTemplate(tpl) {
            this.editingTemplate = tpl;
            this.templateForm = { name: tpl.name, description: tpl.description, content: tpl.content };
            this.templateValidationResult = null;
            this.showTemplateModal = true;
        },
        async saveTemplate() {
            if (!this.templateForm.name || !this.templateForm.content) {
                this.toastMessage = '请填写名称和内容';
                this.toastType = 'error';
                return;
            }
            try {
                const url = this.editingTemplate ? '/api/infrastructure/templates/' + this.editingTemplate.id : '/api/infrastructure/templates';
                const method = this.editingTemplate ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: { ...this.getAuthHeader(), 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.templateForm)
                });
                if (res.ok) {
                    this.showTemplateModal = false;
                    this.editingTemplate = null;
                    this.templateForm = { name: '', description: '', content: '' };
                    this.loadTemplates();
                    this.toastMessage = '保存成功';
                    this.toastType = 'success';
                    setTimeout(() => this.toastMessage = '', 3000);
                }
            } catch(e) { 
                this.toastMessage = '保存失败: ' + e.message;
                this.toastType = 'error';
            }
        },
        async deleteTemplate(id) {
            if (!confirm('确定要删除此模板吗？')) return;
            try {
                await fetch('/api/infrastructure/templates/' + id, { method: 'DELETE', headers: this.getAuthHeader() });
                this.loadTemplates();
            } catch(e) { console.error(e); }
        },
        async validateTemplate() {
            try {
                const res = await fetch('/api/infrastructure/templates/validate', {
                    method: 'POST',
                    headers: { ...this.getAuthHeader(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: this.templateForm.content })
                });
                const data = await res.json();
                this.templateValidationResult = data;
            } catch(e) { 
                this.templateValidationResult = { valid: false, errors: [e.message] };
            }
        },
        executeScenario(scenario) {
            let serverIds = [];
            if (scenario.server_ids) {
                try { serverIds = JSON.parse(scenario.server_ids); } catch(e) { serverIds = []; }
            }

            if (serverIds.length === 0) {
                this.showMessage('请先编辑场景，选择目标服务器', 'error');
                return;
            }

            // 确保比较的是数字类型
            serverIds = serverIds.map(id => Number(id));

            this.execConfirmScenario = scenario;
            this.execConfirmServers = this.servers.filter(s => serverIds.includes(Number(s.id)));
            this.showExecConfirmModal = true;
        },
        async confirmExecute() {
            if (!this.execConfirmScenario) return;

            const scenario = this.execConfirmScenario;
            const serverIds = this.execConfirmServers.map(s => s.id);
            const serverNames = this.execConfirmServers.map(s => s.name + ' (' + s.ip + ')').join(', ');

            this.showExecConfirmModal = false;
            this.runningExecution = { scenario_id: scenario.id, scenario_name: scenario.name, server_names: serverNames };
            this.runSavedExecution(scenario.id, serverIds);
        },
        async runSavedExecution(scenarioId, serverIds) {
            try {
                const res = await fetch('/api/infrastructure/execute', {
                    method: 'POST',
                    headers: { ...this.getAuthHeader(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario_id: scenarioId, server_ids: serverIds })
                });
                if (res.ok) {
                    this.showMessage('执行已开始', 'success');
                    this.activeTab = 'executions';
                    await this.loadExecutions();
                    this.pollExecutionStatus();
                }
            } catch(e) { console.error(e); this.showMessage('执行失败', 'error'); }
        },
        async runExecution() {
            if (!this.selectedScenarioId || this.selectedServers.length === 0) return;
            try {
                const res = await fetch('/api/infrastructure/execute', {
                    method: 'POST',
                    headers: { ...this.getAuthHeader(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scenario_id: parseInt(this.selectedScenarioId), server_ids: this.selectedServers.map(Number) })
                });
                if (res.ok) {
                    this.activeTab = 'executions';
                    await this.loadExecutions();
                    this.pollExecutionStatus();
                }
            } catch(e) { console.error(e); }
        },
        pollExecutionStatus() {
            const checkInterval = setInterval(async () => {
                await this.loadExecutions();
                const latestExec = this.executions[0];
                if (latestExec && latestExec.status === 'completed') {
                    clearInterval(checkInterval);
                }
            }, 2000);
        }
    }
}
</script>
