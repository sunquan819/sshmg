<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 终端 - 部署管理系统</title>
    <link rel="stylesheet" href="/static/css/xterm.css">
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <style>
body { font-size: 10px; }
.dark .dark\:bg-gray-800 { background-color: #1f2937; }
.dark .dark\:bg-gray-900 { background-color: #111827; }
.dark .dark\:bg-gray-700 { background-color: #374151; }
.dark .dark\:bg-gray-600 { background-color: #4b5563; }
.dark .dark\:bg-blue-500 { background-color: #3b82f6; }
.dark .dark\:bg-blue-900 { background-color: #1e3a5f; }
.dark .dark\:bg-green-500 { background-color: #22c55e; }
.dark .dark\:bg-green-900 { background-color: #14532d; }
.dark .dark\:bg-purple-500 { background-color: #a855f7; }
.dark .dark\:bg-purple-900 { background-color: #3b0764; }
.dark .dark\:bg-red-500 { background-color: #ef4444; }
.dark .dark\:bg-red-900 { background-color: #7f1d1d; }
.dark .dark\:bg-yellow-900 { background-color: #713f12; }
.dark .dark\:text-white { color: #fff; }
.dark .dark\:text-gray-300 { color: #d1d5db; }
.dark .dark\:text-gray-400 { color: #9ca3af; }
.dark .dark\:text-blue-200 { color: #bfdbfe; }
.dark .dark\:text-blue-400 { color: #60a5fa; }
.dark .dark\:text-green-200 { color: #bbf7d0; }
.dark .dark\:text-green-400 { color: #4ade80; }
.dark .dark\:text-purple-200 { color: #e9d5ff; }
.dark .dark\:text-red-200 { color: #fecaca; }
.dark .dark\:text-red-400 { color: #f87171; }
.dark .dark\:text-yellow-200 { color: #fef08a; }
.dark .dark\:border-gray-600 { border-color: #4b5563; }
.dark .dark\:border-gray-700 { border-color: #374151; }
.dark .dark\:divide-gray-700 > * + * { border-color: #374151; }
.dark .dark\:hover\:bg-gray-600:hover { background-color: #4b5563; }
.dark .dark\:hover\:bg-gray-700:hover { background-color: #374151; }
.dark .dark\:hover\:text-gray-200:hover { color: #e5e7eb; }
.dark .dark\:hover\:text-gray-300:hover { color: #d1d5db; }
.dark .dark\:hover\:text-white:hover { color: #fff; }
</style>
    <script>
(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})()
function toggleTheme(){var d=document.documentElement;if(d.classList.contains('dark')){d.classList.remove('dark');localStorage.setItem('theme','light')}else{d.classList.add('dark');localStorage.setItem('theme','dark')}}
</script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="/static/js/alpine.min.js" defer></script>
    <link rel="stylesheet" href="/static/css/codemirror/codemirror.min.css">
    <link rel="stylesheet" href="/static/css/codemirror/monokai.min.css">
    <link rel="stylesheet" href="/static/css/codemirror/foldgutter.min.css">
    <script src="/static/js/codemirror/codemirror.min.js" defer></script>
    <script src="/static/js/codemirror/yaml.min.js" defer></script>
    <script src="/static/js/codemirror/javascript.min.js" defer></script>
    <script src="/static/js/codemirror/python.min.js" defer></script>
    <script src="/static/js/codemirror/shell.min.js" defer></script>
    <script src="/static/js/codemirror/xml.min.js" defer></script>
    <script src="/static/js/codemirror/sql.min.js" defer></script>
    <script src="/static/js/codemirror/foldcode.min.js" defer></script>
    <script src="/static/js/codemirror/foldgutter.min.js" defer></script>
    <script src="/static/js/codemirror/indent-fold.min.js" defer></script>
    <script src="/static/js/codemirror/comment-fold.min.js" defer></script>
    <style>
        .file-item { cursor: pointer; padding: 4px 8px; }
        .file-item:hover { background-color: rgba(255,255,255,0.1); }
        .file-item.active { background-color: rgba(59,130,246,0.3); }
        .xterm-viewport::-webkit-scrollbar { width: 8px; }
        .xterm-viewport::-webkit-scrollbar-track { background: #1f2937; }
        .xterm-viewport::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .scrollbar-always::-webkit-scrollbar { height: 8px; }
        .scrollbar-always::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-always::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; min-height: 8px; }
    </style>

<script>
window.addEventListener('beforeunload',function(){localStorage.removeItem('access_token');localStorage.removeItem('user');});
</script>
</head>
<body class="bg-gray-900 h-screen overflow-hidden text-sm" x-data="terminalApp()" x-init="init()">
<div class="h-full flex flex-col">
    <header class="bg-gray-800 text-white px-4 py-2 flex justify-between items-center border-b border-gray-700 relative">
        <div class="flex items-center space-x-4">
            <h1 class="text-sm font-semibold">
                <svg x-show="osType === 'windows'" class="w-4 h-4 text-blue-400" fill="currentColor" viewBox="0 0 24 24"><path d="M0 3.449L9.75 2.1v9.451H0V3.449zm10.949-1.651L24 0v11.4H10.949V1.798zm-10.949 12.9l9.75 1.35v9.503H0V14.699zm10.949 1.35l13.051.301v10.05l-13.051.3v-10.65z"/></svg>
                <svg x-show="osType !== 'windows'" class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg> Web 终端
            </h1>
            <span id="connectionStatus" class="text-xs text-yellow-400">未连接</span>
        </div>
        <div id="centerMessage" class="hidden absolute left-1/2 transform -translate-x-1/2 text-sm px-4 py-1 rounded bg-gray-700 text-white"></div>
        <div class="flex items-center space-x-4">
            <div x-show="uploading" class="flex items-center space-x-2">
                <span class="text-xs" x-text="downloadMode ? '下载中...' : '上传中...'"></span>
                <template x-if="!downloadMode">
                    <div class="flex items-center space-x-2">
                        <div class="w-24 h-2 bg-gray-600 rounded overflow-hidden">
                            <div id="uploadProgress" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
                        </div>
                        <span id="uploadPercent" class="text-xs">0%</span>
                    </div>
                </template>
                <template x-if="downloadMode">
                    <svg class="animate-spin h-4 w-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </template>
            </div>
            <button @click="goHome()" class="text-gray-400 hover:text-white text-sm px-2">🏠主页</button>
            <a onclick="toggleTheme()" class="cursor-pointer text-gray-400 hover:text-white text-sm px-2">🌓</a>
            <a :href="'/terminal-logs?token=' + token" class="text-gray-400 hover:text-white text-sm px-2">📋日志</a>
            <button @click="showNotes = false; showCommands = false; showSessionHistory = false" :class="!showNotes && !showCommands && !showSessionHistory ? 'text-blue-400' : 'text-gray-400'" class="text-gray-400 hover:text-white text-sm px-2">📁文件</button>
            <button @click="showNotes = true; showCommands = false; showSessionHistory = false; activePanel = 'notes'" :class="showNotes && activePanel === 'notes' ? 'text-blue-400' : 'text-gray-400'" class="text-gray-400 hover:text-white text-sm px-2">📝笔记</button>
            <button @click="showCommands = true; showNotes = false; showSessionHistory = false; activePanel = 'commands'" :class="showCommands && activePanel === 'commands' ? 'text-blue-400' : 'text-gray-400'" class="text-gray-400 hover:text-white text-sm px-2">⌨️命令</button>
            <button @click="showSessionHistory = true; showNotes = false; showCommands = false; activePanel = 'history'" :class="showSessionHistory && activePanel === 'history' ? 'text-blue-400' : 'text-gray-400'" class="text-gray-400 hover:text-white text-sm px-2">📜当前历史</button>
            <button @click="logout()" class="text-gray-400 hover:text-red-400 text-sm px-2">🚪退出</button>
            <button @click="toggleFullscreen()" class="text-gray-400 hover:text-white text-sm px-2">全屏</button>
        </div>
    </header>
    <div class="flex-1 flex overflow-hidden">
        <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col">
            <div class="p-3 border-b border-gray-700">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-sm font-semibold text-gray-300">服务器列表</h2>
                </div>
                <select x-model="selectedGroup" @change="filterServersByGroup()" class="w-full bg-gray-700 text-white text-xs px-2 py-1 rounded border border-gray-600">
                    <option value="">全部分组</option>
                    <template x-for="group in serverGroups" :key="group">
                        <option :value="group" x-text="group"></option>
                    </template>
                </select>
            </div>
            <div class="flex-1 overflow-y-auto p-2">
                <template x-for="server in filteredServers" :key="server.id">
                    <div @click="server.os_type === 'windows' ? connectRDP(server) : switchServer(server)" 
                         :class="currentServer?.id === server.id ? 'bg-blue-600' : 'hover:bg-gray-700'"
                         class="file-item rounded mb-1 p-2 cursor-pointer transition">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-2">
                                <svg x-show="server.os_type === 'windows'" class="w-4 h-4 text-blue-400" fill="currentColor" viewBox="0 0 24 24"><path d="M0 3.449L9.75 2.1v9.451H0V3.449zm10.949-1.651L24 0v11.4H10.949V1.798zm-10.949 12.9l9.75 1.35v9.503H0V14.699zm10.949 1.35l13.051.301v10.05l-13.051.3v-10.65z"/></svg>
                                <svg x-show="server.os_type !== 'windows'" class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-medium text-white truncate" x-text="server.name"></p>
                                    <p class="text-xs text-gray-400 truncate" x-text="server.ip"></p>
                                </div>
                            </div>
                            <span :class="server.status === 'online' ? 'bg-green-500' : 'bg-red-500'" class="w-2 h-2 rounded-full ml-2"></span>
                        </div>
                    </div>
                </template>
                <div x-show="servers.length === 0" class="text-center text-gray-500 text-sm py-4">暂无服务器</div>
            </div>
        </aside>
        <main class="flex-1 flex flex-col">
            <div class="bg-gray-800 px-2 py-1 border-b border-gray-700 flex items-center justify-between overflow-hidden">
                <div class="flex items-center space-x-1 overflow-x-auto flex-1 scrollbar-always" style="max-width: 80%;">
                    <template x-for="(tab, index) in tabs" :key="tab.id">
                        <div @click="switchTab(tab.id)" 
                             :class="activeTabId === tab.id ? 'bg-gray-600 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'"
                             class="flex items-center space-x-1 px-3 py-1 rounded text-sm cursor-pointer whitespace-nowrap">
                            <span x-text="tab.server ? tab.server.name : '未选择'"></span>
                            <span @click.stop="closeTab(tab.id)" class="text-gray-400 hover:text-white ml-1">×</span>
                        </div>
                    </template>
                </div>
                <div class="flex space-x-2 ml-2 flex-shrink-0">
                    <button @click="clearTerminal()" class="text-xs bg-gray-700 hover:bg-gray-600 text-white px-2 py-1 rounded">清屏</button>
                    <button @click="reconnect()" class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded">重连</button>
                </div>
            </div>
            <template x-for="tab in tabs" :key="tab.id">
                <div x-show="activeTabId === tab.id" :id="'terminal-' + tab.id" class="flex-1 p-2 bg-gray-900 pr-4" style="height: calc(100vh - 220px);"></div>
            </template>
        </main>
        <aside class="w-72 bg-gray-800 border-l border-gray-700 flex flex-col overflow-hidden">
            <div class="flex flex-col h-full" x-show="showNotes || showCommands || showSessionHistory" style="display: none;">
                <div class="p-2 border-b border-gray-700 flex space-x-2">
                    <button @click="activePanel = 'notes'; selectedNote = null; if(notes.length === 0) loadNotes()" :class="activePanel === 'notes' ? 'bg-blue-600' : 'bg-gray-700'" class="flex-1 text-xs px-2 py-1 rounded">📝 笔记</button>
                    <button @click="activePanel = 'commands'; if(filteredCommands.length === 0) loadCommands()" :class="activePanel === 'commands' ? 'bg-blue-600' : 'bg-gray-700'" class="flex-1 text-xs px-2 py-1 rounded">⌨️ 命令</button>
                    <button @click="activePanel = 'history'" :class="activePanel === 'history' ? 'bg-blue-600' : 'bg-gray-700'" class="flex-1 text-xs px-2 py-1 rounded">📜 历史</button>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <div x-show="activePanel === 'history'" class="space-y-2">
                        <input type="text" x-model="sessionHistorySearch" placeholder="搜索..." class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white">
                        <div class="text-xs text-gray-400 mb-2">
                            当前会话命令数: <span x-text="getCurrentSessionHistory().length"></span>
                        </div>
                        <template x-for="(cmd, index) in getCurrentSessionHistory()" :key="index">
                            <div class="bg-gray-900 rounded p-2 mb-2 border border-gray-700">
                                <div class="text-xs text-gray-500" x-text="cmd.timestamp"></div>
                                <div class="text-green-400 text-sm font-mono mt-1" x-text="cmd.command"></div>
                                <div x-show="cmd.output" class="text-gray-400 text-xs font-mono mt-1 max-h-24 overflow-y-auto whitespace-pre-wrap bg-gray-950 p-1 rounded" x-text="cmd.output.substring(0, 1000)"></div>
                            </div>
                        </template>
                        <div x-show="getCurrentSessionHistory().length === 0" class="text-center text-gray-500 text-xs py-4">暂无历史记录</div>
                    </div>
                    <div x-show="activePanel === 'notes' && !selectedNote" class="space-y-2">
                        <div class="flex space-x-1">
                            <button @click="loadNotes()" class="flex-1 text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">🔄 刷新</button>
                            <button @click="showNoteModal = true; noteForm = {id:null,title:'',content:'',category:''}" class="flex-1 text-xs bg-blue-600 hover:bg-blue-700 px-2 py-1 rounded">➕ 新建</button>
                        </div>
                        <template x-for="note in notes" :key="note.id">
                            <div @click="selectedNote = note" :class="selectedNote?.id === note.id ? 'border-blue-500 bg-blue-900' : 'border-gray-700'" class="border rounded p-1 cursor-pointer hover:border-gray-500">
                                <div class="text-xs font-medium text-white truncate" x-text="note.title"></div>
                            </div>
                        </template>
                        <div x-show="notes.length === 0" class="text-center text-gray-500 text-xs py-4">暂无笔记</div>
                    </div>
                    <div x-show="activePanel === 'notes' && selectedNote" class="space-y-2">
                        <div class="flex items-center justify-between mb-2">
                            <button @click="selectedNote = null" class="text-xs text-gray-400 hover:text-white">← 返回列表</button>
                            <button @click="copyToClipboard(selectedNote?.content || '')" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">📋 复制</button>
                        </div>
                        <div class="bg-gray-900 rounded p-3 text-xs text-white whitespace-pre-wrap overflow-y-auto" style="max-height: calc(100vh - 300px);" x-text="selectedNote?.content || ''"></div>
                    </div>
                    <div x-show="activePanel === 'commands'" class="space-y-2">
                        <div class="flex space-x-1">
                            <button @click="loadCommands()" class="flex-1 text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">🔄 刷新</button>
                            <button @click="showCmdModal = true; cmdForm = {id:null,name:'',command:'',category:''}" class="flex-1 text-xs bg-blue-600 hover:bg-blue-700 px-2 py-1 rounded">➕ 新建</button>
                        </div>
                        <select x-model="cmdCategoryFilter" @change="filterCommands()" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white">
                            <option value="">全部分类</option>
                            <template x-for="cat in cmdCategories" :key="cat"><template x-if="cat">
                                <option :value="cat" x-text="cat"></option>
                            </template></template>
                        </select>
                        <div class="overflow-y-auto" style="max-height: calc(100vh - 320px);">
                            <template x-for="cmd in filteredCommands" :key="cmd.id">
                                <div @click="executeCommand(cmd.command)" class="border border-gray-700 rounded p-2 cursor-pointer hover:border-gray-500 mb-1">
                                    <div class="flex items-center justify-between">
                                        <div class="text-sm text-white" x-text="cmd.name"></div>
                                        <div class="flex items-center space-x-1">
                                            <span class="text-xs text-gray-500" x-text="cmd.category"></span>
                                            <button @click.stop="editCmd(cmd)" class="text-blue-400 hover:text-blue-300 text-xs">✏️</button>
                                            <button @click.stop="deleteCmd(cmd.id)" class="text-red-400 hover:text-red-300 text-xs">🗑️</button>
                                        </div>
                                    </div>
                                    <div class="text-xs text-gray-400 mt-1 font-mono truncate" x-text="cmd.command"></div>
                                </div>
                            </template>
                            <div x-show="filteredCommands.length === 0" class="text-center text-gray-500 text-xs py-2">暂无命令</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex flex-col h-full" x-show="!(showNotes || showCommands || showSessionHistory)">
                <div class="p-3 border-b border-gray-700">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-sm font-semibold text-gray-300">文件管理</h2>
                        <button @click="refreshAndSyncPath()" class="text-gray-400 hover:text-white text-xl px-2 py-0.5" title="刷新文件列表">🔄</button>
                    </div>
                    <div class="flex items-center space-x-2">
                        <input type="text" :value="getCurrentPath()" @keyup.enter="navigateToPath($event.target.value)" 
                               class="flex-1 bg-gray-700 text-white px-2 py-1 rounded text-xs border border-gray-600 focus:border-blue-500 focus:outline-none"
                               placeholder="/root">
                        <button @click="loadFiles()" class="bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded text-xs">Go</button>
                    </div>
                    <div class="flex space-x-1 mt-2">
                        <button @click="navigateToPath('/') " class="flex-1 bg-gray-700 hover:bg-gray-600 text-white px-2 py-1 rounded text-xs">🏠 根目录</button>
                        <button @click="goUp()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white px-2 py-1 rounded text-xs">⬆️ 上级</button>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <template x-for="(file, index) in files" :key="index">
                        <div class="file-item flex items-center text-sm text-gray-300 rounded"
                             :class="selectedFile?.path === file.path ? 'active' : ''"
                             @click="selectFile(file)"
                             @dblclick="openFile(file)">
                            <span class="mr-2 text-lg" x-text="getFileIcon(file)"></span>
                            <span class="flex-1 truncate" x-text="file.name"></span>
                            <span class="text-xs text-gray-500" x-show="!file.is_dir" x-text="formatSize(file.size)"></span>
                        </div>
                    </template>
                    <div x-show="loading" class="text-center text-gray-500 text-sm py-4">加载中...</div>
                    <div x-show="!loading && files.length === 0" class="text-center text-gray-500 text-sm py-4">空目录</div>
                </div>
                <div class="p-3 border-t border-gray-700">
                    <div class="flex space-x-2 mb-2">
                        <button @click="uploadFile()" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded text-sm">⬆️ 上传</button>
                        <button @click="downloadFile()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm">⬇️ 下载</button>
                    </div>
                    <div class="flex space-x-2">
                        <button @click="newFolder()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-sm">📁 新建</button>
                        <button @click="deleteFile()" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded text-sm">🗑️ 删除</button>
                    </div>
                    <div class="flex space-x-2 mt-2">
                        <button @click="editFile()" class="flex-1 bg-yellow-600 hover:bg-yellow-700 text-white px-3 py-1.5 rounded text-sm">✏️ 编辑</button>
                        <button @click="viewFileInModal()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm">👁️ 预览</button>
                    </div>
                    <input type="file" id="fileInput" @change="handleFileUpload" class="hidden">
                </div>
            </div>
            <div x-show="showCmdModal" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                <div class="bg-gray-800 rounded p-4 w-80 border border-gray-700">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-semibold" x-text="cmdForm.id ? '编辑命令' : '新建命令'"></h3>
                        <button @click="showCmdModal = false" class="text-gray-400 hover:text-white">✕</button>
                    </div>
                    <div class="space-y-2">
                        <input type="text" x-model="cmdForm.name" placeholder="名称" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white">
                        <input type="text" x-model="cmdForm.command" placeholder="命令" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white font-mono">
                        <input type="text" x-model="cmdForm.category" placeholder="分类" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white">
                    </div>
                    <div class="flex justify-end space-x-2 mt-3">
                        <button @click="showCmdModal = false" class="px-2 py-1 text-xs text-gray-400">取消</button>
                        <button @click="saveCmd()" class="px-2 py-1 text-xs bg-blue-600 rounded">保存</button>
                    </div>
                </div>
            </div>
            <div x-show="showNoteModal" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                <div class="bg-gray-800 rounded p-4 w-80 border border-gray-700">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-semibold" x-text="noteForm.id ? '编辑笔记' : '新建笔记'"></h3>
                        <button @click="showNoteModal = false" class="text-gray-400 hover:text-white">✕</button>
                    </div>
                    <div class="space-y-2">
                        <input type="text" x-model="noteForm.title" placeholder="标题" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white">
                        <textarea x-model="noteForm.content" placeholder="内容" rows="5" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white resize-none"></textarea>
                        <input type="text" x-model="noteForm.category" placeholder="分类" class="w-full bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white">
                    </div>
                    <div class="flex justify-end space-x-2 mt-3">
                        <button @click="showNoteModal = false" class="px-2 py-1 text-xs text-gray-400">取消</button>
                        <button @click="saveNote()" class="px-2 py-1 text-xs bg-blue-600 rounded">保存</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>
</div>
<script src="/static/js/xterm.min.js"></script>
<script src="/static/js/xterm-addon-fit.min.js"></script>
<script src="/static/js/xterm-addon-web-links.min.js"></script>
<script>
function terminalApp() {
    return {
        token: '',
        servers: [],
        filteredServers: [],
        serverGroups: [],
        selectedGroup: '',
        currentServer: null,
        currentPath: '/',
        files: [],
        selectedFile: null,
        loading: false,
        tabs: [],
        activeTabId: null,
        tabCounter: 0,
        osType: 'linux',
        terminals: {},
        websockets: {},
        message: '',
        messageType: 'info',
        uploading: false,
        downloadMode: false,
        uploadProgress: 0,
        showEditModal: false,
        showPreviewModal: false,
        editingFile: null,
        editingContent: '',
        codeMirrorEditor: null,
        codeMirrorPreview: null,
        loadingFiles: false,
        showNotes: false,
        showCommands: false,
        showSessionHistory: false,
        sessionHistorySearch: '',
        activePanel: 'notes',
        notes: [],
        commands: [],
        filteredCommands: [],
        cmdCategories: [],
        cmdCategoryFilter: '',
        selectedNote: null,
        showCmdModal: false,
        cmdForm: {id: null, name: '', command: '', category: ''},
        showNoteModal: false,
        noteForm: {id: null, title: '', content: '', category: ''},
        showMessage(msg, type = 'info', duration = 3000) {
            this.showMessageCenter(msg, type, duration);
        },
        showMessageCenter(msg, type = 'info', duration = 3000) {
            const el = document.getElementById('centerMessage');
            if (el) {
                el.textContent = msg;
                el.className = type === 'error' ? 'absolute left-1/2 transform -translate-x-1/2 text-sm px-4 py-1 rounded bg-red-600 text-white' : 'absolute left-1/2 transform -translate-x-1/2 text-sm px-4 py-1 rounded bg-green-600 text-white';
                el.classList.remove('hidden');
                setTimeout(() => el.classList.add('hidden'), duration);
            }
        },
        async loadNotes() {
            try {
                const res = await fetch('/api/notes', { headers: { 'Authorization': 'Bearer ' + this.token } });
                const data = await res.json();
                if (res.ok) this.notes = data.notes || [];
            } catch (e) { console.error(e); }
        },
        async saveNote() {
            if (!this.noteForm.title) {
                this.showMessage('请输入标题', 'error');
                return;
            }
            try {
                const url = this.noteForm.id ? '/api/notes/' + this.noteForm.id : '/api/notes';
                const method = this.noteForm.id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Authorization': 'Bearer ' + this.token, 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.noteForm)
                });
                if (res.ok) {
                    this.showNoteModal = false;
                    this.loadNotes();
                    this.showMessage('保存成功', 'success');
                } else {
                    this.showMessage('保存失败', 'error');
                }
            } catch (e) {
                this.showMessage('保存失败', 'error');
            }
        },
        async loadCommands() {
            try {
                const res = await fetch('/api/commands', { headers: { 'Authorization': 'Bearer ' + this.token } });
                const data = await res.json();
                if (res.ok) {
                    this.commands = data.commands || [];
                    this.cmdCategories = [...new Set(this.commands.map(c => c.category).filter(c => c))];
                    this.filterCommands();
                }
            } catch (e) { console.error(e); }
        },
        filterCommands() {
            if (this.cmdCategoryFilter) {
                this.filteredCommands = this.commands.filter(c => c.category === this.cmdCategoryFilter);
            } else {
                this.filteredCommands = this.commands;
            }
        },
        executeCommand(cmd) {
            let ws = null;
            let tab = null;
            if (this.activeTabId) {
                const activeTab = this.tabs.find(t => t.id === this.activeTabId);
                if (activeTab && activeTab.ws && activeTab.ws.readyState === WebSocket.OPEN) {
                    ws = activeTab.ws;
                    tab = activeTab;
                }
            }
            if (!ws) {
                for (const t of this.tabs) {
                    if (t.ws && t.ws.readyState === WebSocket.OPEN) {
                        ws = t.ws;
                        tab = t;
                        break;
                    }
                }
            }
            if (!ws || ws.readyState !== WebSocket.OPEN) { this.showMessageCenter('请先连接终端', 'error'); return; }
            if (this.isRmCommand(cmd)) {
                tab.pendingRmConfirm = true;
                tab.pendingRmLine = cmd + '\n';
                tab.terminal.write('\r\n\x1b[33m⚠ 检测到rm命令，确认执行？(y/n)\x1b[0m ');
                tab.currentLine = '';
                return;
            }
            ws.send(cmd + '\n');
            this.showMessageCenter('已执行: ' + cmd, 'success');
        },
        async copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                this.showMessageCenter('复制成功', 'success');
            } catch (e) {
                this.showMessageCenter('复制失败', 'error');
            }
        },
        editCmd(cmd) {
            this.cmdForm = {id: cmd.id, name: cmd.name, command: cmd.command, category: cmd.category};
            this.showCmdModal = true;
        },
        async saveCmd() {
            if (!this.cmdForm.name || !this.cmdForm.command) { this.showMessageCenter('请填写名称和命令', 'error'); return; }
            try {
                const url = this.cmdForm.id ? '/api/commands/' + this.cmdForm.id : '/api/commands';
                const method = this.cmdForm.id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Authorization': 'Bearer ' + this.token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({name: this.cmdForm.name, command: this.cmdForm.command, category: this.cmdForm.category})
                });
                if (res.ok) {
                    this.showCmdModal = false;
                    this.loadCommands();
                    this.showMessageCenter('保存成功', 'success');
                } else { this.showMessageCenter('保存失败', 'error'); }
            } catch (e) { this.showMessageCenter('保存失败', 'error'); }
        },
        async deleteCmd(id) {
            if (!confirm('确定删除?')) return;
            try {
                const res = await fetch('/api/commands/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + this.token } });
                if (res.ok) { this.loadCommands(); this.showMessageCenter('已删除', 'success'); }
            } catch (e) { this.showMessageCenter('删除失败', 'error'); }
        },
        async init() {
            const params = new URLSearchParams(window.location.search);
            this.token = params.get('token');
            const serverId = params.get('serverId') || params.get('server');
            this.osType = params.get('osType') || 'linux';
            if (!this.token) { this.showMessageCenter('缺少认证信息', 'error'); window.close(); return; }
            
            await this.loadServers();
            await this.loadNotes();
            await this.loadCommands();
            
            if (this.tabs.length > 0) return;
            
            if (serverId) {
                const server = this.servers.find(s => s.id == serverId || s.id == parseInt(serverId));
                if (server) {
                    if (!this.osType && server.os_type) {
                        this.osType = server.os_type;
                    }
                    this.createTab(server);
                }
            } else if (this.servers.length > 0) {
                this.createTab(this.servers[0]);
            } else {
                this.showMessageCenter('没有找到服务器', 'error');
            }
        },
        createTab(server = null) {
            this.tabCounter++;
            const tabId = 'tab-' + this.tabCounter;
            const newTab = {
                id: tabId,
                server: server,
                terminal: null,
                ws: null,
                fitAddon: null,
                currentPath: '/'
            };
            this.tabs.push(newTab);
            this.activeTabId = tabId;
            
            this.$nextTick(() => {
                this.initTerminalForTab(tabId);
                if (server) this.connectTerminalForTab(tabId);
            });
            
            return tabId;
        },
        switchTab(tabId) {
            this.activeTabId = tabId;
            const tab = this.tabs.find(t => t.id === tabId);
            if (tab && tab.server) {
                this.currentServer = tab.server;
                this.currentPath = tab.currentPath;
                this.loadFiles();
            }
            this.$nextTick(() => {
                const termEl = document.getElementById('terminal-' + tabId);
                if (termEl && tab.fitAddon) {
                    tab.fitAddon.fit();
                }
            });
        },
        closeTab(tabId) {
            const tab = this.tabs.find(t => t.id === tabId);
            if (!tab) return;
            
            if (tab.ws) {
                try { tab.ws.close(); } catch(e) {}
            }
            if (tab.terminal) {
                try { tab.terminal.dispose(); } catch(e) {}
            }
            
            const idx = this.tabs.indexOf(tab);
            this.tabs.splice(idx, 1);
            
            if (this.tabs.length === 0) {
                this.createTab(this.servers.length > 0 ? this.servers[0] : null);
            } else if (this.activeTabId === tabId) {
                this.switchTab(this.tabs[0].id);
            }
        },
        getActiveTab() {
            return this.tabs.find(t => t.id === this.activeTabId);
        },
        getCurrentServer() {
            const tab = this.getActiveTab();
            return tab ? tab.server : null;
        },
        getCurrentPath() {
            const tab = this.getActiveTab();
            return tab ? (tab.currentPath || '/') : '/';
        },
        async loadServers() {
            try {
                const res = await fetch('/api/servers', { headers: { 'Authorization': 'Bearer ' + this.token } });
                const data = await res.json();
                console.log('Server API response:', data);
                if (res.ok && data.servers) {
                    this.servers = data.servers;
                    this.filteredServers = data.servers;
                } else if (data.error) {
                    console.error('Server API error:', data.error);
                    this.showMessage('加载服务器失败: ' + data.error, 'error');
                }

                const groupRes = await fetch('/api/servers/groups', { headers: { 'Authorization': 'Bearer ' + this.token } });
                const groupData = await groupRes.json();
                if (groupRes.ok && groupData.groups) {
                    this.serverGroups = groupData.groups.filter(g => g && g.trim());
                }
            } catch (e) {
                console.error('Failed to load servers:', e);
                this.showMessage('加载服务器失败', 'error');
            }
        },
        filterServersByGroup() {
            if (!this.selectedGroup) {
                this.filteredServers = this.servers;
            } else {
                this.filteredServers = this.servers.filter(s => s.group === this.selectedGroup);
            }
        },
        switchServer(server) {
            this.createTab(server);
        },
        initTerminalForTab(tabId) {
            const tab = this.tabs.find(t => t.id === tabId);
            if (!tab) return;
            
            const termEl = document.getElementById('terminal-' + tabId);
            if (!termEl) return;
            
            try {
                tab.terminal = new Terminal({ 
                    cursorBlink: true, 
                    fontSize: 14, 
                    fontFamily: 'Consolas, "Courier New", monospace', 
                    theme: { background: '#1a1a2e', foreground: '#eee', cursor: '#0f0' },
                    allowProposedApi: true,
                    rightClickSelectsWord: true
                });
                
                tab.fitAddon = new FitAddon.FitAddon();
                tab.terminal.loadAddon(tab.fitAddon);
                tab.terminal.loadAddon(new WebLinksAddon.WebLinksAddon());
                tab.terminal.open(termEl);
                tab.fitAddon.fit();
                
                const self = this;
                tab.terminal.onSelectionChange(() => {
                    if (tab.terminal.hasSelection()) {
                        const selection = tab.terminal.getSelection();
                        if (selection) {
                            self.clipboardCopy(selection);
                        }
                    }
                });
                
                tab.terminal.attachCustomKeyEventHandler(function(e) {
                    if (e.type === 'keydown' && (e.ctrlKey || e.metaKey) && e.key === 'v') {
                        e.preventDefault();
                        self.clipboardPaste().then(function(text) {
                            if (tab.ws && tab.ws.readyState === WebSocket.OPEN && text) {
                                if (self.isRmCommand(text)) {
                                    tab.pendingRmConfirm = true;
                                    tab.pendingRmLine = text;
                                    tab.terminal.write('\r\n\x1b[33m⚠ 检测到rm命令，确认执行？(y/n)\x1b[0m ');
                                    tab.currentLine = '';
                                    return;
                                }
                                tab.ws.send(JSON.stringify({ type: 'input', data: text }));
                            }
                        }).catch(function() {});
                        return false;
                    }
                    if (e.type === 'keydown' && (e.ctrlKey || e.metaKey) && e.key === 'c' && tab.terminal.hasSelection()) {
                        e.preventDefault();
                        const selection = tab.terminal.getSelection();
                        if (selection) {
                            self.clipboardCopy(selection);
                        }
                        return false;
                    }
                    return true;
                });
            } catch(e) {
                console.error('Terminal init error:', e);
            }
        },
        connectTerminalForTab(tabId) {
            const tab = this.tabs.find(t => t.id === tabId);
            if (!tab || !tab.server) return;
            
            if (tab.ws) {
                try { tab.ws.close(); } catch(e) {}
            }
            
            const termEl = document.getElementById('terminal-' + tabId);
            if (termEl) termEl.innerHTML = '';
            
            this.initTerminalForTab(tabId);
            
            if (!tab.terminal) return;
            
            const self = this;
            tab.terminal.writeln('\x1b[32m 正在连接服务器...\x1b[0m\r\n');
            const initCols = tab.terminal.cols;
            const initRows = tab.terminal.rows;
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = protocol + '//' + window.location.host + '/ws/terminal/' + tab.server.id + '?token=' + this.token;
            tab.ws = new WebSocket(wsUrl);
            
            tab.ws.onopen = function() {
                tab.terminal.writeln('\x1b[32m✓ 连接成功!\x1b[0m\r\n');
                tab.terminal.writeln('\x1b[36m================================\x1b[0m\r\n');
                tab.terminal.focus();
                tab.terminal.writeln('\x1b[33m 服务器：' + tab.server.name + '\x1b[0m\r\n');
                tab.terminal.writeln('\x1b[33mIP 地址：' + tab.server.ip + ':' + tab.server.port + '\x1b[0m\r\n');
                tab.terminal.writeln('\x1b[33m 用户名：' + tab.server.username + '\x1b[0m\r\n');
                tab.terminal.writeln('\r\n\x1b[32m 准备就绪！\x1b[0m\r\n\r\n');
                tab.ws.send(JSON.stringify({ type: 'resize', cols: initCols, rows: initRows }));
                self.updateConnectionStatus('已连接', 'text-xs text-green-400');
                self.loadFiles();
                tab.sessionHistory = [];
                tab.sessionStartTime = new Date().toISOString();
                tab.pendingCommand = null;
                tab.outputBuffer = '';
            };
            
            tab.ws.onmessage = async function(event) {
                let str = '';
                if (event.data instanceof ArrayBuffer) {
                    const bytes = new Uint8Array(event.data);
                    for (let i = 0; i < bytes.length; i++) {
                        str += String.fromCharCode(bytes[i]);
                    }
                } else if (event.data instanceof Blob) {
                    str = await event.data.text();
                } else {
                    str = event.data;
                }
                tab.terminal.write(str);
                if (tab.pendingCommand) {
                    tab.outputBuffer += str;
                }
            };
            
            tab.ws.onclose = function() {
                tab.terminal.writeln('\r\n\x1b[31m✗ 连接已断开\x1b[0m\r\n');
                self.updateConnectionStatus('已断开', 'text-xs text-red-400');
                self.saveSessionHistory(tab);
            };
            
            tab.ws.onerror = function(event) {
                tab.terminal.writeln('\r\n\x1b[31m 连接错误\x1b[0m\r\n');
                self.updateConnectionStatus('错误', 'text-xs text-red-400');
            };
            
            tab.currentLine = '';
            tab.currentLineUnknown = false;
            tab.pendingRmConfirm = false;
            tab.pendingRmLine = '';
            tab.outputBuffer = '';
            tab.pendingCommand = null;
            tab.outputTimeout = null;

            tab.terminal.onData(function(data) {
                if (tab.ws && tab.ws.readyState === WebSocket.OPEN) {
                    if (tab.pendingRmConfirm) {
                        if (data === 'y' || data === 'Y') {
                            tab.pendingRmConfirm = false;
                            const line = tab.pendingRmLine;
                            tab.pendingRmLine = '';
                            tab.currentLine = '';
                            tab.currentLineUnknown = false;
                            tab.ws.send(JSON.stringify({ type: 'input', data: line }));
                            tab.terminal.write('\r\n');
                        } else if (data === 'n' || data === 'N' || data === '\r' || data === '\x03' || data === '\x15') {
                            tab.pendingRmConfirm = false;
                            tab.pendingRmLine = '';
                            tab.currentLine = '';
                            tab.currentLineUnknown = false;
                            tab.terminal.write('\r\n\x1b[33m已取消\x1b[0m\r\n');
                            tab.ws.send(JSON.stringify({ type: 'input', data: '\x03' }));
                        } else {
                            tab.terminal.write('\x07');
                        }
                        return;
                    }
                    if (data === '\r' || data === '\n') {
                        let lineToCheck = tab.currentLineUnknown ? self.getCurrentTerminalLine(tab.terminal) : tab.currentLine;
                        const cmd = tab.currentLineUnknown ? self.getCurrentTerminalLine(tab.terminal) : tab.currentLine;
                        if (cmd && cmd.trim() && tab.sessionHistory) {
                            tab.pendingCommand = {
                                timestamp: new Date().toLocaleString('zh-CN'),
                                command: cmd.trim(),
                                output: ''
                            };
                            tab.outputBuffer = '';
                            if (tab.outputTimeout) clearTimeout(tab.outputTimeout);
                            tab.outputTimeout = setTimeout(() => {
                                if (tab.pendingCommand && tab.sessionHistory) {
                                    tab.pendingCommand.output = self.stripAnsi(tab.outputBuffer);
                                    tab.sessionHistory.push(tab.pendingCommand);
                                    tab.pendingCommand = null;
                                    tab.outputBuffer = '';
                                }
                            }, 800);
                        }
                        tab.currentLine = '';
                        tab.currentLineUnknown = false;
                        if (self.isRmCommand(lineToCheck)) {
                            tab.pendingRmConfirm = true;
                            tab.pendingRmLine = data;
                            tab.terminal.write('\r\n\x1b[33m⚠ 检测到rm命令，确认执行？(y/n)\x1b[0m ');
                            return;
                        }
                    } else if (data === '\x7f' || data === '\b') {
                        if (tab.currentLine.length > 0) tab.currentLine = tab.currentLine.slice(0, -1);
                    } else if (data === '\x03') {
                        tab.currentLine = '';
                        tab.currentLineUnknown = false;
                    } else if (data === '\x15') {
                        tab.currentLine = '';
                    } else if (data.startsWith('\x1b[') || data.startsWith('\x1bO')) {
                        tab.currentLineUnknown = true;
                    } else if (data.length === 1 && data.charCodeAt(0) >= 32) {
                        tab.currentLine += data;
                    } else if (data.length > 1) {
                        if (data.includes('\n') || data.includes('\r')) {
                            if (self.isRmCommand(data)) {
                                tab.pendingRmConfirm = true;
                                tab.pendingRmLine = data;
                                tab.terminal.write('\r\n\x1b[33m⚠ 检测到rm命令，确认执行？(y/n)\x1b[0m ');
                                tab.currentLine = '';
                                return;
                            }
                        } else {
                            tab.currentLineUnknown = true;
                        }
                    }
                    tab.ws.send(JSON.stringify({ type: 'input', data: data }));
                }
            });
            
            tab.terminal.onResize(function(size) { 
                if (tab.ws && tab.ws.readyState === WebSocket.OPEN) { 
                    tab.ws.send(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows })); 
                } 
            });
            
            window.addEventListener('resize', function() { 
                if (tab.fitAddon) tab.fitAddon.fit(); 
            });
        },
        isRmCommand(line) {
            const trimmed = line.trim();
            if (!trimmed) return false;
            // 二次确认规则:
            // 1) 命令开头: `rm xxx`
            // 2) 管道/顺序操作符之后: `cmd | rm`、`cmd ; rm`、`cmd & rm` 以及 `cmd && rm`、`cmd || rm`
            //    (正则引擎会逐位重试,所以单字符 `[|;&]` 已能覆盖 `&&`/`||` 在第二个操作符后的情况)
            return /^\s*rm\b/.test(trimmed) || /[|;&]\s*rm\b/.test(trimmed);
        },
        getCurrentTerminalLine(terminal) {
            try {
                const line = terminal.buffer.active.getLine(terminal.buffer.active.cursorY);
                if (line) {
                    return line.translateToString(true, 0, terminal.cols).trim();
                }
            } catch(e) {}
            return '';
        },
        clipboardCopy(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).catch(() => {
                    this.fallbackCopy(text);
                });
            } else {
                this.fallbackCopy(text);
            }
        },
        fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '-9999px';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); } catch(e) {}
            document.body.removeChild(ta);
        },
        clipboardPaste() {
            if (navigator.clipboard && navigator.clipboard.readText) {
                return navigator.clipboard.readText().catch(() => {
                    return this.fallbackPaste();
                });
            }
            return this.fallbackPaste();
        },
        fallbackPaste() {
            return new Promise((resolve) => {
                const ta = document.createElement('textarea');
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                ta.style.top = '-9999px';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.focus();
                const handler = () => {
                    const text = ta.value;
                    document.body.removeChild(ta);
                    resolve(text || '');
                };
                ta.addEventListener('input', handler, { once: true });
                ta.addEventListener('blur', () => {
                    setTimeout(() => {
                        if (ta.parentNode) {
                            const text = ta.value;
                            document.body.removeChild(ta);
                            resolve(text || '');
                        }
                    }, 100);
                }, { once: true });
                try { document.execCommand('paste'); } catch(e) {}
                setTimeout(() => {
                    if (ta.parentNode) {
                        const text = ta.value;
                        document.body.removeChild(ta);
                        resolve(text || '');
                    }
                }, 500);
            });
        },
        async saveSessionHistory(tab) {
            if (!tab || !tab.sessionHistory || tab.sessionHistory.length === 0) return;
            try {
                const logData = {
                    server_id: tab.server.id,
                    server_name: tab.server.name,
                    server_ip: tab.server.ip,
                    system_user: tab.server.username,
                    session_type: 'ssh',
                    start_time: tab.sessionStartTime,
                    commands: JSON.stringify(tab.sessionHistory)
                };
                const res = await fetch('/api/terminal-logs', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + this.getToken(), 'Content-Type': 'application/json' },
                    body: JSON.stringify(logData)
                });
                if (res.ok) {
                    console.log('终端日志已保存');
                }
            } catch (e) { console.error('保存历史失败:', e); }
        },
        getCurrentSessionHistory() {
            const tab = this.getActiveTab();
            if (!tab || !tab.sessionHistory) return [];
            const search = this.sessionHistorySearch.toLowerCase();
            let history = tab.sessionHistory.map(c => ({
                timestamp: c.timestamp,
                command: c.command,
                output: this.stripAnsi(c.output || '')
            }));
            if (!search) return history;
            return history.filter(c => 
                c.command.toLowerCase().includes(search) || 
                c.output.toLowerCase().includes(search)
            );
        },
        stripAnsi(str) {
            return str.replace(/\x1b\[[0-9;]*m/g, '').replace(/\x1b\][^\x07]*\x07/g, '').replace(/\[[\d;]*[a-zA-Z]/g, '');
        },
        updateConnectionStatus(text, className) {

        connectTerminal() {
            if (!this.currentServer) {
                this.showMessage('请选择服务器', 'error');
                return;
            }
            
            // 先关闭旧的连接
            if (this.termWs) { 
                try { this.termWs.close(); } catch(e) {}
                this.termWs = null;
            }
            
            // 清理旧的终端
            const termEl = document.getElementById('terminal');
            if (termEl) {
                termEl.innerHTML = '';
            }
            
            // 创建新终端
            try {
                this.terminal = new Terminal({ 
                    cursorBlink: true, 
                    fontSize: 14, 
                    fontFamily: 'Consolas, "Courier New", monospace', 
                    theme: { background: '#1a1a2e', foreground: '#eee', cursor: '#0f0' },
                    allowProposedApi: true,
                    rightClickSelectsWord: true,
                    allowTransparency: true
                });
                
                this.fitAddon = new FitAddon.FitAddon();
                this.terminal.loadAddon(this.fitAddon);
                this.terminal.loadAddon(new WebLinksAddon.WebLinksAddon());
                this.terminal.open(termEl);
                this.fitAddon.fit();
                
                this.terminal.onSelectionChange(() => {
                    if (this.terminal.hasSelection()) {
                        const selection = this.terminal.getSelection();
                        if (selection && navigator.clipboard && navigator.clipboard.writeText) {
                            navigator.clipboard.writeText(selection).catch(function() {});
                        }
                    }
                });
                
                this.terminal.attachCustomKeyEventHandler(function(e) {
                    if (e.type === 'keydown' && (e.ctrlKey || e.metaKey) && e.key === 'v') {
                        e.preventDefault();
                        if (navigator.clipboard && navigator.clipboard.readText) {
                            navigator.clipboard.readText().then(function(text) {
                                if (self.termWs && self.termWs.readyState === WebSocket.OPEN && text) {
                                    self.termWs.send(JSON.stringify({ type: 'input', data: text }));
                                }
                            }).catch(function() {});
                        }
                        return false;
                    }
                    return true;
                });
            } catch(e) {
                console.error('Terminal init error:', e);
                this.showMessage('终端初始化失败: ' + e.message, 'error');
                return;
            }
            this.terminal.writeln('\x1b[32m 正在连接服务器...\x1b[0m\r\n');
            const initCols = this.terminal.cols;
            const initRows = this.terminal.rows;
            document.getElementById('connectionStatus').textContent = '连接中...';
            document.getElementById('connectionStatus').className = 'text-xs text-yellow-400';
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = protocol + '//' + window.location.host + '/ws/terminal/' + this.currentServer.id + '?token=' + this.token;
            this.termWs = new WebSocket(wsUrl);
            const self = this;
            this.termWs.onopen = function() {
                self.terminal.writeln('\x1b[32m✓ 连接成功!\x1b[0m\r\n');
                self.terminal.writeln('\x1b[36m================================\x1b[0m\r\n');
                self.terminal.focus();
                document.getElementById('connectionStatus').textContent = '已连接';
                document.getElementById('connectionStatus').className = 'text-xs text-green-400';
                self.terminal.writeln('\x1b[33m 服务器：' + self.currentServer.name + '\x1b[0m\r\n');
                self.terminal.writeln('\x1b[33mIP 地址：' + self.currentServer.ip + ':' + self.currentServer.port + '\x1b[0m\r\n');
                self.terminal.writeln('\x1b[33m 用户名：' + self.currentServer.username + '\x1b[0m\r\n');
                self.terminal.writeln('\r\n\x1b[32m 准备就绪！\x1b[0m\r\n\r\n');
                self.termWs.send(JSON.stringify({ type: 'resize', cols: initCols, rows: initRows }));
            };
            this.termWs.onmessage = async function(event) {
                console.log('WS message type:', event.data.constructor.name);
                if (event.data instanceof ArrayBuffer) {
                    const bytes = new Uint8Array(event.data);
                    let str = '';
                    for (let i = 0; i < bytes.length; i++) {
                        str += String.fromCharCode(bytes[i]);
                    }
                    self.terminal.write(str);
                } else if (event.data instanceof Blob) {
                    const text = await event.data.text();
                    console.log('Blob content:', text);
                    self.terminal.write(text);
                } else {
                    // 显示服务器返回的消息
                    self.terminal.write(event.data);
                    // 如果包含错误信息，显示在页面上
                    if (event.data.includes('失败') || event.data.includes('error') || event.data.includes('SSH')) {
                        document.getElementById('connectionStatus').textContent = '连接失败';
                        document.getElementById('connectionStatus').className = 'text-xs text-red-400';
                    }
                }
            };
            this.termWs.onclose = function() {
                self.terminal.writeln('\r\n\x1b[31m✗ 连接已断开\x1b[0m\r\n');
                document.getElementById('connectionStatus').textContent = '已断开';
                document.getElementById('connectionStatus').className = 'text-xs text-red-400';
            };
            this.termWs.onerror = function(event) {
                console.error('WebSocket error:', event);
                self.terminal.writeln('\r\n\x1b[31m 连接错误\x1b[0m\r\n');
                document.getElementById('connectionStatus').textContent = '错误';
                document.getElementById('connectionStatus').className = 'text-xs text-red-400';
            };
            this.termWs.onclose = function(event) {
                console.log('WebSocket closed:', event.code, event.reason);
                if (event.code !== 1000) {
                    self.terminal.writeln('\r\n\x1b[31m 连接已关闭: ' + event.reason + '\x1b[0m\r\n');
                }
            };
            this.terminal.onData(function(data) { 
                var ws = this.termWs;
                if (ws && ws.readyState === WebSocket.OPEN) { 
                    ws.send(JSON.stringify({ type: 'input', data: data })); 
                } 
            }.bind(this));
            this.terminal.onResize(function(size) { 
                var ws = this.termWs;
                if (ws && ws.readyState === WebSocket.OPEN) { 
                    ws.send(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows })); 
                } 
            }.bind(this));
            window.addEventListener('resize', function() { self.fitAddon.fit(); });
            document.addEventListener('keydown', function(e) { 
                if (e.key === 'Escape' && e.ctrlKey) { self.closeTerminal(); }
            }, true);
        },

        async connectRDP(server) {
            const token = localStorage.getItem('access_token');
            if (!token) { alert('请先登录'); return; }
            
            try {
                const res = await fetch('/api/servers/' + server.id + '/full', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                if (!res.ok) { alert('获取服务器信息失败'); return; }
                
                const host = data.ip;
                const port = data.port || 3389;
                const username = data.username || 'administrator';
                const password = data.password || '';
                if (!password) { alert('服务器未保存密码，无法自动连接'); return; }
                
                const jumpEnabled = data.jump_enabled || false;
                const jumpIP = data.jump_ip || '';
                const jumpPort = data.jump_port || 22;
                const jumpUser = data.jump_user || '';
                const jumpPassword = data.jump_password || '';
                const jumpKey = data.jump_key || '';
                const proxyEnabled = data.proxy_enabled || false;
                const proxyType = data.proxy_type || 'socks5';
                const proxyHost = data.proxy_host || '';
                const proxyPort = data.proxy_port || 1080;

                // 1) Desktop mode
                if (window['go'] && window['go']['main'] && window['go']['main']['App'] && window['go']['main']['App']['LaunchRDP']) {
                    try { await window['go']['main']['App']['LaunchRDP'](host, port, username, password); return; } catch(e) {}
                }

                // 2) rdp-agent.exe
                const agentRunning = await this.checkRdpAgent();
                if (agentRunning) {
                    const rdpRes = await fetch('http://localhost:8765/connect', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            host, port, username, password,
                            jump_enabled: jumpEnabled, jump_host: jumpIP, jump_port: jumpPort,
                            jump_user: jumpUser, jump_password: jumpPassword, jump_key: jumpKey,
                            proxy_enabled: proxyEnabled, proxy_type: proxyType,
                            proxy_host: proxyHost, proxy_port: proxyPort
                        })
                    });
                    if (rdpRes.ok) {
                        this.showMessageCenter('RDP 连接已启动', 'success');
                    } else {
                        const rdpData = await rdpRes.json();
                        alert('RDP连接失败: ' + (rdpData.error || '未知错误'));
                    }
                    return;
                }

                alert('未检测到 RDP Agent\n\n请下载并启动 rdp-agent.exe');
                
            } catch (e) { alert('RDP连接失败: ' + e.message); }
        },
        toggleFullscreen() { if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); } else { document.exitFullscreen(); } },
        async refreshAndSyncPath() {

        async loadFiles() {
            if (this.loadingFiles) return;

            if (!tab || !tab.server) return;
            this.loadingFiles = true;
            this.loading = true;
            const server = tab.server;
            const path = this.pendingPath || tab.currentPath || '/';
            try {
                const encodedPath = encodeURIComponent(path);
                console.log('Loading files from:', path, 'server:', server.name);
                const res = await fetch('/api/files/' + server.id + '?path=' + encodedPath, { headers: { 'Authorization': 'Bearer ' + this.token } });
                const data = await res.json();
                console.log('Files response:', data);
                if (res.ok) {
                    const tab = this.getActiveTab();

                        tab.currentPath = this.pendingPath;
                        this.pendingPath = null;
                    }
                    this.files = (data.files || []).filter(f => f.name !== '.' && f.name !== '..');

                    this.pendingPath = null;

                    this.showMessage(data.error, 'error');

        goUp() {
            const tab = this.getActiveTab();
            if (!tab) return;
            const currentPath = tab.currentPath || '/';
            if (currentPath === '/') return;
            const parts = currentPath.split('/').filter(p => p);
            parts.pop();
            tab.currentPath = '/' + parts.join('/') || '/';
            this.loadFiles();
        },
        navigateToPath(path) {
            const tab = this.getActiveTab();
            if (!tab) return;
            this.pendingPath = path || '/';

        },
        selectFile(file) { this.selectedFile = file; },
        normalizePath(path) {
            const parts = path.split('/').filter(p => p && p !== '.');
            const stack = [];
            for (const part of parts) {
                if (part === '..') {
                    stack.pop();
                } else {
                    stack.push(part);
                }
            }
            return '/' + stack.join('/');
        },
        openFile(file) {
            if (this.loadingFiles) return;
            const tab = this.getActiveTab();
            if (!tab) return;
            if (file.is_dir || file.IsDir || file.isDirectory) {
                // Extract original name if it's a symlink (remove " -> target")
                let name = file.name;
                const arrowIdx = name.indexOf(' -> ');
                if (arrowIdx > 0) {
                    name = name.substring(0, arrowIdx);
                }
                const currentPath = tab.currentPath || '/';
                let newPath = currentPath === '/' ? '/' + name : currentPath + '/' + name;
                this.pendingPath = this.normalizePath(newPath);
                console.log('Navigating to:', this.pendingPath);
                this.loadFiles();
            } else {
                this.viewFile(file);
            }
        },
        getFileIcon(file) {
            if (file.is_dir || file.IsDir || file.isDirectory) return '📁';
            const name = file.name.toLowerCase();
            if (name.endsWith('.sh') || name.endsWith('.bash')) return '📜';
            if (name.endsWith('.py')) return '🐍';
            if (name.endsWith('.js') || name.endsWith('.ts')) return '📄';
            if (name.endsWith('.java') || name.endsWith('.class')) return '☕';
            if (name.endsWith('.jar') || name.endsWith('.war')) return '📦';
            if (name.endsWith('.sql') || name.endsWith('.db')) return '🗄️';
            if (name.endsWith('.json') || name.endsWith('.xml') || name.endsWith('.yaml') || name.endsWith('.yml')) return '📋';
            if (name.endsWith('.md') || name.endsWith('.txt')) return '📝';
            if (name.endsWith('.log')) return '📋';
            if (name.endsWith('.tar') || name.endsWith('.gz') || name.endsWith('.zip') || name.endsWith('.rar')) return '📦';
            if (name.endsWith('.jpg') || name.endsWith('.jpeg') || name.endsWith('.png') || name.endsWith('.gif')) return '🖼️';
            if (name.endsWith('.pdf')) return '📕';
            return '📄';
        },
        formatSize(bytes) {
            if (!bytes && bytes !== 0) return '';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0, size = bytes;
            while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
            return size.toFixed(1) + ' ' + units[i];
        },

        detectLanguage(filename) {
            if (!filename) return 'yaml';

            if (name.endsWith('.py')) return 'python';
            if (name.endsWith('.js') || name.endsWith('.ts')) return 'javascript';
            if (name.endsWith('.sh') || name.endsWith('.bash')) return 'shell';
            if (name.endsWith('.xml') || name.endsWith('.html')) return 'xml';
            if (name.endsWith('.sql')) return 'sql';
            if (name.endsWith('.yml') || name.endsWith('.yaml')) return 'yaml';

        handleFileUpload(event) {

            this.downloadMode = false;

            this.uploadProgress = 0;
            document.getElementById('uploadProgress').style.width = '0%';
            document.getElementById('uploadPercent').textContent = '0%';
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('path', currentPath + '/' + file.name);
            
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/files/' + server.id + '/upload');
            xhr.setRequestHeader('Authorization', 'Bearer ' + this.token);
            
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    this.uploadProgress = percent;
                    document.getElementById('uploadProgress').style.width = percent + '%';
                    document.getElementById('uploadPercent').textContent = percent + '%';
                }
            };
            
            xhr.onload = () => {
                this.uploading = false;
                if (xhr.status === 200) {
                    this.showMessageCenter('上传成功！', 'success');
                    this.loadFiles();
                } else {
                    this.showMessageCenter('上传失败', 'error');
                }
                event.target.value = '';
            };
            
            xhr.onerror = () => {
                this.uploading = false;
                this.showMessageCenter('上传失败', 'error');
                this.loadFiles();
                event.target.value = '';
            };
            
            xhr.send(formData);
        },
        downloadFile() {
            const server = this.getCurrentServer();
            const file = this.selectedFile;
            if (!file) { this.showMessageCenter('请先选择要下载的文件', 'error'); return; }
            if (!server) return;
            if (file.is_dir || file.IsDir) { this.showMessageCenter('不能下载文件夹', 'error'); return; }
            
            this.downloadMode = true;
            this.uploading = true;
            this.uploadProgress = 0;
            this.showMessageCenter('正在下载: ' + file.name, 'success');
            
            const self = this;
            const token = localStorage.getItem('access_token');
            const url = `/api/files/${server.id}/download?path=${encodeURIComponent(file.path)}`;
            
            fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
                .then(function(response) {
                    if (!response.ok) throw new Error('Download failed');
                    return response.blob();
                })
                .then(function(blob) {
                    const downloadUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = file.name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(downloadUrl);
                    
                    self.uploading = false;
                    self.downloadMode = false;
                    self.showMessageCenter('下载完成！', 'success');
                })
                .catch(function(err) {
                    self.showMessageCenter('下载失败: ' + err.message, 'error');
                    self.uploading = false;
                    self.downloadMode = false;
                });
        },
        async newFolder() {
            const server = this.getCurrentServer();
            const currentPath = this.getCurrentPath();
            if (!server) return;
            const name = prompt('请输入文件夹名称:');
            if (!name) return;
            try {
                const res = await fetch('/api/files/' + server.id + '/mkdir', { method: 'POST', headers: { 'Authorization': 'Bearer ' + this.token, 'Content-Type': 'application/json' }, body: JSON.stringify({ path: currentPath + '/' + name }) });
                if (res.ok) { this.showMessage('创建成功！', 'success'); this.loadFiles(); } else { this.showMessage('创建失败', 'error'); }
            } catch (e) { this.showMessage('创建失败', 'error'); }
        },
        async deleteFile() {
            const server = this.getCurrentServer();
            if (!this.selectedFile) { this.showMessage('请先选择要删除的文件或文件夹', 'error'); return; }
            if (!server) return;
            if (!confirm('确定要删除 "' + this.selectedFile.name + '" 吗？此操作不可恢复！')) return;
            try {
                const res = await fetch('/api/files/' + server.id + '?path=' + encodeURIComponent(this.selectedFile.path), { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + this.token } });
                if (res.ok) { this.showMessage('删除成功！', 'success'); this.loadFiles(); } else { this.showMessage('删除失败', 'error'); }
            } catch (e) { this.showMessage('删除失败', 'error'); }
        }
    }
}
</script>

        <div class="flex justify-between items-center mb-3">
            <h3 class="text-sm font-semibold text-gray-800 dark:text-white">编辑文件 - <span x-text="editingFile ? editingFile.name : ''"></span></h3>
            <button @click="closeEditorModal()" class="text-gray-500 hover:text-gray-700 text-xl">&times;</button>
        </div>
        <div class="flex-1 flex flex-col overflow-hidden">
            <div class="text-xs text-gray-500 dark:text-gray-400 mb-2" x-text="'路径: ' + (editingFile ? editingFile.path : '')"></div>
            <div class="relative flex-1" style="min-height: 400px;">
                <div class="absolute right-2 top-2 z-10">
                    <select class="lang-select text-xs bg-gray-700 text-white px-2 py-1 rounded" @change="initEditor()">

                        <option value="json">JSON</option>
                        <option value="shell">Bash</option>
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>

        </div>
        <div class="flex justify-between space-x-2 mt-3">
            <span class="text-xs text-gray-500">保存时自动生成时间戳备份 | Ctrl+Q 折叠 | Ctrl+S 保存</span>
            <div class="flex space-x-2">
                <button @click="closeEditorModal()" class="px-4 py-2 text-gray-700 dark:text-gray-300">取消</button>
                <button @click="saveFromEditor()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">保存</button>
            </div>
        </div>
    </div>
</div>
