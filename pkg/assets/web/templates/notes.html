<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记管理 - 部署管理系统</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link rel="stylesheet" href="https://unpkg.com/vditor@3.11.2/dist/index.css" />
    <style>
html { font-size: 12px; }
.dark .dark\:bg-gray-800 { background-color: #1f2937; }
.dark .dark\:bg-gray-900 { background-color: #111827; }
.dark .dark\:bg-gray-700 { background-color: #374151; }
.dark .dark\:text-white { color: #fff; }
.dark .dark\:text-gray-300 { color: #d1d5db; }
.dark .dark\:text-gray-400 { color: #9ca3af; }
.dark .dark\:border-gray-600 { border-color: #4b5563; }
.dark .dark\:border-gray-700 { border-color: #374151; }

/* Vditor dark theme override */
.vditor {
    border: 1px solid #374151 !important;
    border-radius: 8px;
    overflow: visible !important;
}
.vditor-toolbar {
    background: #1f2937 !important;
    border-bottom: 1px solid #374151 !important;
    border-radius: 8px 8px 0 0;
    padding: 4px 8px !important;
    overflow: visible !important;
}
.vditor-toolbar__item {
    margin: 0 2px !important;
}
.vditor-toolbar__item button {
    color: #9ca3af !important;
    border-radius: 4px !important;
    padding: 4px 8px !important;
    min-width: 28px !important;
    height: 28px !important;
}
.vditor-toolbar__item button:hover {
    color: #fff !important;
    background: #374151 !important;
}
.vditor-toolbar__item--current button {
    color: #3b82f6 !important;
    background: rgba(59, 130, 246, 0.1) !important;
}
.vditor-tooltipped {
    overflow: visible !important;
}
.vditor-tooltipped::after {
    z-index: 1000 !important;
    background: #1f2937 !important;
    color: #fff !important;
    border: 1px solid #4b5563 !important;
    border-radius: 4px !important;
    padding: 4px 8px !important;
    font-size: 12px !important;
    white-space: nowrap !important;
}
.vditor-ir, .vditor-wysiwyg, .vditor-sv {
    background: #111827 !important;
    color: #d1d5db !important;
    padding: 16px !important;
    min-height: 300px !important;
}
.vditor-ir--marker, .vditor-wysiwyg--marker {
    background: #1e3a5f !important;
}
.vditor-ir pre.vditor-ir__marker--pre {
    background: #1e1e1e !important;
}
.vditor-ir code.vditor-ir__marker--span {
    background: #374151 !important;
    color: #f87171 !important;
}
.vditor-ir__node--heading {
    color: #fff !important;
}
.vditor-ir__node--blockquote {
    border-left: 3px solid #3b82f6 !important;
    color: #9ca3af !important;
}
.vditor-counter {
    background: #1f2937 !important;
    color: #6b7280 !important;
    border-top: 1px solid #374151 !important;
    border-radius: 0 0 8px 8px !important;
}

/* Preview content styling */
.vditor-preview, .vditor-content {
    color: #d1d5db !important;
    line-height: 1.8 !important;
}
.vditor-preview h1, .vditor-content h1 { 
    font-size: 1.75em !important; 
    font-weight: 700 !important; 
    margin: 0.5em 0 !important; 
    color: #fff !important;
    border-bottom: 1px solid #374151 !important;
    padding-bottom: 0.3em !important;
}
.vditor-preview h2, .vditor-content h2 { 
    font-size: 1.5em !important; 
    font-weight: 600 !important; 
    margin: 0.5em 0 !important; 
    color: #fff !important;
    border-bottom: 1px solid #374151 !important;
    padding-bottom: 0.3em !important;
}
.vditor-preview h3, .vditor-content h3 { 
    font-size: 1.25em !important; 
    font-weight: 600 !important; 
    margin: 0.5em 0 !important; 
    color: #fff !important;
}
.vditor-preview p, .vditor-content p { 
    margin: 0.5em 0 !important; 
    white-space: pre-wrap !important;
}
.vditor-preview code, .vditor-content code {
    background: #374151 !important;
    color: #f87171 !important;
    padding: 0.15em 0.4em !important;
    border-radius: 3px !important;
    font-family: 'Consolas', 'Monaco', monospace !important;
}
.vditor-preview pre, .vditor-content pre {
    background: #1e1e1e !important;
    color: #d4d4d4 !important;
    padding: 1em !important;
    border-radius: 6px !important;
    overflow-x: auto !important;
    margin: 0.5em 0 !important;
}
.vditor-preview pre code, .vditor-content pre code {
    background: none !important;
    padding: 0 !important;
    color: inherit !important;
}
.vditor-preview blockquote, .vditor-content blockquote {
    border-left: 4px solid #3b82f6 !important;
    padding: 0.5em 1em !important;
    margin: 0.5em 0 !important;
    background: rgba(59, 130, 246, 0.1) !important;
    color: #9ca3af !important;
}
.vditor-preview ul, .vditor-preview ol, .vditor-content ul, .vditor-content ol {
    padding-left: 2em !important;
    margin: 0.5em 0 !important;
}
.vditor-preview li, .vditor-content li {
    margin: 0.2em 0 !important;
}
.vditor-preview a, .vditor-content a {
    color: #3b82f6 !important;
}
.vditor-preview hr, .vditor-content hr {
    border: none !important;
    border-top: 1px solid #374151 !important;
    margin: 1em 0 !important;
}
    </style>
    <script>
(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})()
function toggleTheme(){var d=document.documentElement;if(d.classList.contains('dark')){d.classList.remove('dark');localStorage.setItem('theme','light')}else{d.classList.add('dark');localStorage.setItem('theme','dark')}}
</script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script defer src="/static/js/alpine.min.js"></script>
    <script src="https://unpkg.com/vditor@3.11.2/dist/index.min.js"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen text-gray-900 dark:text-white text-sm" x-data="noteApp()" x-init="init()">
    <div id="copyToast" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#16a34a;color:white;padding:8px 16px;border-radius:4px;font-size:14px;z-index:9999;">已复制</div>
    <div class="min-h-screen flex flex-col">
        <header class=" bg-white dark:bg-gray-800  px-4 py-3 flex justify-between items-center border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center space-x-4">
                <h1 class="text-sm font-semibold">📝 笔记管理</h1>
            </div>
        </header>

        <main class="flex-1 p-6 overflow-auto">
            <div class="mb-4 flex justify-between items-center flex-wrap gap-2">
                <div class="flex items-center space-x-2">
                    <input type="text" x-model="search" @input="loadNotes()" placeholder="搜索..." class=" bg-white dark:bg-gray-800  border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm w-48">
                    <select x-model="categoryFilter" @change="loadNotes()" class=" bg-white dark:bg-gray-800  border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm">
                        <option value="">全部分类</option>
                        <template x-for="cat in categories" :key="cat"><template x-if="cat">
                            <option :value="cat" x-text="cat"></option>
                        </template></template>
                    </select>
                </div>
                <button @click="showAddModal=true" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white">➕ 新建笔记</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
                <template x-for="note in notes" :key="note.id">
                    <div class=" bg-white dark:bg-gray-800  rounded border border-gray-200 dark:border-gray-700 hover:border-blue-500 cursor-pointer" style="padding:0.5rem" @click="viewNote(note)">
                        <div class="flex justify-between items-start">
                            <h3 class="text-sm font-medium truncate" style="width:4rem" x-text="note.title"></h3>
                            <div class="flex items-center space-x-1">
                                <button @click.stop="copyNote(note.content)" class="text-gray-400 hover:text-white text-xs">📋</button>
                                <button @click.stop="editNote(note)" class="text-blue-400 hover:text-blue-300 text-xs">✏️</button>
                                <button @click.stop="deleteNote(note.id)" class="text-red-400 hover:text-red-300 text-xs">🗑️</button>
                            </div>
                        </div>
                        <p class="text-gray-500 text-xs mt-1 truncate" style="height:2rem" x-text="note.content || '暂无内容'"></p>
                    </div>
                </template>
            </div>

            <div x-show="notes.length === 0" class="text-center text-gray-500 py-12">
                暂无笔记，点击"新建笔记"添加
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal with Vditor -->
    <div x-show="showAddModal || showEditModal" @click.away="closeModal()" style="display:none;" x-init="$watch('showAddModal', val => { if(val) $nextTick(() => initVditor('')) }); $watch('showEditModal', val => { if(val) $nextTick(() => initVditor(noteForm.content)) })" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class=" bg-white dark:bg-gray-800  rounded w-full max-w-5xl border border-gray-200 dark:border-gray-700 flex flex-col" style="max-height: 90vh;">
            <!-- Header -->
            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 class="text-sm font-semibold" x-text="showEditModal ? '编辑笔记' : '新建笔记'"></h3>
                <button @click="closeModal()" class="text-gray-400 hover:text-white">✕</button>
            </div>
            <!-- Title & Category -->
            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 space-y-2">
                <input type="text" x-model="noteForm.title" placeholder="输入标题..." class="w-full bg-transparent text-lg font-semibold outline-none" style="border: none;">
                <div class="flex items-center space-x-2">
                    <input type="text" x-model="noteForm.category" list="categoryList" placeholder="分类（可选）" class="bg-transparent text-xs text-gray-500 outline-none" style="border: none; width: 120px;">
                    <datalist id="categoryList">
                        <template x-for="cat in categories" :key="cat"><template x-if="cat">
                            <option :value="cat"></option>
                        </template></template>
                    </datalist>
                </div>
            </div>
            <!-- Vditor Editor -->
            <div class="flex-1 overflow-auto p-4">
                <div id="vditor-editor"></div>
            </div>
            <!-- Footer -->
            <div class="px-4 py-3 border-t border-gray-200 dark:border-gray-700 flex justify-end items-center">
                <div class="flex space-x-2">
                    <button @click="closeModal()" class="px-4 py-2 text-gray-400 hover:text-white">取消</button>
                    <button @click="saveNote()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded text-white">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- View Modal -->
    <div x-show="showViewModal" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class=" bg-white dark:bg-gray-800  rounded w-full max-w-4xl border border-gray-200 dark:border-gray-700 flex flex-col" style="max-height: 90vh;">
            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex justify-between items-start">
                <div>
                    <h3 class="text-xl font-semibold" x-text="currentNote?.title"></h3>
                    <div class="flex items-center space-x-2 mt-1">
                        <span x-show="currentNote?.category" class="bg-gray-700 px-2 py-0.5 rounded text-xs" x-text="currentNote?.category"></span>
                        <span class="text-xs text-gray-400" x-text="'更新于 ' + new Date(currentNote?.updated_at).toLocaleString('zh-CN')"></span>
                    </div>
                </div>
                <div class="flex items-center space-x-2">
                    <button @click="editNote(currentNote)" class="text-blue-400 hover:text-blue-300 text-sm">✏️ 编辑</button>
                    <button @click="copyContent()" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-white">📋 复制</button>
                    <button @click="showViewModal=false" class="text-gray-400 hover:text-white">✕</button>
                </div>
            </div>
            <div class="flex-1 overflow-auto p-6">
                <div id="vditor-preview" class="vditor-content"></div>
            </div>
        </div>
    </div>

    <script>
    function noteApp() {
        return {
            notes: [],
            categories: [],
            search: '',
            categoryFilter: '',
            showAddModal: false,
            showEditModal: false,
            showViewModal: false,
            currentNote: null,
            noteForm: { title: '', content: '', category: '' },
            vditor: null,
            init() {
                this.checkAuth();
                this.loadNotes();
            },
            checkAuth() {
                var _t = localStorage.getItem('access_token');
                if (!_t) { window.location.href = '/login'; return; }
                try { var _p = JSON.parse(atob(_t.split('.')[1])); if (_p.exp * 1000 < Date.now()) { localStorage.removeItem('access_token'); window.location.href = '/login'; return; } } catch(e) {}
                const urlParams = new URLSearchParams(window.location.search);
                const urlToken = urlParams.get('token');
                if (urlToken) localStorage.setItem('access_token', urlToken);
                if (!localStorage.getItem('access_token')) window.location.href = '/login';
            },
            getToken() { return localStorage.getItem('access_token'); },
            async loadNotes() {
                try {
                    let url = '/api/notes?';
                    if (this.search) url += 'search=' + encodeURIComponent(this.search) + '&';
                    if (this.categoryFilter) url += 'category=' + encodeURIComponent(this.categoryFilter);
                    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + this.getToken() } });
                    const data = await res.json();
                    if (res.ok) {
                        this.notes = data.notes || [];
                        this.categories = [...new Set(this.notes.map(n => n.category).filter(c => c))];
                    }
                } catch (e) { console.error(e); }
            },
            viewNote(note) {
                this.currentNote = note;
                this.showViewModal = true;
                this.$nextTick(() => {
                    const previewEl = document.getElementById('vditor-preview');
                    if (previewEl) {
                        let content = note.content || '';
                        
                        // Ensure proper markdown line breaks
                        // Markdown needs double newline for paragraph, single newline for line break
                        // If content has only single newlines, convert them to double for proper rendering
                        if (content && !content.includes('\n\n')) {
                            // Single newlines - treat each line as a paragraph
                            content = content.split('\n').map(line => line.trim()).filter(line => line).join('\n\n');
                        }
                        
                        // Use Vditor's markdown rendering
                        if (typeof Vditor !== 'undefined') {
                            Vditor.preview(previewEl, content, {
                                mode: 'dark',
                                theme: 'dark',
                                markdown: {
                                    mark: true,
                                    sanitize: false,
                                    breaks: true  // Enable single newline as <br>
                                }
                            });
                        } else {
                            // Fallback: render with basic markdown
                            previewEl.innerHTML = this.renderMarkdownBasic(content);
                        }
                    }
                });
            },
            renderMarkdownBasic(text) {
                if (!text) return '';
                // Simple markdown rendering
                let html = text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    // Headings
                    .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                    .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                    // Bold and italic
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    // Code
                    .replace(/`(.*?)`/g, '<code>$1</code>')
                    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                    // Lists
                    .replace(/^\- (.*$)/gm, '<li>$1</li>')
                    .replace(/^\* (.*$)/gm, '<li>$1</li>')
                    // Line breaks - preserve them!
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/\n/g, '<br>');
                
                // Wrap in paragraphs if not already
                if (!html.startsWith('<')) {
                    html = '<p>' + html + '</p>';
                }
                return html;
            },
            editNote(note) {
                this.currentNote = note;
                this.noteForm = { title: note.title, content: note.content, category: note.category };
                this.showEditModal = true;
                this.showViewModal = false;
                // Vditor will be initialized by x-init watcher
            },
            initVditor(content) {
                // Destroy existing instance
                if (this.vditor) {
                    this.vditor.destroy();
                    this.vditor = null;
                }
                
                // Create new Vditor instance
                this.vditor = new Vditor('vditor-editor', {
                    height: 400,
                    mode: 'ir', // Instant Rendering mode (like Typora)
                    theme: 'classic',
                    toolbar: [
                        'emoji', 'headings', 'bold', 'italic', 'strike', '|',
                        'line', 'quote', 'list', 'ordered-list', 'check', '|',
                        'code', 'inline-code', 'link', 'table', '|',
                        'undo', 'redo', '|',
                        'fullscreen', 'edit-mode', '|',
                        {
                            name: 'more',
                            toolbar: [
                                'both', 'preview', 'devtools', 'info', 'help'
                            ]
                        }
                    ],
                    value: content,
                    placeholder: '输入 Markdown 内容...',
                    cache: {
                        enable: false
                    },
                    after: () => {
                        console.log('Vditor initialized');
                    }
                });
            },
            closeModal() {
                this.showAddModal = false;
                this.showEditModal = false;
                this.noteForm = { title: '', content: '', category: '' };
                if (this.vditor) {
                    this.vditor.destroy();
                    this.vditor = null;
                }
            },
            async saveNote() {
                if (!this.noteForm.title) { alert('请输入标题'); return; }
                
                // Get content from Vditor
                if (this.vditor) {
                    this.noteForm.content = this.vditor.getValue();
                }
                
                try {
                    const url = this.showEditModal ? '/api/notes/' + this.currentNote.id : '/api/notes';
                    const method = this.showEditModal ? 'PUT' : 'POST';
                    const res = await fetch(url, {
                        method: method,
                        headers: { 'Authorization': 'Bearer ' + this.getToken(), 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.noteForm)
                    });
                    if (res.ok) {
                        this.closeModal();
                        this.loadNotes();
                    } else {
                        const data = await res.json();
                        alert('保存失败：' + (data.error || '未知错误'));
                    }
                } catch (e) { alert('保存失败：' + e); }
            },
            async deleteNote(id) {
                if (!confirm('确定要删除这条笔记吗？')) return;
                try {
                    const res = await fetch('/api/notes/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + this.getToken() } });
                    if (res.ok) this.loadNotes();
                } catch (e) { console.error(e); }
            },
            async copyContent() {
                try {
                    await navigator.clipboard.writeText(this.currentNote?.content || '');
                    var el = document.getElementById('copyToast');
                    el.style.display = 'block';
                    setTimeout(function(){ el.style.display = 'none'; }, 1500);
                } catch (e) { console.log(e); }
            },
            async copyNote(content) {
                try {
                    await navigator.clipboard.writeText(content || '');
                    var el = document.getElementById('copyToast');
                    el.style.display = 'block';
                    setTimeout(function(){ el.style.display = 'none'; }, 1500);
                } catch (e) { console.log(e); }
            },
            logout() { localStorage.clear(); window.location.href = '/login'; }
        };
    }
    </script>
</body>
</html>
