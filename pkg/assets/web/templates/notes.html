<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记管理 - 部署管理系统</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <script src="/static/js/alpine.min.js" defer></script>
</head>
<body class="bg-gray-900 text-white" x-data="noteApp()" x-init="init()">
    <div id="copyToast" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#16a34a;color:white;padding:8px 16px;border-radius:4px;font-size:14px;z-index:9999;">已复制</div>
    <div class="min-h-screen flex flex-col">
        <header class="bg-gray-800 px-4 py-3 flex justify-between items-center border-b border-gray-700">
            <div class="flex items-center space-x-4">
                <a href="/" class="text-gray-400 hover:text-white">🏠主页</a>
                <h1 class="text-xl font-semibold">📝 笔记管理</h1>
            </div>
            <button @click="logout()" class="text-gray-400 hover:text-red-400">🚪退出</button>
        </header>

        <main class="flex-1 p-6 overflow-auto">
            <div class="mb-4 flex justify-between items-center flex-wrap gap-2">
                <div class="flex items-center space-x-2">
                    <input type="text" x-model="search" @input="loadNotes()" placeholder="搜索..." class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm w-48">
                    <select x-model="categoryFilter" @change="loadNotes()" class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm">
                        <option value="">全部分类</option>
                        <template x-for="cat in categories" :key="cat"><template x-if="cat">
                            <option :value="cat" x-text="cat"></option>
                        </template></template>
                    </select>
                </div>
                <button @click="showAddModal=true" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">➕ 新建笔记</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
                <template x-for="note in notes" :key="note.id">
                    <div class="bg-gray-800 rounded border border-gray-700 hover:border-blue-500 cursor-pointer" style="padding:0.5rem" @click="viewNote(note)">
                        <div class="flex justify-between items-start">
                            <h3 class="text-sm font-medium truncate" style="width:4rem" x-text="note.title"></h3>
                            <div class="flex items-center space-x-1">
                                <button @click.stop="copyNote(note.content)" class="text-gray-400 hover:text-white text-xs">📋</button>
                                <button @click.stop="editNote(note)" class="text-blue-400 hover:text-blue-300 text-xs">✏️</button>
                                <button @click.stop="deleteNote(note.id)" class="text-red-400 hover:text-red-300 text-xs">🗑️</button>
                            </div>
                        </div>
                        <p class="text-gray-500 text-xs mt-1 truncate" style="height:2rem" x-text="note.content || '暂无内容'"></p>
                    </div>
                </template>
            </div>

            <div x-show="notes.length === 0" class="text-center text-gray-500 py-12">
                暂无笔记，点击"新建笔记"添加
            </div>
        </main>
    </div>

    <div x-show="showAddModal || showEditModal" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg p-6 w-full max-w-2xl border border-gray-700">
            <h3 class="text-lg font-semibold mb-4" x-text="showEditModal ? '编辑笔记' : '新建笔记'"></h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">标题 *</label>
                    <input type="text" x-model="noteForm.title" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">分类</label>
                    <input type="text" x-model="noteForm.category" list="categoryList" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white">
                    <datalist id="categoryList">
                        <template x-for="cat in categories" :key="cat"><template x-if="cat">
                            <option :value="cat"></option>
                        </template></template>
                    </datalist>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">内容</label>
                    <textarea x-model="noteForm.content" rows="10" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white font-mono text-sm"></textarea>
                </div>
            </div>
            <div class="flex justify-end space-x-2 mt-6">
                <button @click="closeModal()" class="px-4 py-2 text-gray-400 hover:text-white">取消</button>
                <button @click="saveNote()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded">保存</button>
            </div>
        </div>
    </div>

    <div x-show="showViewModal" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg p-6 w-full max-w-3xl border border-gray-700 max-h-[80vh] overflow-auto">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-xl font-semibold" x-text="currentNote?.title"></h3>
                <div class="flex items-center space-x-2">
                    <button @click="editNote(currentNote)" class="text-blue-400 hover:text-blue-300">✏️ 编辑</button>
                    <button @click="showViewModal=false" class="text-gray-400 hover:text-white">✕</button>
                </div>
            </div>
            <div class="mb-4 flex items-center justify-between text-sm text-gray-400">
                <div>
                    <span x-show="currentNote?.category" class="bg-gray-700 px-2 py-0.5 rounded mr-2" x-text="currentNote?.category"></span>
                    <span x-text="'更新于 ' + new Date(currentNote?.updated_at).toLocaleString('zh-CN')"></span>
                </div>
                <button @click="copyContent()" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">📋 复制</button>
            </div>
            <div class="bg-gray-900 rounded text-white whitespace-pre-wrap font-mono text-sm" style="padding:1rem;max-height:50vh;overflow-y:auto" x-text="currentNote?.content || '暂无内容'"></div>
        </div>
    </div>

    <script>
    function noteApp() {
        return {
            notes: [],
            categories: [],
            search: '',
            categoryFilter: '',
            showAddModal: false,
            showEditModal: false,
            showViewModal: false,
            currentNote: null,
            noteForm: { title: '', content: '', category: '' },
            init() {
                this.checkAuth();
                this.loadNotes();
            },
            checkAuth() {
                const urlParams = new URLSearchParams(window.location.search);
                const urlToken = urlParams.get('token');
                if (urlToken) localStorage.setItem('access_token', urlToken);
                if (!localStorage.getItem('access_token')) window.location.href = '/login';
            },
            getToken() { return localStorage.getItem('access_token'); },
            async loadNotes() {
                try {
                    let url = '/api/notes?';
                    if (this.search) url += 'search=' + encodeURIComponent(this.search) + '&';
                    if (this.categoryFilter) url += 'category=' + encodeURIComponent(this.categoryFilter);
                    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + this.getToken() } });
                    const data = await res.json();
                    if (res.ok) {
                        this.notes = data.notes || [];
                        this.categories = [...new Set(this.notes.map(n => n.category).filter(c => c))];
                    }
                } catch (e) { console.error(e); }
            },
            viewNote(note) {
                this.currentNote = note;
                this.showViewModal = true;
            },
            editNote(note) {
                this.currentNote = note;
                this.noteForm = { title: note.title, content: note.content, category: note.category };
                this.showEditModal = true;
                this.showViewModal = false;
            },
            async copyContent() {
                try {
                    await navigator.clipboard.writeText(this.currentNote?.content || '');
                    var el = document.getElementById('copyToast');
                    el.style.display = 'block';
                    setTimeout(function(){ el.style.display = 'none'; }, 1500);
                } catch (e) { console.log(e); }
            },
            async copyNote(content) {
                try {
                    await navigator.clipboard.writeText(content || '');
                    var el = document.getElementById('copyToast');
                    el.style.display = 'block';
                    setTimeout(function(){ el.style.display = 'none'; }, 1500);
                } catch (e) { console.log(e); }
            },
            closeModal() {
                this.showAddModal = false;
                this.showEditModal = false;
                this.noteForm = { title: '', content: '', category: '' };
            },
            async saveNote() {
                if (!this.noteForm.title) { alert('请输入标题'); return; }
                try {
                    const url = this.showEditModal ? '/api/notes/' + this.currentNote.id : '/api/notes';
                    const method = this.showEditModal ? 'PUT' : 'POST';
                    const res = await fetch(url, {
                        method: method,
                        headers: { 'Authorization': 'Bearer ' + this.getToken(), 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.noteForm)
                    });
                    if (res.ok) {
                        this.closeModal();
                        this.loadNotes();
                    } else {
                        const data = await res.json();
                        alert('保存失败：' + (data.error || '未知错误'));
                    }
                } catch (e) { alert('保存失败：' + e); }
            },
            async deleteNote(id) {
                if (!confirm('确定要删除这条笔记吗？')) return;
                try {
                    const res = await fetch('/api/notes/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + this.getToken() } });
                    if (res.ok) this.loadNotes();
                } catch (e) { console.error(e); }
            },
            logout() { localStorage.clear(); window.location.href = '/login'; }
        };
    }
    </script>
</body>
</html>
