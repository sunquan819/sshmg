<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常用工具 - 部署管理系统</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <style>
body { font-size: 10px; }
.dark .dark\:bg-gray-800 { background-color: #1f2937; }
.dark .dark\:bg-gray-900 { background-color: #111827; }
.dark .dark\:bg-gray-700 { background-color: #374151; }
.dark .dark\:bg-gray-600 { background-color: #4b5563; }
.dark .dark\:bg-blue-500 { background-color: #3b82f6; }
.dark .dark\:bg-blue-900 { background-color: #1e3a5f; }
.dark .dark\:bg-green-500 { background-color: #22c55e; }
.dark .dark\:bg-green-900 { background-color: #14532d; }
.dark .dark\:bg-purple-500 { background-color: #a855f7; }
.dark .dark\:bg-purple-900 { background-color: #3b0764; }
.dark .dark\:bg-red-500 { background-color: #ef4444; }
.dark .dark\:bg-red-900 { background-color: #7f1d1d; }
.dark .dark\:bg-yellow-900 { background-color: #713f12; }
.dark .dark\:text-white { color: #fff; }
.dark .dark\:text-gray-300 { color: #d1d5db; }
.dark .dark\:text-gray-400 { color: #9ca3af; }
.dark .dark\:text-blue-200 { color: #bfdbfe; }
.dark .dark\:text-blue-400 { color: #60a5fa; }
.dark .dark\:text-green-200 { color: #bbf7d0; }
.dark .dark\:text-green-400 { color: #4ade80; }
.dark .dark\:text-purple-200 { color: #e9d5ff; }
.dark .dark\:text-red-200 { color: #fecaca; }
.dark .dark\:text-red-400 { color: #f87171; }
.dark .dark\:text-yellow-200 { color: #fef08a; }
.dark .dark\:border-gray-600 { border-color: #4b5563; }
.dark .dark\:border-gray-700 { border-color: #374151; }
.dark .dark\:divide-gray-700 > * + * { border-color: #374151; }
.dark .dark\:hover\:bg-gray-600:hover { background-color: #4b5563; }
.dark .dark\:hover\:bg-gray-700:hover { background-color: #374151; }
.dark .dark\:hover\:text-gray-200:hover { color: #e5e7eb; }
.dark .dark\:hover\:text-gray-300:hover { color: #d1d5db; }
.dark .dark\:hover\:text-white:hover { color: #fff; }
</style>
    </head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen text-gray-900 dark:text-white text-sm" x-data="toolApp()" x-init="init()">
    <div class="min-h-screen flex flex-col">
        <header class=" bg-white dark:bg-gray-800  px-4 py-3 flex justify-between items-center border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center space-x-4">
                <a href="/" class="text-gray-400 hover:text-white">🏠主页</a>
                <a onclick="toggleTheme()" class="cursor-pointer text-gray-400 hover:text-white">🌓</a>
                <h1 class="text-sm font-semibold">🔧 常用工具</h1>
            </div>
            <button @click="loadServers()" class="text-gray-400 hover:text-white text-sm">🔄 刷新服务器</button>
        </header>

        <main class="flex-1 p-6 overflow-auto">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 space-y-4">
                    <div class=" bg-white dark:bg-gray-800  rounded p-4 border border-gray-200 dark:border-gray-700">
                        <h3 class="text-sm font-semibold mb-4">选择服务器</h3>
                        <select x-model="selectedServerId" class="w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-gray-900 dark:text-white">
                            <option value="">-- 选择服务器 --</option>
                            <template x-for="server in servers" :key="server.id">
                                <option :value="server.id" x-text="server.name + ' (' + server.ip + ')'"></option>
                            </template>
                        </select>
                    </div>

                    <div class=" bg-white dark:bg-gray-800  rounded p-4 border border-gray-200 dark:border-gray-700">
                        <h3 class="text-sm font-semibold mb-4">选择工具</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <template x-for="tool in tools" :key="tool.id">
                                <button @click="selectTool(tool)" :class="selectedTool?.id === tool.id ? 'bg-blue-600' : 'bg-gray-700 hover:bg-gray-600'" class="px-3 py-2 rounded text-sm transition text-white" x-text="tool.name"></button>
                            </template>
                        </div>
                    </div>

                    <div class=" bg-white dark:bg-gray-800  rounded p-4 border border-gray-200 dark:border-gray-700">
                        <h3 class="text-sm font-semibold mb-4" x-text="'执行 ' + (selectedTool?.name || '')"></h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1" x-text="selectedTool?.targetLabel || '目标'"></label>
                                <input type="text" x-model="target" :placeholder="selectedTool?.placeholder || '请输入目标'" class="w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-gray-900 dark:text-white">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">选项</label>
                                <input type="text" x-model="options" :placeholder="selectedTool?.optionsPlaceholder || '可选参数'" class="w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-gray-900 dark:text-white">
                            </div>
                            <button @click="execTool()" :disabled="!selectedServerId || !target || executing" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 disabled:cursor-not-allowed px-4 py-2 rounded transition text-white">
                                <span x-show="!executing">▶️ 执行</span>
                                <span x-show="executing">⏳ 执行中...</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class=" bg-white dark:bg-gray-800  rounded p-4 border border-gray-200 dark:border-gray-700 h-full">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-sm font-semibold">执行结果</h3>
                            <button @click="clearOutput()" class="text-gray-400 hover:text-white text-sm">🗑️ 清除</button>
                        </div>
                        <div class="bg-gray-900 rounded p-4 h-[calc(100vh-220px)] overflow-auto font-mono text-sm whitespace-pre-wrap" x-text="output || '选择服务器和工具后执行...'" :class="error ? 'text-red-400' : 'text-green-400'"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
    function toolApp() {
        return {
            servers: [],
            selectedServerId: '',
            tools: [
                { id: 'ping', name: '📡 Ping', targetLabel: '目标主机', placeholder: '如: 8.8.8.8', optionsPlaceholder: '如: -c 10', defaultOptions: '-c 4' },
                { id: 'traceroute', name: '🛤️ Traceroute', targetLabel: '目标主机', placeholder: '如: 8.8.8.8', optionsPlaceholder: '可选参数' },
                { id: 'curl', name: '🌐 Curl', targetLabel: 'URL', placeholder: '如: https://httpbin.org/get', optionsPlaceholder: '如: -I -v', defaultOptions: '-s' },
                { id: 'telnet', name: '📞 Telnet', targetLabel: '主机:端口', placeholder: '如: 192.168.1.1:22', optionsPlaceholder: '' },
                { id: 'nslookup', name: '🔍 NSLookup', targetLabel: '域名', placeholder: '如: google.com', optionsPlaceholder: '' },
                { id: 'dig', name: '🔎 Dig', targetLabel: '域名', placeholder: '如: google.com', optionsPlaceholder: '可选参数' },
                { id: 'host', name: '📋 Host', targetLabel: '域名', placeholder: '如: google.com', optionsPlaceholder: '' },
                { id: 'nc', name: '🔌 Netcat', targetLabel: '主机:端口', placeholder: '如: 192.168.1.1 22', optionsPlaceholder: '如: -zv' },
                { id: 'tcpdump', name: '📦 Tcpdump', targetLabel: '端口', placeholder: '如: 8080', optionsPlaceholder: 'count=100 host=1.2.3.4', defaultOptions: 'count=100' },
            ],
            selectedTool: null,
            target: '',
            options: '',
            output: '',
            error: false,
            executing: false,
            init() {
                this.checkAuth();
                this.loadServers();
            },
            checkAuth() {
                var _t = localStorage.getItem('access_token');
                if (!_t) { window.location.href = '/login'; return; }
                try { var _p = JSON.parse(atob(_t.split('.')[1])); if (_p.exp * 1000 < Date.now()) { localStorage.removeItem('access_token'); window.location.href = '/login'; return; } } catch(e) {}
                const urlParams = new URLSearchParams(window.location.search);
                const urlToken = urlParams.get('token');
                if (urlToken) localStorage.setItem('access_token', urlToken);
                if (!localStorage.getItem('access_token')) window.location.href = '/login';
            },
            getToken() { return localStorage.getItem('access_token'); },
            async loadServers() {
                try {
                    const res = await fetch('/api/servers', { headers: { 'Authorization': 'Bearer ' + this.getToken() } });
                    const data = await res.json();
                    if (res.ok) this.servers = data.servers || [];
                } catch (e) { console.error(e); }
            },
            selectTool(tool) {
                this.selectedTool = tool;
                this.options = tool.defaultOptions || '';
                this.output = '';
                this.error = false;
            },
            clearOutput() {
                this.output = '';
                this.error = false;
            },
            async execTool() {
                if (!this.selectedServerId || !this.target || !this.selectedTool) return;
                this.executing = true;
                this.output = '';
                this.error = false;
                try {
                    const res = await fetch('/api/tools/exec', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + this.getToken(), 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            server_id: parseInt(this.selectedServerId),
                            tool: this.selectedTool.id,
                            target: this.target,
                            options: this.options
                        })
                    });
                    const data = await res.json();
                    if (data.error) {
                        this.output = '错误: ' + data.error;
                        this.error = true;
                    } else {
                        this.output = data.output || '无输出';
                    }
                } catch (e) {
                    this.output = '执行失败: ' + e;
                    this.error = true;
                }
                this.executing = false;
            }
        };
    }
    </script>
</body>
</html>
