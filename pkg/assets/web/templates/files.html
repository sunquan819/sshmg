<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理 - 部署管理系统</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <style>
body { font-size: 10px; }
.dark .dark\:bg-gray-800 { background-color: #1f2937; }
.dark .dark\:bg-gray-900 { background-color: #111827; }
.dark .dark\:bg-gray-700 { background-color: #374151; }
.dark .dark\:bg-gray-600 { background-color: #4b5563; }
.dark .dark\:bg-blue-500 { background-color: #3b82f6; }
.dark .dark\:bg-blue-900 { background-color: #1e3a5f; }
.dark .dark\:bg-green-500 { background-color: #22c55e; }
.dark .dark\:bg-green-900 { background-color: #14532d; }
.dark .dark\:bg-purple-500 { background-color: #a855f7; }
.dark .dark\:bg-purple-900 { background-color: #3b0764; }
.dark .dark\:bg-red-500 { background-color: #ef4444; }
.dark .dark\:bg-red-900 { background-color: #7f1d1d; }
.dark .dark\:bg-yellow-900 { background-color: #713f12; }
.dark .dark\:text-white { color: #fff; }
.dark .dark\:text-gray-300 { color: #d1d5db; }
.dark .dark\:text-gray-400 { color: #9ca3af; }
.dark .dark\:text-blue-200 { color: #bfdbfe; }
.dark .dark\:text-blue-400 { color: #60a5fa; }
.dark .dark\:text-green-200 { color: #bbf7d0; }
.dark .dark\:text-green-400 { color: #4ade80; }
.dark .dark\:text-purple-200 { color: #e9d5ff; }
.dark .dark\:text-red-200 { color: #fecaca; }
.dark .dark\:text-red-400 { color: #f87171; }
.dark .dark\:text-yellow-200 { color: #fef08a; }
.dark .dark\:border-gray-600 { border-color: #4b5563; }
.dark .dark\:border-gray-700 { border-color: #374151; }
.dark .dark\:divide-gray-700 > * + * { border-color: #374151; }
.dark .dark\:hover\:bg-gray-600:hover { background-color: #4b5563; }
.dark .dark\:hover\:bg-gray-700:hover { background-color: #374151; }
.dark .dark\:hover\:text-gray-200:hover { color: #e5e7eb; }
.dark .dark\:hover\:text-gray-300:hover { color: #d1d5db; }
.dark .dark\:hover\:text-white:hover { color: #fff; }
</style>
    <script>tailwind.config={darkMode:'media'}</script>
    <style>
        .file-item { cursor: pointer; padding: 6px 12px; border-radius: 4px; }
        .file-item:hover { background-color: rgba(255,255,255,0.1); }
        .file-item.selected { background-color: rgba(59,130,246,0.3); border: 1px solid #3b82f6; }
        .drop-zone { border: 2px dashed #3b82f6; background: rgba(59,130,246,0.1); }
        .drop-zone.dragover { border-color: #10b981; background: rgba(16,185,129,0.2); }
    </style>
    <script src="/static/js/alpine.min.js" defer></script>

</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen text-gray-900 dark:text-white" x-data="filesApp()" x-init="init()">
    <div class="min-h-screen flex flex-col">
        <header class="bg-white dark:bg-gray-800 px-4 py-3 flex justify-between items-center border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center space-x-4">
                <a href="/" class="text-gray-400 hover:text-white">🏠主页</a>
                <h1 class="text-xl font-semibold">📁 文件管理</h1>
            </div>
            <div class="flex items-center space-x-2">
                <button @click="showUploadModal = true; uploadTargetPath = currentPath" class="bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded text-sm text-white">⬆️ 上传文件</button>
                <button @click="showNewFolderModal = true" class="bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded text-sm text-white">📁 新建目录</button>
                <button @click="logout()" class="text-gray-400 hover:text-red-400">🚪退出</button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col">
                <div class="p-3 border-b border-gray-200 dark:border-gray-700">
                    <h2 class="text-sm font-semibold text-gray-300">目录</h2>
                </div>
                <div class="flex-1 overflow-y-auto p-2">
                    <template x-for="dir in directories" :key="dir.path">
                        <div @click="navigateTo(dir.path)" 
                             :class="currentPath === dir.path ? 'bg-blue-600' : 'hover:bg-gray-700'"
                             class="file-item mb-1 rounded cursor-pointer flex items-center">
                            <span class="mr-2">📁</span>
                            <span class="text-sm truncate" x-text="dir.name || '根目录'"></span>
                        </div>
                    </template>
                    <div @click="navigateTo('/')"
                         :class="currentPath === '/' ? 'bg-blue-600' : 'hover:bg-gray-700'"
                         class="file-item mb-1 rounded cursor-pointer flex items-center">
                        <span class="mr-2">🏠</span>
                        <span class="text-sm">根目录</span>
                    </div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col overflow-hidden">
                <div class="bg-white dark:bg-gray-800 px-4 py-2 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <button @click="goUp()" class="text-gray-400 hover:text-white px-2 py-1 rounded" :disabled="currentPath === '/'">
                            ⬆️ 上级
                        </button>
                        <div class="flex items-center bg-gray-700 rounded px-2 py-1">
                            <span class="text-sm text-gray-400">路径:</span>
                            <input type="text" x-model="currentPath" @keyup.enter="navigateTo(currentPath)" 
                                   class="bg-transparent text-white text-sm px-2 py-0 focus:outline-none w-64">
                            <button @click="loadFiles()" class="text-blue-400 hover:text-blue-300 text-sm px-1">Go</button>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 text-sm text-gray-400">
                        <span x-text="files.length + ' 个文件/目录'"></span>
                        <button @click="loadFiles()" class="text-gray-400 hover:text-white">🔄</button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-4">
                    <div class="drop-zone rounded p-4 mb-4 text-center text-gray-400"
                         @dragover.prevent="dragover = true" 
                         @dragleave.prevent="dragover = false"
                         @drop.prevent="handleDrop($event)"
                         :class="dragover ? 'dragover' : ''">
                        <span x-show="!dragover">拖拽文件到这里上传</span>
                        <span x-show="dragover">释放文件开始上传</span>
                    </div>

                    <div x-show="loading" class="text-center text-gray-500 py-8">
                        <svg class="animate-spin h-8 w-8 mx-auto text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>

                    <div x-show="!loading && files.length === 0" class="text-center text-gray-500 py-8">
                        空目录
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2">
                        <template x-for="file in files" :key="file.path">
                            <div @click="selectFile(file)"
                                 @dblclick="openItem(file)"
                                 :class="selectedFiles.includes(file.path) ? 'selected' : ''"
                                 class="file-item border border-gray-200 dark:border-gray-700 rounded flex items-center p-3">
                                <span class="mr-2 text-lg" x-text="getFileIcon(file)"></span>
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-medium truncate" x-text="file.name"></p>
                                    <p class="text-xs text-gray-500">
                                        <span x-show="!file.is_dir" x-text="formatSize(file.size)"></span>
                                        <span class="ml-2" x-text="file.mod_time"></span>
                                    </p>
                                </div>
                                <div class="flex items-center space-x-1 ml-2">
                                    <button @click.stop="downloadFile(file)" x-show="!file.is_dir" class="text-blue-400 hover:text-blue-300" title="下载">⬇️</button>
                                    <button @click.stop="renameFile(file)" class="text-yellow-400 hover:text-yellow-300" title="重命名">✏️</button>
                                    <button @click.stop="deleteFile(file)" class="text-red-400 hover:text-red-300" title="删除">🗑️</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 px-4 py-2 border-t border-gray-200 dark:border-gray-700 flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <button @click="selectAll()" class="text-gray-400 hover:text-white text-sm px-2 py-1 rounded">全选</button>
                        <button @click="selectedFiles = []" class="text-gray-400 hover:text-white text-sm px-2 py-1 rounded">取消</button>
                        <span x-show="selectedFiles.length > 0" class="text-sm text-gray-400">
                            已选择 <span x-text="selectedFiles.length"></span> 个
                        </span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button @click="downloadSelected()" x-show="selectedFiles.length > 0" class="bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded text-sm text-white">⬇️ 下载选中</button>
                        <button @click="deleteSelected()" x-show="selectedFiles.length > 0" class="bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded text-sm text-white">🗑️ 删除选中</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div x-show="showUploadModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white dark:bg-gray-800 rounded p-6 w-full max-w-md border border-gray-200 dark:border-gray-700">
            <h3 class="text-sm font-semibold mb-4">上传文件</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">目标目录</label>
                    <input type="text" x-model="uploadTargetPath" class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded text-gray-900 dark:text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">选择文件</label>
                    <input type="file" id="uploadFileInput" multiple class="w-full text-sm text-gray-400">
                </div>
                <div x-show="uploadProgress > 0" class="mt-2">
                    <div class="w-full bg-gray-700 rounded h-2">
                        <div class="bg-green-600 h-2 rounded" :style="'width: ' + uploadProgress + '%'"></div>
                    </div>
                    <p class="text-xs text-gray-400 mt-1" x-text="uploadStatus"></p>
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button @click="showUploadModal = false" class="px-4 py-2 bg-gray-700 rounded hover:bg-gray-600 text-white">取消</button>
                <button @click="uploadFiles()" class="px-4 py-2 bg-green-600 rounded hover:bg-green-700 text-white">上传</button>
            </div>
        </div>
    </div>

    <div x-show="showNewFolderModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white dark:bg-gray-800 rounded p-6 w-full max-w-sm border border-gray-200 dark:border-gray-700">
            <h3 class="text-sm font-semibold mb-4">新建目录</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">父目录</label>
                    <input type="text" x-model="currentPath" class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded text-gray-900 dark:text-white" readonly>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">目录名称</label>
                    <input type="text" x-model="newFolderName" class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded text-gray-900 dark:text-white" placeholder="输入目录名">
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button @click="showNewFolderModal = false" class="px-4 py-2 bg-gray-700 rounded hover:bg-gray-600 text-white">取消</button>
                <button @click="createFolder()" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700 text-white">创建</button>
            </div>
        </div>
    </div>

    <div x-show="showRenameModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
        <div class="bg-white dark:bg-gray-800 rounded p-6 w-full max-w-sm border border-gray-200 dark:border-gray-700">
            <h3 class="text-sm font-semibold mb-4">重命名</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">新名称</label>
                    <input type="text" x-model="renameNewName" class="w-full px-3 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded text-gray-900 dark:text-white">
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6">
                <button @click="showRenameModal = false" class="px-4 py-2 bg-gray-700 rounded hover:bg-gray-600 text-white">取消</button>
                <button @click="doRename()" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700 text-white">确定</button>
            </div>
        </div>
    </div>

    <div x-show="showMessage" class="fixed top-4 right-4 px-4 py-2 rounded text-gray-900 dark:text-white z-50"
         :class="messageType === 'error' ? 'bg-red-600' : 'bg-green-600'" style="display: none;" x-text="message"></div>

<script>
function filesApp() {
    return {
        token: '',
        currentPath: '/',
        files: [],
        directories: [],
        selectedFiles: [],
        loading: false,
        dragover: false,
        showUploadModal: false,
        showNewFolderModal: false,
        showRenameModal: false,
        uploadTargetPath: '/',
        uploadProgress: 0,
        uploadStatus: '',
        newFolderName: '',
        renameFileObj: null,
        renameNewName: '',
        showMessage: false,
        message: '',
        messageType: 'success',

            init() {
                var _t = localStorage.getItem('access_token');
                if (!_t) { window.location.href = '/login'; return; }
                try { var _p = JSON.parse(atob(_t.split('.')[1])); if (_p.exp * 1000 < Date.now()) { localStorage.removeItem('access_token'); window.location.href = '/login'; return; } } catch(e) {}
                const params = new URLSearchParams(window.location.search);
                this.token = params.get('token');
                if (!this.token) {
                    this.token = localStorage.getItem('access_token');
                }
                if (!this.token) {
                    window.location.href = '/login';
                    return;
                }
            this.loadFiles();
            this.loadDirectories();
        },

        getToken() { return this.token || localStorage.getItem('access_token'); },
        logout() { localStorage.removeItem('access_token'); window.location.href = '/login'; },

        async loadFiles() {
            this.loading = true;
            try {
                const res = await fetch('/api/local-files?path=' + encodeURIComponent(this.currentPath), {
                    headers: { 'Authorization': 'Bearer ' + this.getToken() }
                });
                const data = await res.json();
                if (res.ok) {
                    this.files = data.files || [];
                    this.currentPath = data.path || '/';
                } else {
                    this.showToast(data.error || '加载失败', 'error');
                }
            } catch (e) {
                this.showToast('加载失败', 'error');
            }
            this.loading = false;
        },

        async loadDirectories() {
            try {
                const res = await fetch('/api/local-files?path=/', {
                    headers: { 'Authorization': 'Bearer ' + this.getToken() }
                });
                const data = await res.json();
                if (res.ok) {
                    this.directories = (data.files || []).filter(f => f.is_dir);
                }
            } catch (e) {}
        },

        navigateTo(path) {
            this.currentPath = path;
            this.selectedFiles = [];
            this.loadFiles();
        },

        goUp() {
            if (this.currentPath === '/') return;
            const parts = this.currentPath.split('/').filter(p => p);
            parts.pop();
            this.currentPath = '/' + parts.join('/') || '/';
            this.selectedFiles = [];
            this.loadFiles();
        },

        selectFile(file) {
            const idx = this.selectedFiles.indexOf(file.path);
            if (idx >= 0) {
                this.selectedFiles.splice(idx, 1);
            } else {
                this.selectedFiles.push(file.path);
            }
        },

        selectAll() {
            this.selectedFiles = this.files.map(f => f.path);
        },

        openItem(file) {
            if (file.is_dir) {
                this.navigateTo(file.path);
            } else {
                this.downloadFile(file);
            }
        },

        getFileIcon(file) {
            if (file.is_dir) return '📁';
            const name = file.name.toLowerCase();
            if (name.endsWith('.zip') || name.endsWith('.tar') || name.endsWith('.gz') || name.endsWith('.rar')) return '📦';
            if (name.endsWith('.exe') || name.endsWith('.msi')) return '⚙️';
            if (name.endsWith('.sh') || name.endsWith('.bash')) return '📜';
            if (name.endsWith('.py')) return '🐍';
            if (name.endsWith('.js') || name.endsWith('.ts')) return '📄';
            if (name.endsWith('.json') || name.endsWith('.xml') || name.endsWith('.yaml') || name.endsWith('.yml')) return '📋';
            if (name.endsWith('.md') || name.endsWith('.txt')) return '📝';
            if (name.endsWith('.jpg') || name.endsWith('.png') || name.endsWith('.gif')) return '🖼️';
            if (name.endsWith('.pdf')) return '📕';
            return '📄';
        },

        formatSize(bytes) {
            if (!bytes) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0, size = bytes;
            while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
            return size.toFixed(1) + ' ' + units[i];
        },

        async createFolder() {
            if (!this.newFolderName) {
                this.showToast('请输入目录名', 'error');
                return;
            }
            const fullPath = this.currentPath === '/' ? '/' + this.newFolderName : this.currentPath + '/' + this.newFolderName;
            try {
                const res = await fetch('/api/local-files/mkdir', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + this.getToken(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: fullPath })
                });
                if (res.ok) {
                    this.showNewFolderModal = false;
                    this.newFolderName = '';
                    this.loadFiles();
                    this.loadDirectories();
                    this.showToast('目录创建成功', 'success');
                } else {
                    const data = await res.json();
                    this.showToast(data.error || '创建失败', 'error');
                }
            } catch (e) {
                this.showToast('创建失败', 'error');
            }
        },

        async uploadFiles() {
            const fileInput = document.getElementById('uploadFileInput');
            const files = fileInput.files;
            if (!files || files.length === 0) {
                this.showToast('请选择文件', 'error');
                return;
            }

            this.uploadProgress = 0;
            this.uploadStatus = '准备上传...';
            let uploaded = 0;

            for (let i = 0; i < files.length; i++) {
                this.uploadStatus = '上传 ' + (i + 1) + '/' + files.length + ': ' + files[i].name;

                const formData = new FormData();
                formData.append('file', files[i]);
                formData.append('path', this.uploadTargetPath);

                try {
                    const res = await fetch('/api/local-files/upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + this.getToken() },
                        body: formData
                    });
                    if (res.ok) {
                        uploaded++;
                    }
                } catch (e) {}

                this.uploadProgress = Math.round(((i + 1) / files.length) * 100);
            }

            this.uploadStatus = '完成: 上传 ' + uploaded + '/' + files.length;
            if (uploaded === files.length) {
                this.showToast('上传成功', 'success');
            } else {
                this.showToast('部分文件上传失败', 'error');
            }

            fileInput.value = '';
            this.showUploadModal = false;
            this.uploadProgress = 0;
            this.loadFiles();
        },

        handleDrop(event) {
            this.dragover = false;
            const files = event.dataTransfer.files;
            if (!files || files.length === 0) return;

            this.uploadTargetPath = this.currentPath;
            const formData = new FormData();
            formData.append('path', this.uploadTargetPath);

            let uploadedCount = 0;
            for (let i = 0; i < files.length; i++) {
                formData.append('file', files[i]);
            }

            this.showToast('正在上传...', 'success');
            fetch('/api/local-files/upload', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + this.getToken() },
                body: formData
            }).then(res => res.json()).then(data => {
                this.showToast('上传完成', 'success');
                this.loadFiles();
            }).catch(e => {
                this.showToast('上传失败', 'error');
            });
        },

        downloadFile(file) {
            const url = '/api/local-files/download?path=' + encodeURIComponent(file.path) + '&token=' + this.getToken();
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        },

        downloadSelected() {
            this.selectedFiles.forEach(path => {
                const file = this.files.find(f => f.path === path);
                if (file && !file.is_dir) {
                    this.downloadFile(file);
                }
            });
        },

        async deleteFile(file) {
            if (!confirm('确定删除 "' + file.name + '"?')) return;

            try {
                const res = await fetch('/api/local-files?path=' + encodeURIComponent(file.path), {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + this.getToken() }
                });
                if (res.ok) {
                    this.loadFiles();
                    this.loadDirectories();
                    this.showToast('删除成功', 'success');
                } else {
                    const data = await res.json();
                    this.showToast(data.error || '删除失败', 'error');
                }
            } catch (e) {
                this.showToast('删除失败', 'error');
            }
        },

        async deleteSelected() {
            if (!confirm('确定删除 ' + this.selectedFiles.length + ' 个文件/目录?')) return;

            let deleted = 0;
            for (const path of this.selectedFiles) {
                try {
                    const res = await fetch('/api/local-files?path=' + encodeURIComponent(path), {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + this.getToken() }
                    });
                    if (res.ok) deleted++;
                } catch (e) {}
            }

            this.selectedFiles = [];
            this.loadFiles();
            this.loadDirectories();
            this.showToast('已删除 ' + deleted + ' 个', 'success');
        },

        renameFile(file) {
            this.renameFileObj = file;
            this.renameNewName = file.name;
            this.showRenameModal = true;
        },

        async doRename() {
            if (!this.renameNewName || !this.renameFileObj) return;

            try {
                const res = await fetch('/api/local-files/rename', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + this.getToken(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: this.renameFileObj.path, name: this.renameNewName })
                });
                if (res.ok) {
                    this.showRenameModal = false;
                    this.renameFileObj = null;
                    this.renameNewName = '';
                    this.loadFiles();
                    this.loadDirectories();
                    this.showToast('重命名成功', 'success');
                } else {
                    const data = await res.json();
                    this.showToast(data.error || '重命名失败', 'error');
                }
            } catch (e) {
                this.showToast('重命名失败', 'error');
            }
        },

        showToast(msg, type = 'success') {
            this.message = msg;
            this.messageType = type;
            this.showMessage = true;
            setTimeout(() => this.showMessage = false, 3000);
        }
    }
}
</script>
</body>
</html>
