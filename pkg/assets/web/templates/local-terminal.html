<html lang="zh-CN" class="">
<head>

    <style>
html{font-size:12px}*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#tab-bar{display:flex;align-items:center;background:#323232;min-height:32px;flex-shrink:0;overflow-x:auto}
#tab-bar .tab{display:flex;align-items:center;padding:4px 12px;cursor:pointer;color:#999;font-size:11px;border-right:1px solid #3d3d3d;min-width:80px;max-width:160px;user-select:none;white-space:nowrap}
#tab-bar .tab.active{background:#1f1f1f;color:#fff}
#tab-bar .tab.sent-target{color:#bfdbfe}
#tab-bar .tab .sent-hint{margin-left:6px;color:#60a5fa;font-size:10px;flex-shrink:0}
#tab-bar .tab .close{margin-left:6px;font-size:12px;line-height:1;color:#666;flex-shrink:0}
#tab-bar .tab .close:hover{color:#f00}
#tab-bar .add-tab{padding:4px 10px;cursor:pointer;color:#999;font-size:16px;line-height:1;user-select:none;flex-shrink:0}
#tab-bar .add-tab:hover{color:#fff}
#terminal-area{flex:1;position:relative;background:#0c0c0c;overflow:hidden}
.pane-container{position:absolute;inset:0;display:none}
.pane-container.active{display:flex}
.pane-item{position:relative;min-width:0;min-height:0;overflow:hidden;padding:2px}
.pane-item .xterm{height:100%;width:100%;padding:0}
.pane-item .xterm-screen{width:100%}
.pane-item .xterm-viewport{overflow-y:auto!important}
.pane-close{position:absolute;top:2px;right:2px;z-index:20;background:rgba(0,0,0,.6);border:none;color:#999;cursor:pointer;padding:1px 5px;border-radius:3px;font-size:10px;line-height:1;opacity:0;transition:opacity .2s}
.pane-item:hover .pane-close{opacity:1}
.pane-close:hover{color:#f00;background:rgba(0,0,0,.8)}
.pane-divider{flex-shrink:0;background:#333;z-index:10}
.pane-divider-h{width:4px;cursor:col-resize}
.pane-divider-h:hover,.pane-divider-h.dragging{background:#3b82f6}
.pane-divider-v{height:4px;cursor:row-resize}
.pane-divider-v:hover,.pane-divider-v.dragging{background:#3b82f6}
.pane-item.focused{outline:1px solid #3b82f6;outline-offset:-1px}
.popup-menu{display:none;position:fixed;z-index:200;background:#2d2d2d;border:1px solid #555;border-radius:6px;padding:4px 0;box-shadow:0 2px 12px rgba(0,0,0,.4);min-width:280px;max-height:350px;overflow-y:auto;font-size:12px;font-family:monospace}
.popup-menu .menu-item{padding:4px 12px;cursor:pointer;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.popup-menu .menu-item:hover{background:#3b82f6;color:#fff}
.popup-menu .menu-item.dir{color:#4ade80}
.popup-menu .menu-header{padding:6px 12px;color:#888;font-size:11px;border-bottom:1px solid #444}
#search-bar{position:fixed;top:8px;right:8px;z-index:100;background:#2d2d2d;border:1px solid #555;border-radius:6px;padding:6px 10px;display:none;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#search-bar input{background:#3a3a3a;border:1px solid #555;border-radius:3px;color:#eee;padding:3px 8px;font-size:12px;width:200px;outline:none}
#search-bar input:focus{border-color:#3b82f6}
#search-bar button{background:none;border:none;color:#999;cursor:pointer;padding:2px 4px;border-radius:3px;font-size:13px;line-height:1}
#search-bar button:hover{background:#444;color:#fff}
#search-bar .sep{width:1px;height:16px;background:#555}
#snapshot-dialog{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
#snapshot-dialog .dialog-box{background:#2d2d2d;border:1px solid #555;border-radius:8px;width:500px;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#snapshot-dialog .dialog-header{padding:12px 16px;border-bottom:1px solid #444;display:flex;align-items:center;justify-content:space-between}
#snapshot-dialog .dialog-body{flex:1;overflow-y:auto;padding:8px}
#snapshot-dialog .snapshot-item{padding:8px 12px;cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:8px}
#snapshot-dialog .snapshot-item:hover{background:#3a3a3a}
    </style>

(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})()

<script>
(function() {
    var tabs = [], activeIdx = -1, focusedPaneId = null;
    var MAX_PANES_PER_TAB = 4;
    var tabBar = document.getElementById('tab-bar');
    var termArea = document.getElementById('terminal-area');
    var token = new URLSearchParams(location.search).get('token') || localStorage.getItem('access_token') || '';
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var host = location.host;
    var _wsBase, _wsPath;
    (function() {
        var desktop = {{.Desktop}}, desktopPort = {{.DesktopPort}};
        if (desktop && desktopPort) { _wsBase = proto + '//127.0.0.1:' + desktopPort; _wsPath = '/ws/local-terminal/'; }
        else { _wsBase = proto + '//' + host; _wsPath = '/api/ws/local-terminal/'; }
    })();

    // ===== Helpers =====
    function findPane(sid) { for (var i=0;i<tabs.length;i++) for (var j=0;j<tabs[i].panes.length;j++) if (tabs[i].panes[j].id===sid) return tabs[i].panes[j]; return null; }
    function getActivePane() { if (activeIdx<0||!tabs[activeIdx]) return null; return tabs[activeIdx].panes.find(function(p){return p.id===focusedPaneId})||tabs[activeIdx].panes[0]; }
    function attachDividerResize(divider, beforePane, afterPane, direction) {
        divider.addEventListener('mousedown', function(e) {
            e.preventDefault();
            divider.classList.add('dragging');
            var beforeRect = beforePane.paneDiv.getBoundingClientRect();
            var afterRect = afterPane.paneDiv.getBoundingClientRect();
            var vertical = direction === 'vertical';
            var start = vertical ? e.clientX : e.clientY;
            var beforeSize = vertical ? beforeRect.width : beforeRect.height;
            var afterSize = vertical ? afterRect.width : afterRect.height;
            var total = Math.max(1, beforeSize + afterSize);
            function onMove(e2) {
                var pos = vertical ? e2.clientX : e2.clientY;
                var beforePct = ((beforeSize + (pos - start)) / total) * 100;
                beforePct = Math.max(10, Math.min(90, beforePct));
                beforePane.paneDiv.style.flex = '0 0 calc(' + beforePct + '% - 2px)';
                afterPane.paneDiv.style.flex = '0 0 calc(' + (100 - beforePct) + '% - 2px)';
                fitAndSyncPane(beforePane);
                fitAndSyncPane(afterPane);
            }
            function onUp() {
                divider.classList.remove('dragging');
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
            }
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        }, true);
    }
    function rebuildPaneLayout(tab) {
        var container = tab.container;
        var panes = tab.panes || [];
        var direction = tab.splitDirection || 'vertical';
        var fragment = document.createDocumentFragment();
        panes.forEach(function(p, idx) {
            if (idx > 0) {
                var div = document.createElement('div');
                div.className = direction === 'vertical' ? 'pane-divider pane-divider-h' : 'pane-divider pane-divider-v';
                attachDividerResize(div, panes[idx - 1], p, direction);
                fragment.appendChild(div);
            }
            p.paneDiv.style.cssText = 'flex:1;position:relative;min-width:0;min-height:0;padding:2px;';
            fragment.appendChild(p.paneDiv);
        });
        container.innerHTML = '';
        container.appendChild(fragment);
        container.style.display = '';
        container.style.flexDirection = panes.length > 1 ? (direction === 'vertical' ? 'row' : 'column') : '';
    }

    // ===== Clipboard =====
    function copyToClipboard(text) { if (navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(showCopyOk).catch(function(){fallbackCopy(text);}); else fallbackCopy(text); }
    function fallbackCopy(text) { var ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;left:-9999px;opacity:0;'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');showCopyOk();}catch(e){} document.body.removeChild(ta); }
    function showCopyOk() { var orig=stConn.innerHTML; stConn.innerHTML='<span style="color:#4ade80;">已复制</span>'; setTimeout(function(){stConn.innerHTML=orig;},1200); }
    function pasteFromClipboard(ws) { if (navigator.clipboard&&navigator.clipboard.readText) navigator.clipboard.readText().then(function(t){if(t&&ws&&ws.readyState===1)ws.send(t);}).catch(function(){}); }
    function copySelection(term) {
        var selected = term && term.getSelection ? term.getSelection() : '';
        if (!selected && term && term.__dmLastForcedSelectionText) selected = term.__dmLastForcedSelectionText;
        if (!selected) return false;
        copyToClipboard(selected);
        if (term) term.__dmLastForcedSelectionText = '';
        if (term.clearSelection) term.clearSelection();
        return true;
    }
    var sendSelectionMenu = document.getElementById('send-selection-menu');
    function getTerminalSelectionText(term) {
        var selected = term && term.getSelection ? term.getSelection() : '';
        if (!selected && term && term.__dmLastForcedSelectionText) selected = term.__dmLastForcedSelectionText;
        return selected || '';
    }
    function findPaneByTerm(term) {
        for (var i = 0; i < tabs.length; i++) {
            for (var j = 0; j < tabs[i].panes.length; j++) {
                if (tabs[i].panes[j].term === term) return tabs[i].panes[j];
            }
        }
        return null;
    }
    function findPaneLocation(pane) {
        for (var i = 0; i < tabs.length; i++) {
            for (var j = 0; j < tabs[i].panes.length; j++) {
                if (tabs[i].panes[j] === pane) return {tab: tabs[i], tabIndex: i, paneIndex: j};
            }
        }
        return null;
    }
    function getOtherReadyPanes(sourcePane) {
        var targets = [];
        tabs.forEach(function(tab) {
            tab.panes.forEach(function(pane) {
                if (pane !== sourcePane && pane.ws && pane.ws.readyState === 1) targets.push(pane);
            });
        });
        return targets;
    }
    function getCurrentTabReadyPanes(sourcePane) {
        var loc = findPaneLocation(sourcePane);
        if (!loc) return [];
        return loc.tab.panes.filter(function(pane) {
            return pane !== sourcePane && pane.ws && pane.ws.readyState === 1;
        });
    }
    function markSentTargetTabs(targets) {
        var touched = [];
        targets.forEach(function(target) {
            var loc = findPaneLocation(target);
            if (loc && touched.indexOf(loc.tab) < 0) touched.push(loc.tab);
        });
        if (touched.length === 0) return;
        touched.forEach(function(tab) { tab.sentHint = true; });
        renderTabs();
        setTimeout(function() {
            touched.forEach(function(tab) { tab.sentHint = false; });
            renderTabs();
        }, 1800);
    }
    function targetLabel(target) {
        var loc = findPaneLocation(target);
        if (!loc) return target.shellName || '终端';
        var title = loc.tab.title || ('终端 ' + (loc.tabIndex + 1));
        return title + ' / 分屏 ' + (loc.paneIndex + 1);
    }
    function hideSendSelectionMenu() {
        if (sendSelectionMenu) {
            sendSelectionMenu.style.display = 'none';
            sendSelectionMenu.innerHTML = '';
        }
    }
    function sendSelectionToTargets(text, targets) {
        targets.forEach(function(target) {
            if (target.ws && target.ws.readyState === 1) target.ws.send(text);
        });
        markSentTargetTabs(targets);
        hideSendSelectionMenu();
        showStatusNotice('已发送到 ' + targets.length + ' 个终端');
    }
    function showSendSelectionMenu(term, e) {
        if (!sendSelectionMenu) return;
        var text = getTerminalSelectionText(term);
        var sourcePane = findPaneByTerm(term);
        var currentTabTargets = sourcePane ? getCurrentTabReadyPanes(sourcePane) : [];
        var allTargets = sourcePane ? getOtherReadyPanes(sourcePane) : [];
        var targets = currentTabTargets.length > 0 ? currentTabTargets : allTargets;
        var selfTargets = sourcePane && sourcePane.ws && sourcePane.ws.readyState === 1 ? [sourcePane] : [];
        if (!text || (targets.length === 0 && selfTargets.length === 0)) {
            hideSendSelectionMenu();
            return;
        }
        sendSelectionMenu.innerHTML = '';
        if (targets.length > 0) {
            var primary = document.createElement('div');
            primary.className = 'menu-item send-selection-primary';
            primary.textContent = currentTabTargets.length > 0 ? (currentTabTargets.length === 1 ? '发送到当前分屏' : '发送到当前分屏其它终端') : '发送到终端';
            primary.onclick = function() { sendSelectionToTargets(text, targets); };
            sendSelectionMenu.appendChild(primary);
        }
        if (selfTargets.length > 0) {
            var selfItem = document.createElement('div');
            selfItem.className = 'menu-item send-selection-self';
            selfItem.textContent = '发送到当前终端';
            selfItem.onclick = function() { sendSelectionToTargets(text, selfTargets); };
            sendSelectionMenu.appendChild(selfItem);
        }
        if (allTargets.length > currentTabTargets.length) {
            var allItem = document.createElement('div');
            allItem.className = 'menu-item';
            allItem.textContent = '发送到所有其它终端';
            allItem.onclick = function() { sendSelectionToTargets(text, allTargets); };
            sendSelectionMenu.appendChild(allItem);
        }
        if (targets.length > 1 || allTargets.length > 1) {
            allTargets.forEach(function(target) {
                var item = document.createElement('div');
                item.className = 'menu-item';
                item.textContent = '发送到 ' + targetLabel(target);
                item.onclick = function() { sendSelectionToTargets(text, [target]); };
                sendSelectionMenu.appendChild(item);
            });
        }
        var left = Math.min(Math.max(8, e.clientX || 8), window.innerWidth - 180);
        var top = Math.min(Math.max(8, e.clientY || 8), window.innerHeight - 90);
        sendSelectionMenu.style.left = left + 'px';
        sendSelectionMenu.style.top = top + 'px';
        sendSelectionMenu.style.right = 'auto';
        sendSelectionMenu.style.bottom = 'auto';
        sendSelectionMenu.style.display = 'block';
    }
    function scheduleSendSelectionMenu(term, e) {
        if (!e || e.button !== 0) return;
        var clientX = e.clientX, clientY = e.clientY;
        setTimeout(function() { showSendSelectionMenu(term, {clientX: clientX, clientY: clientY}); }, 40);
    }
    document.addEventListener('mousedown', function(e) {
        if (sendSelectionMenu && sendSelectionMenu.style.display === 'block' && !sendSelectionMenu.contains(e.target)) {
            hideSendSelectionMenu();
        }
    });
    function handleTerminalContextMenu(e, term, ws) {
        e.preventDefault();
        hideSendSelectionMenu();
        if (!copySelection(term)) pasteFromClipboard(ws);
    }
    function installTerminalShortcuts(term, ws) {
        if (!term || !term.attachCustomKeyEventHandler) return;
        term.attachCustomKeyEventHandler(function(ev) {
            if (ev.type !== 'keydown' || !ev.ctrlKey || !ev.shiftKey) return true;
            var key = (ev.key || '').toLowerCase();
            if (key === 'c' || ev.code === 'KeyC') {
                copySelection(term);
                if (ev.preventDefault) ev.preventDefault();
                return false;
            }
            if (key === 'v' || ev.code === 'KeyV') {
                pasteFromClipboard(ws);
                if (ev.preventDefault) ev.preventDefault();
                return false;
            }
            return true;
        });
    }
    function installShiftSelectionReset(term) {
        if (!term || !term.element || !term.element.addEventListener) return;
        var forceSelectingInMouseMode = false;
        var lastForcedSelection = null;
        function snapshotForcedSelection() {
            if (!forceSelectingInMouseMode || !term.getSelection || !term.getSelectionPosition) return;
            var text = term.getSelection();
            var pos = term.getSelectionPosition();
            if (!text || !pos || !pos.start || !pos.end) return;
            var size = (pos.end.y - pos.start.y) * term.cols + pos.end.x - pos.start.x;
            if (size <= 0) return;
            lastForcedSelection = { text: text, x: pos.start.x, y: pos.start.y, size: size };
            term.__dmLastForcedSelectionText = text;
        }
        function restoreForcedSelection() {
            if (!lastForcedSelection || !term.select || !term.getSelection) return;
            if (term.getSelection()) return;
            term.select(lastForcedSelection.x, lastForcedSelection.y, lastForcedSelection.size);
            term.__dmLastForcedSelectionText = lastForcedSelection.text;
        }
        term.element.addEventListener('mousedown', function(e) {
            if (!e.shiftKey || e.button !== 0 || e.__dmShiftSelectionSynthetic) return;
            var mouseMode = term.modes && term.modes.mouseTrackingMode;
            if (mouseMode && mouseMode !== 'none') {
                forceSelectingInMouseMode = true;
                lastForcedSelection = null;
                term.__dmLastForcedSelectionText = '';
                return;
            }
            e.preventDefault();
            e.stopImmediatePropagation();
            var synthetic = new MouseEvent('mousedown', {
                bubbles: true,
                cancelable: true,
                view: window,
                detail: e.detail || 1,
                screenX: e.screenX,
                screenY: e.screenY,
                clientX: e.clientX,
                clientY: e.clientY,
                ctrlKey: e.ctrlKey,
                altKey: e.altKey,
                shiftKey: false,
                metaKey: e.metaKey,
                button: e.button,
                buttons: e.buttons || 1
            });
            synthetic.__dmShiftSelectionSynthetic = true;
            e.target.dispatchEvent(synthetic);
        }, true);
        document.addEventListener('mousemove', function() {
            if (!forceSelectingInMouseMode) return;
            setTimeout(snapshotForcedSelection, 0);
        }, true);
        term.element.addEventListener('mouseup', function(e) {
            if (!forceSelectingInMouseMode || e.button !== 0) return;
            snapshotForcedSelection();
            e.preventDefault();
            e.stopImmediatePropagation();
            var synthetic = new MouseEvent('mouseup', {
                bubbles: true,
                cancelable: true,
                view: window,
                detail: e.detail || 1,
                screenX: e.screenX,
                screenY: e.screenY,
                clientX: e.clientX,
                clientY: e.clientY,
                ctrlKey: e.ctrlKey,
                altKey: e.altKey,
                shiftKey: e.shiftKey,
                metaKey: e.metaKey,
                button: e.button,
                buttons: e.buttons
            });

        var postOpts = {method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}};

        var doFetch = opts.skipCreate ? Promise.resolve({id:opts.sessionId}) :
            fetch('/api/local-terminal/sessions',postOpts).then(function(r){return r.json();});
        doFetch.then(function(data) {
            if(!data.id){alert('创建终端会话失败: '+(data.error||''));return;}
            var sid=data.id;
            var paneDiv=document.createElement('div');
            paneDiv.className='pane-item focused'; paneDiv.id='pane-'+sid;
            paneDiv.style.cssText='flex:1;position:relative;min-width:0;min-height:0;padding:2px;';
            var closeBtn=document.createElement('button');
            closeBtn.className='pane-close'; closeBtn.textContent='✕'; closeBtn.title='关闭此终端';
            closeBtn.onclick=function(e){e.stopPropagation();closePaneById(sid);};
            paneDiv.appendChild(closeBtn);
            container.appendChild(paneDiv);
            var term=new Terminal({cursorBlink:true,cursorStyle:'bar',fontSize:14,fontFamily:'Consolas, "Courier New", monospace',theme:getTheme(),scrollback:5000,allowProposedApi:true,windowsMode:true});
            var fitAddon=new FitAddon.FitAddon(); term.loadAddon(fitAddon);
            var searchAddon=new SearchAddon.SearchAddon(); term.loadAddon(searchAddon);
            term.parser.registerOscHandler(133,function(d){var p=d.split(';'),seq=p[0];if(seq==='C'){if(focusedPaneId===sid)stExit.textContent=(parseInt(p[1])||0)===0?'✅':'❌ '+p[1];}else if(seq==='B'){if(focusedPaneId===sid)stExit.textContent='';}});
            term.parser.registerOscHandler(7,function(d){var path=d.replace(/^file:\/\/[^\/]*/,'');if(path){sessionCwds[sid]=path;}});
            term.open(paneDiv); installShiftSelectionReset(term); installTerminalWheelSupport(term, paneDiv);
            var wsUrl=_wsBase+_wsPath+sid; if(_wsPath.indexOf('/api/')===0) wsUrl+='?token='+token;
            var shellName=opts.shellName||'';
            var ws=new WebSocket(wsUrl);
            installTerminalShortcuts(term, ws);
            ws.onopen=function(){fitAndSyncTerminal(fitAddon,term,ws);term.focus();stConn.innerHTML='<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80;margin-right:4px;vertical-align:middle;"></span><span style="vertical-align:middle;">已连接</span>';focusedPaneId=sid;};
            paneDiv.addEventListener('contextmenu',function(e){handleTerminalContextMenu(e, term, ws);});
            paneDiv.addEventListener('mouseup',function(e){scheduleSendSelectionMenu(term,e);});
            ws.onclose=function(){term.writeln('\r\n\x1b[31m连接已断开\x1b[0m');};
            ws.onmessage=function(e){
                if(typeof e.data==='string'){try{var msg=JSON.parse(e.data);if(msg.type==='meta'){shellName=msg.shell||shellName;if(focusedPaneId===sid)stShell.textContent=shellName||'-';return;}}catch(ex){}term.write(e.data);return;}
                if(e.data instanceof Blob){var r=new FileReader();r.onload=function(){term.write(r.result);};r.readAsText(e.data);return;}
                term.write(new TextDecoder().decode(e.data));
            };
            inputBuffers[sid]='';
            term.onData(function(data){
                if(ws&&ws.readyState===1)ws.send(data);
                if(focusedPaneId===sid){var buf=term.buffer.active;stCursor.textContent=(buf.cursorY+1)+':'+(buf.cursorX+1);}
                var ib=inputBuffers[sid]||'';
                if(data==='\r'||data==='\n'){addToHistory(ib);inputBuffers[sid]='';}
                else if(data==='\x7f'||data==='\b'){inputBuffers[sid]=ib.slice(0,-1);}
                else if(data>=' '){inputBuffers[sid]=ib+data;}
            });
            term.onResize(function(size){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'resize',cols:size.cols,rows:size.rows}));if(focusedPaneId===sid)stSize.textContent=size.cols+'×'+size.rows;});

            paneDiv.addEventListener('mousedown',function(){focusedPaneId=sid;container.querySelectorAll('.pane-item').forEach(function(p){p.classList.remove('focused')});paneDiv.classList.add('focused');term.focus();var fp=findPane(sid);if(fp)updateStatus(fp);});
            if(onComplete)onComplete({id:sid,term:term,ws:ws,fitAddon:fitAddon,searchAddon:searchAddon,paneDiv:paneDiv,shellName:shellName});
        }).catch(function(e){alert('创建终端失败: '+e.message);});
    }

    // ===== Close Pane =====
    function closePaneById(sid) {
        if (!sid) return;
        for (var i = 0; i < tabs.length; i++) {
            var tab = tabs[i];
            var idx = tab.panes.findIndex(function(p) { return p.id === sid; });
            if (idx < 0) continue;
            if (tab.panes.length <= 1) { closeTab(i); return; }
            var pane = tab.panes[idx];
            if (pane.ws) pane.ws.close();
            if (pane.term) pane.term.dispose();
            pane.paneDiv.remove();
            tab.panes.splice(idx, 1);
            rebuildPaneLayout(tab);
            var ni = Math.min(idx, tab.panes.length - 1);
            focusedPaneId = tab.panes[ni].id;
            tab.panes[ni].paneDiv.classList.add('focused');
            setTimeout(function() {
                fitAndSyncPane(tab.panes[ni]);
                tab.panes[ni].term.focus();
                updateStatus(tab.panes[ni]);
            }, 50);
            return;
        }
    }

            item.innerHTML='<div style="flex:1;min-width:0;"><div style="color:#eee;font-size:12px;">'+s.name+'</div><div style="color:#888;font-size:10px;margin-top:2px;">'+time+(s.shell?' · '+s.shell:'')+'</div></div>';
            var del=document.createElement('button');del.textContent='🗑';del.style.cssText='background:none;border:none;color:#666;cursor:pointer;font-size:14px;padding:4px;';
            del.onclick=function(e){e.stopPropagation();var ss=getSnaps().filter(function(x){return x.id!==s.id});localStorage.setItem(SNAP_KEY,JSON.stringify(ss));showSnapshotDialog();};
            item.appendChild(del);
            item.onclick=function(){hideSnapshotDialog();restoreSnap(s);};
            list.appendChild(item);
        });
        document.getElementById('snapshot-dialog').style.display='flex';
    };
    window.hideSnapshotDialog=function(){document.getElementById('snapshot-dialog').style.display='none';};
    document.getElementById('snapshot-dialog').addEventListener('click',function(e){if(e.target===this)hideSnapshotDialog();});
    function restoreSnap(snap){
        var container=document.createElement('div');container.className='pane-container';container.id='tab-'+Date.now();
        termArea.appendChild(container);
        createTerminalSession(container,function(pane){
            tabs.push({id:container.id,title:'恢复: '+(snap.name||'快照'),container:container,panes:[pane],activePaneIdx:0});
            switchTab(tabs.length-1);
            if(snap.cwd){setTimeout(function(){if(pane.ws&&pane.ws.readyState===1)pane.ws.send('cd "'+snap.cwd.replace(/\\/g,'/')+'"\r');},800);}
        });
    }

    // ===== Session Recovery =====
    var SESSION_KEY='terminal-sessions';
    function saveSessions(){var saved=tabs.map(function(t){var p=t.panes[t.activePaneIdx||0];return{title:t.title,sessionId:p?p.id:null};}).filter(function(s){return s.sessionId;});localStorage.setItem(SESSION_KEY,JSON.stringify(saved));}
    function restoreSessions(){
        try{var saved=JSON.parse(localStorage.getItem(SESSION_KEY)||'[]');if(saved.length===0){newTab();return;}
        fetch('/api/local-terminal/sessions',{headers:{'Authorization':'Bearer '+token}}).then(function(r){return r.json();}).then(function(data){
            var ids=(data.sessions||[]).map(function(s){return s.id;});var toR=saved.filter(function(s){return s.sessionId&&ids.indexOf(s.sessionId)>=0;});
            if(toR.length===0){newTab();return;}var done=0;
            toR.forEach(function(s,i){var c=document.createElement('div');c.className='pane-container';c.id='tab-'+Date.now()+'-'+i;termArea.appendChild(c);reconnectSession(c,s.sessionId,s.title,function(pane){tabs[i]={id:c.id,title:s.title,container:c,panes:[pane],activePaneIdx:0};done++;if(done===toR.length)switchTab(0);});});
        }).catch(function(){newTab();});}catch(e){newTab();}
    }
    function reconnectSession(container,sessionId,title,onComplete){
        var paneDiv=document.createElement('div');paneDiv.className='pane-item focused';paneDiv.id='pane-'+sessionId;
        paneDiv.style.cssText='flex:1;position:relative;min-width:0;min-height:0;padding:2px;';
        var closeBtn=document.createElement('button');closeBtn.className='pane-close';closeBtn.textContent='✕';
        closeBtn.onclick=function(e){e.stopPropagation();closePaneById(sessionId);};
        paneDiv.appendChild(closeBtn);container.appendChild(paneDiv);
        var term=new Terminal({cursorBlink:true,cursorStyle:'bar',fontSize:14,fontFamily:'Consolas, "Courier New", monospace',theme:getTheme(),scrollback:5000,allowProposedApi:true,windowsMode:true});
        var fitAddon=new FitAddon.FitAddon();term.loadAddon(fitAddon);
        var searchAddon=new SearchAddon.SearchAddon();term.loadAddon(searchAddon);
        term.open(paneDiv);installShiftSelectionReset(term);installTerminalWheelSupport(term,paneDiv);
        var wsUrl=_wsBase+_wsPath+sessionId;if(_wsPath.indexOf('/api/')===0)wsUrl+='?token='+token;
        var shellName='',ws=new WebSocket(wsUrl);
        installTerminalShortcuts(term, ws);
        ws.onopen=function(){fitAndSyncTerminal(fitAddon,term,ws);term.focus();focusedPaneId=sessionId;};
        paneDiv.addEventListener('contextmenu',function(e){handleTerminalContextMenu(e, term, ws);});
        paneDiv.addEventListener('mouseup',function(e){scheduleSendSelectionMenu(term,e);});
        term.parser.registerOscHandler(7,function(d){var p=d.replace(/^file:\/\/[^\/]*/,'');if(p){sessionCwds[sessionId]=p;}});
        ws.onclose=function(){term.writeln('\r\n\x1b[31m连接已断开\x1b[0m');};
        ws.onmessage=function(e){if(typeof e.data==='string'){try{var msg=JSON.parse(e.data);if(msg.type==='meta'){shellName=msg.shell||shellName;if(focusedPaneId===sessionId)stShell.textContent=shellName||'-';return;}}catch(ex){}term.write(e.data);return;}if(e.data instanceof Blob){var r=new FileReader();r.onload=function(){term.write(r.result);};r.readAsText(e.data);return;}term.write(new TextDecoder().decode(e.data));};
        inputBuffers[sessionId]='';
        term.onData(function(data){if(ws&&ws.readyState===1)ws.send(data);if(focusedPaneId===sessionId){var b=term.buffer.active;stCursor.textContent=(b.cursorY+1)+':'+(b.cursorX+1);}var ib=inputBuffers[sessionId]||'';if(data==='\r'||data==='\n'){addToHistory(ib);inputBuffers[sessionId]='';}else if(data==='\x7f'||data==='\b'){inputBuffers[sessionId]=ib.slice(0,-1);}else if(data>=' '){inputBuffers[sessionId]=ib+data;}});
        term.onResize(function(size){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'resize',cols:size.cols,rows:size.rows}));if(focusedPaneId===sessionId)stSize.textContent=size.cols+'×'+size.rows;});
        setTimeout(function(){fitAndSyncTerminal(fitAddon,term,ws);},50);
        paneDiv.addEventListener('mousedown',function(){focusedPaneId=sessionId;container.querySelectorAll('.pane-item').forEach(function(p){p.classList.remove('focused')});paneDiv.classList.add('focused');term.focus();var fp=findPane(sessionId);if(fp)updateStatus(fp);});
        if(onComplete)onComplete({id:sessionId,term:term,ws:ws,fitAddon:fitAddon,searchAddon:searchAddon,paneDiv:paneDiv,shellName:shellName});
    }

    // ===== New Tab =====
    function newTab(opts){
        opts = opts || {};
        var container=document.createElement('div');container.className='pane-container';container.id='tab-'+Date.now();
        termArea.appendChild(container);
        createTerminalSession(container,function(pane){tabs.push({id:container.id,title:opts.agentName||('终端 '+(tabs.length+1)),container:container,panes:[pane],activePaneIdx:0});switchTab(tabs.length-1);},opts);
    }
    function newTabWithPath(path){newTab();setTimeout(function(){var p=getActivePane();if(p&&p.ws&&p.ws.readyState===1)p.ws.send('cd "'+path.replace(/\\/g,'/')+'"\r');},1000);}

    // ===== Init =====
    restoreSessions();
})();
</script>
</body>
</html>
