<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地终端</title>
    <link rel="stylesheet" href="/static/css/xterm.css">
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <style>
html{font-size:12px}*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#tab-bar{display:flex;align-items:center;background:#323232;min-height:32px;flex-shrink:0;overflow-x:auto}
#tab-bar .tab{display:flex;align-items:center;padding:4px 12px;cursor:pointer;color:#999;font-size:11px;border-right:1px solid #3d3d3d;min-width:80px;max-width:160px;user-select:none;white-space:nowrap}
#tab-bar .tab.active{background:#1f1f1f;color:#fff}
#tab-bar .tab.sent-target{color:#bfdbfe}
#tab-bar .tab .sent-hint{margin-left:6px;color:#60a5fa;font-size:10px;flex-shrink:0}
#tab-bar .tab .close{margin-left:6px;font-size:12px;line-height:1;color:#666;flex-shrink:0}
#tab-bar .tab .close:hover{color:#f00}
#tab-bar .add-tab{padding:4px 10px;cursor:pointer;color:#999;font-size:16px;line-height:1;user-select:none;flex-shrink:0}
#tab-bar .add-tab:hover{color:#fff}
#terminal-main{flex:1;display:flex;min-height:0;background:#0c0c0c}
#server-sidebar{width:240px;flex-shrink:0;background:#171717;border-right:1px solid #333;display:flex;flex-direction:column;min-height:0;transition:width .18s ease,border-color .18s ease;overflow:hidden}
#server-sidebar.collapsed{width:0;border-right-color:transparent}
#server-sidebar .server-sidebar-inner{width:240px;display:flex;flex-direction:column;min-height:0;height:100%}
#server-sidebar .server-sidebar-header{height:34px;display:flex;align-items:center;gap:6px;padding:6px;border-bottom:1px solid #333;flex-shrink:0}
#server-sidebar .server-sidebar-header input{flex:1;min-width:0;background:#242424;border:1px solid #3f3f3f;color:#ddd;border-radius:3px;padding:4px 6px;font-size:11px;outline:none}
#server-sidebar .server-sidebar-header input:focus{border-color:#3b82f6}
#server-sidebar .server-close{background:none;border:none;color:#888;cursor:pointer;padding:2px 4px;border-radius:3px}
#server-sidebar .server-close:hover{background:#333;color:#fff}
#server-tree{flex:1;overflow:auto;padding:6px;font-family:Consolas,"Courier New",monospace;font-size:11px}
.server-group{margin-bottom:5px}
.server-group-header{color:#93c5fd;cursor:pointer;padding:4px 5px;border-radius:3px;user-select:none}
.server-group-header:hover{background:#262626}
.server-item{display:flex;align-items:center;gap:6px;color:#d4d4d4;cursor:pointer;padding:4px 6px 4px 16px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.server-item:hover{background:#1f3a5f;color:#fff}
.server-item .server-dot{width:7px;height:7px;border-radius:50%;background:#666;flex-shrink:0}
.server-item.online .server-dot{background:#22c55e}
.server-item .server-name{overflow:hidden;text-overflow:ellipsis}
.server-item .server-host{color:#888;margin-left:auto;font-size:10px;overflow:hidden;text-overflow:ellipsis;max-width:92px}
#terminal-area{flex:1;position:relative;background:#0c0c0c;overflow:hidden}
.pane-container{position:absolute;inset:0;display:none}
.pane-container.active{display:flex}
.pane-item{position:relative;min-width:0;min-height:0;overflow:hidden;padding:2px}
.pane-item .xterm{height:100%;width:100%;padding:0}
.pane-item .xterm-screen{width:100%}
.pane-item .xterm-viewport{overflow-y:auto!important}
.pane-close{position:absolute;top:2px;right:2px;z-index:20;background:rgba(0,0,0,.6);border:none;color:#999;cursor:pointer;padding:1px 5px;border-radius:3px;font-size:10px;line-height:1;opacity:0;transition:opacity .2s}
.pane-item:hover .pane-close{opacity:1}
.pane-close:hover{color:#f00;background:rgba(0,0,0,.8)}
.pane-server-btn{position:absolute;top:20px;right:2px;z-index:20;background:rgba(0,0,0,.6);border:none;color:#999;cursor:pointer;padding:1px 5px;border-radius:3px;font-size:10px;line-height:1;opacity:0;transition:opacity .2s}
.pane-item:hover .pane-server-btn{opacity:1}
.pane-server-btn:hover{color:#fff;background:#2563eb}
.pane-file-btn{position:absolute;top:38px;right:2px;z-index:20;background:rgba(0,0,0,.6);border:none;color:#999;cursor:pointer;padding:1px 5px;border-radius:3px;font-size:10px;line-height:1;opacity:0;transition:opacity .2s}
.pane-item:hover .pane-file-btn{opacity:1}
.pane-file-btn:hover{color:#fff;background:#16a34a}
#remote-file-panel{position:fixed;top:32px;right:0;bottom:24px;width:320px;z-index:180;background:#181818;border-left:1px solid #3a3a3a;box-shadow:-3px 0 12px rgba(0,0,0,.35);display:none;flex-direction:column;color:#ddd;font-family:Consolas,"Courier New",monospace;font-size:11px}
#remote-file-panel.open{display:flex}
#remote-file-panel .rf-header{height:34px;display:flex;align-items:center;gap:6px;padding:6px;border-bottom:1px solid #333;flex-shrink:0}
#remote-file-panel .rf-title{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
#remote-file-panel button{background:#2d2d2d;border:1px solid #444;color:#ccc;cursor:pointer;border-radius:3px;padding:3px 6px;font-size:11px}
#remote-file-panel button:hover{background:#3b82f6;color:#fff}
#remote-file-panel button:disabled{opacity:.45;cursor:not-allowed}
#remote-file-panel button:disabled:hover{background:#2d2d2d;color:#ccc}
#remote-file-panel .rf-path{display:flex;gap:5px;padding:6px;border-bottom:1px solid #333;flex-shrink:0}
#remote-file-panel input{flex:1;min-width:0;background:#242424;border:1px solid #444;color:#ddd;border-radius:3px;padding:4px 6px;outline:none}
#remote-file-list{flex:1;overflow:auto;padding:5px}
.remote-file-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:3px;cursor:pointer;white-space:nowrap}
.remote-file-item:hover,.remote-file-item.active{background:#1f3a5f;color:#fff}
.remote-file-name{flex:1;overflow:hidden;text-overflow:ellipsis}
.remote-file-size{color:#888;font-size:10px}
#remote-file-preview{max-height:150px;overflow:auto;border-top:1px solid #333;padding:8px;white-space:pre-wrap;color:#cbd5e1;background:#111;display:none}
.pane-divider{flex-shrink:0;background:#333;z-index:10}
.pane-divider-h{width:4px;cursor:col-resize}
.pane-divider-h:hover,.pane-divider-h.dragging{background:#3b82f6}
.pane-divider-v{height:4px;cursor:row-resize}
.pane-divider-v:hover,.pane-divider-v.dragging{background:#3b82f6}
.pane-item.focused{outline:1px solid #3b82f6;outline-offset:-1px}
.popup-menu{display:none;position:fixed;z-index:200;background:#2d2d2d;border:1px solid #555;border-radius:6px;padding:4px 0;box-shadow:0 2px 12px rgba(0,0,0,.4);min-width:280px;max-height:350px;overflow-y:auto;font-size:12px;font-family:monospace}
.popup-menu .menu-item{padding:4px 12px;cursor:pointer;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.popup-menu .menu-item.multi{white-space:normal;line-height:1.45}
.popup-menu .menu-item .sub{display:block;color:#888;font-size:10px;margin-top:2px;overflow:hidden;text-overflow:ellipsis}
.popup-menu .menu-actions{display:flex;gap:6px;padding:6px 10px;border-top:1px solid #444}
.popup-menu .menu-actions button{background:#3a3a3a;border:1px solid #555;color:#ddd;border-radius:4px;cursor:pointer;padding:3px 8px;font-family:monospace;font-size:11px}
.popup-menu .menu-actions button:hover{background:#3b82f6;color:#fff}
.popup-menu .menu-item:hover{background:#3b82f6;color:#fff}
.popup-menu .menu-item.dir{color:#4ade80}
.popup-menu .menu-header{padding:6px 12px;color:#888;font-size:11px;border-bottom:1px solid #444}
.popup-menu .font-row{display:flex;align-items:center;gap:8px;padding:6px 12px;color:#ccc}
.popup-menu .font-row label{width:56px;color:#888}
.popup-menu .font-row button{background:#3a3a3a;border:1px solid #555;color:#ddd;border-radius:4px;cursor:pointer;padding:2px 8px;font-family:monospace}
.popup-menu .font-row button:hover{background:#3b82f6;color:#fff}
.popup-menu .font-row select{flex:1;background:#222;border:1px solid #555;color:#ddd;border-radius:4px;padding:3px 6px;font-family:monospace;font-size:12px}
#font-size-value{min-width:30px;text-align:center;color:#eee}
#search-bar{position:fixed;top:8px;right:8px;z-index:100;background:#2d2d2d;border:1px solid #555;border-radius:6px;padding:6px 10px;display:none;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#search-bar input{background:#3a3a3a;border:1px solid #555;border-radius:3px;color:#eee;padding:3px 8px;font-size:12px;width:200px;outline:none}
#search-bar input:focus{border-color:#3b82f6}
#search-bar button{background:none;border:none;color:#999;cursor:pointer;padding:2px 4px;border-radius:3px;font-size:13px;line-height:1}
#search-bar button:hover{background:#444;color:#fff}
#search-bar .sep{width:1px;height:16px;background:#555}
    </style>

(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})()
    </script>
</head>
<body class="bg-gray-900 flex flex-col h-screen">
<div id="tab-bar"></div>
<div id="terminal-main">
    <aside id="server-sidebar" class="collapsed">
        <div class="server-sidebar-inner">
            <div class="server-sidebar-header">
                <input type="text" id="server-search-input" placeholder="搜索服务器...">

    <span id="st-conn"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#555;margin-right:4px;vertical-align:middle;"></span><span style="vertical-align:middle;">未连接</span></span>

    <span style="margin:0 4px;color:#444;">│</span>

    <span style="margin:0 4px;color:#444;">│</span>

    <span style="margin:0 4px;color:#444;">│</span>

    <span style="margin:0 4px;color:#444;">│</span>

<div id="suggest-box" style="display:none;position:fixed;z-index:150;background:#2d2d2d;border:1px solid #555;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.3);max-height:180px;overflow-y:auto;font-size:12px;font-family:monospace;min-width:200px"></div>

<script>
(function() {
    var tabs = [], activeIdx = -1, focusedPaneId = null, terminalTabCounter = 0;
    var MAX_PANES_PER_TAB = 4;
    var tabBar = document.getElementById('tab-bar');
    var termArea = document.getElementById('terminal-area');
    var urlParams = new URLSearchParams(location.search);
    var token = urlParams.get('token') || localStorage.getItem('access_token') || '';
    var startupServerId = urlParams.get('startupServerId') || '';
    var startupTitle = urlParams.get('startupTitle') || '';
    var disableSessionPersistence = !!startupServerId;
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var host = location.host;
    var _wsBase, _wsPath;
    (function() {
        var desktop = {{.Desktop}}, desktopPort = {{.DesktopPort}};
        if (desktop && desktopPort) { _wsBase = proto + '//127.0.0.1:' + desktopPort; _wsPath = '/ws/local-terminal/'; }
        else { _wsBase = proto + '//' + host; _wsPath = '/api/ws/local-terminal/'; }
    })();

    // ===== Helpers =====
    function clientLog(event, message, detail) {
        try {
            fetch('/api/client-log', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    source: 'local-terminal',
                    event: event || '',
                    message: message || '',
                    detail: detail || {}
                }),
                keepalive: true
            }).catch(function(){});
        } catch(e) {}
    }
    window.addEventListener('error', function(e) {
        clientLog('window-error', e.message || 'error', {
            filename: e.filename || '',
            lineno: e.lineno || 0,
            colno: e.colno || 0,
            stack: e.error && e.error.stack ? String(e.error.stack).slice(0, 2000) : ''
        });
    });
    window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason || {};
        clientLog('unhandled-rejection', String(reason.message || reason || 'rejection'), {
            stack: reason.stack ? String(reason.stack).slice(0, 2000) : ''
        });
    });
    window.addEventListener('beforeunload', function() {
        saveAllLocalSessionHistories(true);
        clientLog('beforeunload', location.href, {activeIdx: activeIdx, focusedPaneId: focusedPaneId});
    });
    window.addEventListener('pagehide', function() {
        saveAllLocalSessionHistories(true);
        clientLog('pagehide', location.href, {activeIdx: activeIdx, focusedPaneId: focusedPaneId});
    });
    document.addEventListener('click', function(e) {
        var target = e.target && e.target.closest ? e.target.closest('#status-bar button,.popup-menu .menu-item,.pane-server-btn,.pane-file-btn,.pane-close,#tab-bar .tab,#tab-bar .add-tab') : null;
        if (!target) return;
        clientLog('ui-click', (target.id || target.className || target.title || target.textContent || '').toString().slice(0, 80), {
            text: (target.textContent || '').trim().slice(0, 80),
            activeIdx: activeIdx,
            focusedPaneId: focusedPaneId
        });
    }, true);
    function findPane(sid) { for (var i=0;i<tabs.length;i++) for (var j=0;j<tabs[i].panes.length;j++) if (tabs[i].panes[j].id===sid) return tabs[i].panes[j]; return null; }
    function getActivePane() { if (activeIdx<0||!tabs[activeIdx]) return null; return tabs[activeIdx].panes.find(function(p){return p.id===focusedPaneId})||tabs[activeIdx].panes[0]; }
    function attachDividerResize(divider, beforePane, afterPane, direction) {
        divider.addEventListener('mousedown', function(e) {
            e.preventDefault();
            divider.classList.add('dragging');
            var beforeRect = beforePane.paneDiv.getBoundingClientRect();
            var afterRect = afterPane.paneDiv.getBoundingClientRect();
            var vertical = direction === 'vertical';
            var start = vertical ? e.clientX : e.clientY;
            var beforeSize = vertical ? beforeRect.width : beforeRect.height;
            var afterSize = vertical ? afterRect.width : afterRect.height;
            var total = Math.max(1, beforeSize + afterSize);
            function onMove(e2) {
                var pos = vertical ? e2.clientX : e2.clientY;
                var beforePct = ((beforeSize + (pos - start)) / total) * 100;
                beforePct = Math.max(10, Math.min(90, beforePct));
                beforePane.paneDiv.style.flex = '0 0 calc(' + beforePct + '% - 2px)';
                afterPane.paneDiv.style.flex = '0 0 calc(' + (100 - beforePct) + '% - 2px)';
                fitAndSyncPane(beforePane);
                fitAndSyncPane(afterPane);
            }
            function onUp() {
                divider.classList.remove('dragging');
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
            }
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        }, true);
    }
    function rebuildPaneLayout(tab) {
        var container = tab.container;
        var panes = tab.panes || [];
        var direction = tab.splitDirection || 'vertical';
        var fragment = document.createDocumentFragment();
        panes.forEach(function(p, idx) {
            if (idx > 0) {
                var div = document.createElement('div');
                div.className = direction === 'vertical' ? 'pane-divider pane-divider-h' : 'pane-divider pane-divider-v';
                attachDividerResize(div, panes[idx - 1], p, direction);
                fragment.appendChild(div);
            }
            p.paneDiv.style.cssText = 'flex:1;position:relative;min-width:0;min-height:0;padding:2px;';
            fragment.appendChild(p.paneDiv);
        });
        container.innerHTML = '';
        container.appendChild(fragment);
        container.style.display = '';
        container.style.flexDirection = panes.length > 1 ? (direction === 'vertical' ? 'row' : 'column') : '';
    }

    // ===== Clipboard =====
    function getWailsRuntime() {
        if (window.runtime) return window.runtime;
        try {
            return window.parent && window.parent !== window ? window.parent.runtime : null;
        } catch(e) {
            return null;
        }
    }
    function copyToClipboard(text) {
        if (navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(showCopyOk).catch(function(){
            var rt=getWailsRuntime();
            if(rt&&rt.ClipboardSetText)rt.ClipboardSetText(text).then(showCopyOk).catch(function(){fallbackCopy(text);});
            else fallbackCopy(text);
        });
        else {
            var rt=getWailsRuntime();
            if(rt&&rt.ClipboardSetText)rt.ClipboardSetText(text).then(showCopyOk).catch(function(){fallbackCopy(text);});
            else fallbackCopy(text);
        }
    }

    function normalizeServerList(data) {
        var list = data && (data.servers || data.data || data) || [];
        return Array.isArray(list) ? list.filter(function(s){ return s && s.id && (s.os_type || 'linux') !== 'windows'; }) : [];
    }
    function loadServers(force) {
        if (!force && servers.length) return Promise.resolve(servers);
        return fetch('/api/servers?_t=' + Date.now(), {headers:{'Authorization':'Bearer '+token,'Cache-Control':'no-cache'}})
            .then(function(r){return r.json();})
            .then(function(data){
                servers = normalizeServerList(data);
                servers.forEach(function(server){ var g=server.group||'未分组'; if(serverGroupsExpanded[g] === undefined) serverGroupsExpanded[g]=true; });
                renderServerTree();
                return servers;
            })
            .catch(function(){ serverTree.innerHTML='<div class="menu-item" style="color:#f87171;">服务器加载失败</div>'; return []; });

    function groupServers(list) {
        return list.reduce(function(groups, server) {
            var group = server.group || '未分组';
            if (!groups[group]) groups[group] = [];
            groups[group].push(server);
            return groups;
        }, {});
    }
    function serverMatches(server, query) {
        if (!query) return true;
        query = query.toLowerCase();
        return [server.name, server.ip, server.username, server.group].some(function(value) {
            return String(value || '').toLowerCase().indexOf(query) >= 0;
        });
    }
    function renderServerItems(parent, list, targetPane) {

            item.innerHTML='<span class="server-dot"></span><span class="server-name"></span><span class="server-host"></span>';
            item.querySelector('.server-name').textContent=server.name || server.ip;
            item.querySelector('.server-host').textContent=server.ip || '';
            item.onclick=function(){ connectServerToPane(server.id, targetPane || getActivePane()); hideServerPickerMenu(); };
            parent.appendChild(item);
        });

    function renderServerTree() {
        if (!serverTree) return;

        var filtered=servers.filter(function(server){return serverMatches(server,query);});

        serverTree.innerHTML='';

            var section=document.createElement('div');
            section.className='server-group';

            header.textContent=(serverGroupsExpanded[group]?'▾ ':'▸ ')+group+' ('+grouped[group].length+')';
            header.onclick=function(){serverGroupsExpanded[group]=!serverGroupsExpanded[group];renderServerTree();};
            section.appendChild(header);
            if (serverGroupsExpanded[group]) renderServerItems(section, grouped[group], null);

    // ===== Remote Files =====
    var remoteFilePanel=document.getElementById('remote-file-panel');
    var remoteFileTitle=document.getElementById('remote-file-title');
    var remoteFilePath=document.getElementById('remote-file-path');
    var remoteFileList=document.getElementById('remote-file-list');
    var remoteFilePreview=document.getElementById('remote-file-preview');
    var remoteFileUploadInput=document.getElementById('remote-file-upload-input');
    var remoteFileDownloadBtn=document.getElementById('remote-file-download');
    var remoteFilePane=null, remoteFileServer=null, remoteFileCurrentPath='/', remoteSelectedFile=null;
    function closeRemoteFilePanel() {
        remoteFilePanel.classList.remove('open');
        remoteFilePane = null;
        remoteFileServer = null;
    }
    function formatFileSize(size) {
        if (!size && size !== 0) return '';
        if (size < 1024) return size + 'B';
        if (size < 1024 * 1024) return (size / 1024).toFixed(1) + 'K';
        return (size / 1024 / 1024).toFixed(1) + 'M';
    }
    function normalizeRemotePath(path) {
        var parts=String(path||'/').split('/').filter(function(p){return p&&p!=='.';});
        var stack=[];
        parts.forEach(function(p){ if(p==='..')stack.pop(); else stack.push(p); });
        return '/' + stack.join('/');
    }
    function joinRemotePath(base, name) {
        name=String(name||'').split(' -> ')[0];
        return normalizeRemotePath((base==='/'?'/':base+'/') + name);
    }
    function getRemoteFileIcon(file) {
        if (file.is_dir || file.IsDir || file.isDirectory) return '📁';
        var name=String(file.name||'').toLowerCase();
        if (/\.(log|txt|md|json|ya?ml|xml|conf|ini|sh|py|js|ts|go|sql)$/.test(name)) return '📄';
        if (/\.(zip|tar|gz|rar|7z)$/.test(name)) return '📦';
        return '📄';
    }
    function openRemoteFilePanel(pane) {
        pane = pane || getActivePane();
        if (!pane || !pane.server) { showStatusNotice('请先连接服务器'); return; }
        if (remoteFilePanel.classList.contains('open') && remoteFilePane && remoteFilePane.id === pane.id) {
            closeRemoteFilePanel();
            return;
        }
        remoteFilePane = pane;
        remoteFileServer = pane.server;
        remoteFileCurrentPath = pane.remoteFilePath || '/';
        remoteFilePanel.classList.add('open');
        loadRemoteFiles(remoteFileCurrentPath);
    }
    function loadRemoteFiles(path) {
        if (!remoteFileServer) return;
        remoteFileCurrentPath = normalizeRemotePath(path || '/');
        if (remoteFilePane) remoteFilePane.remoteFilePath = remoteFileCurrentPath;
        remoteFileTitle.textContent='文件管理 - ' + (remoteFileServer.name || remoteFileServer.ip || remoteFileServer.id);
        remoteFilePath.value=remoteFileCurrentPath;
        remoteFilePreview.style.display='none';
        remoteFilePreview.textContent='';
        remoteSelectedFile=null;
        updateRemoteFileActions();
        remoteFileList.innerHTML='<div class="menu-item" style="color:#888;">加载中...</div>';
        fetch('/api/files/' + encodeURIComponent(remoteFileServer.id) + '?path=' + encodeURIComponent(remoteFileCurrentPath), {headers:{'Authorization':'Bearer '+token}})
            .then(function(r){return r.json().then(function(data){return {ok:r.ok,data:data};});})
            .then(function(res){
                if(!res.ok) throw new Error(res.data&&res.data.error||'加载失败');
                renderRemoteFiles((res.data.files||[]).filter(function(f){return f.name!=='.'&&f.name!=='..';}));
            })
            .catch(function(err){remoteFileList.innerHTML='<div class="menu-item" style="color:#f87171;">'+err.message+'</div>';});
    }
    function renderRemoteFiles(files) {
        remoteFileList.innerHTML='';
        if(!files.length){remoteFileList.innerHTML='<div class="menu-item" style="color:#888;">空目录</div>';return;}
        files.forEach(function(file){
            var item=document.createElement('div');
            item.className='remote-file-item';
            item.dataset.filePath=file.path || joinRemotePath(remoteFileCurrentPath,file.name);
            item.dataset.fileName=file.name || '';
            item.dataset.fileDir=(file.is_dir||file.IsDir||file.isDirectory)?'1':'0';
            item.innerHTML='<span></span><span class="remote-file-name"></span><span class="remote-file-size"></span>';
            item.children[0].textContent=getRemoteFileIcon(file);
            item.querySelector('.remote-file-name').textContent=file.name;
            item.querySelector('.remote-file-size').textContent=(file.is_dir||file.IsDir||file.isDirectory)?'':formatFileSize(file.size);
            item.onclick=function(){
                remoteFileList.querySelectorAll('.remote-file-item').forEach(function(el){el.classList.remove('active');});
                item.classList.add('active');
                remoteSelectedFile={path:item.dataset.filePath,name:item.dataset.fileName,isDir:item.dataset.fileDir==='1'};
                updateRemoteFileActions();
            };
            item.ondblclick=function(){
                if(file.is_dir||file.IsDir||file.isDirectory) loadRemoteFiles(item.dataset.filePath);
                else previewRemoteFile(item.dataset.filePath);
            };
            remoteFileList.appendChild(item);
        });
    }
    function previewRemoteFile(path) {
        if(!remoteFileServer) return;
        fetch('/api/files/' + encodeURIComponent(remoteFileServer.id) + '/read?path=' + encodeURIComponent(path), {headers:{'Authorization':'Bearer '+token}})
            .then(function(r){return r.json().then(function(data){return {ok:r.ok,data:data};});})
            .then(function(res){
                if(!res.ok) throw new Error(res.data&&res.data.error||'读取失败');
                remoteFilePreview.style.display='block';
                remoteFilePreview.textContent=res.data.content || '';
            })
            .catch(function(err){showStatusNotice(err.message);});
    }
    function updateRemoteFileActions() {
        if (!remoteFileDownloadBtn) return;
        remoteFileDownloadBtn.disabled = !remoteSelectedFile || remoteSelectedFile.isDir;
    }
    function downloadSelectedRemoteFile() {
        if (!remoteFileServer || !remoteSelectedFile || remoteSelectedFile.isDir) { showStatusNotice('请选择要下载的文件'); return; }
        var a=document.createElement('a');
        a.href='/api/files/' + encodeURIComponent(remoteFileServer.id) + '/download?path=' + encodeURIComponent(remoteSelectedFile.path);
        a.download=remoteSelectedFile.name || remoteSelectedFile.path.split('/').pop() || 'download';
        document.body.appendChild(a);
        a.click();
        a.remove();
    }
    function uploadRemoteFiles(fileList) {
        if (!remoteFileServer) { showStatusNotice('请先连接服务器'); return; }
        var files=Array.prototype.slice.call(fileList||[]);
        if (!files.length) return;
        var done=0;
        var failed=false;
        files.forEach(function(file){
            var form=new FormData();
            var targetPath=joinRemotePath(remoteFileCurrentPath,file.name);
            form.append('file',file);
            form.append('path',targetPath);
            fetch('/api/files/' + encodeURIComponent(remoteFileServer.id) + '/upload', {
                method:'POST',
                headers:{'Authorization':'Bearer '+token},
                body:form
            }).then(function(r){return r.json().then(function(data){return {ok:r.ok,data:data};});})
              .then(function(res){if(!res.ok) throw new Error(res.data&&res.data.error||'上传失败');})
              .catch(function(err){failed=true;showStatusNotice(err.message);})
              .then(function(){
                  done++;
                  if(done===files.length){if(!failed)showStatusNotice('上传完成');loadRemoteFiles(remoteFileCurrentPath);}
              });
        });
    }
    document.getElementById('remote-file-close').onclick=closeRemoteFilePanel;
    document.getElementById('remote-file-refresh').onclick=function(){loadRemoteFiles(remoteFileCurrentPath);};
    document.getElementById('remote-file-upload').onclick=function(){remoteFileUploadInput.click();};

    // ===== File Browser =====
    var fileMenu = document.getElementById('file-menu');
    var RECENT_DIRS_KEY = 'terminal-recent-dirs';
    function normalizeRecentDir(path) {
        return (path || '').replace(/\\/g, '/').replace(/\/+$/, '');
    }
    function getRecentDirs() {
        try {
            var dirs = JSON.parse(localStorage.getItem(RECENT_DIRS_KEY) || '[]');
            return Array.isArray(dirs) ? dirs.filter(Boolean).slice(0, 8) : [];
        } catch(e) { return []; }
    }
    function addRecentDir(path) {
        var normalized = normalizeRecentDir(path);
        if (!normalized) return;
        var dirs = getRecentDirs().filter(function(item) { return normalizeRecentDir(item).toLowerCase() !== normalized.toLowerCase(); });
        dirs.unshift(normalized);
        if (dirs.length > 8) dirs.length = 8;
        localStorage.setItem(RECENT_DIRS_KEY, JSON.stringify(dirs));
    }
    function appendRecentDirs(currentPath) {
        var dirs = getRecentDirs().filter(function(dir) {
            return normalizeRecentDir(dir).toLowerCase() !== normalizeRecentDir(currentPath).toLowerCase();
        });
        if (dirs.length === 0) return;
        var section = document.createElement('div');
        section.className = 'menu-header';
        section.style.cssText = 'border-top:1px solid #444;margin-top:4px;padding-top:8px;color:#93c5fd;';
        section.textContent = '⭐ 常用目录';
        fileMenu.appendChild(section);
        dirs.forEach(function(dir) {
            var item = document.createElement('div');
            item.className = 'menu-item dir';
            item.dataset.recentDir = dir;
            item.textContent = '📌 ' + dir;
            item.onclick = function() { addRecentDir(dir); loadFileBrowser(dir); };
            fileMenu.appendChild(item);
        });
    }
    document.getElementById('file-btn').addEventListener('click', openContextFileTool);
    function loadFileBrowser(path) {
        var url = '/api/local-terminal/list-dirs' + (path ? '?path='+encodeURIComponent(path) : '');
        fetch(url, {headers:{'Authorization':'Bearer '+token}}).then(function(r){return r.json();}).then(function(data) {
            fileMenu.innerHTML = '';
            var header = document.createElement('div'); header.className='menu-header'; header.textContent='📂 '+(data.path||'');
            fileMenu.appendChild(header);
            appendRecentDirs(data.path || '');
            (data.dirs||[]).forEach(function(d) {
                var item = document.createElement('div');
                item.className = 'menu-item' + (d.isDir ? ' dir' : '');
                if (d.isDir) item.dataset.dirPath = d.path;
                item.textContent = (d.isDir ? '📁 ' : '📄 ') + d.name;
                item.onclick = function() { if (d.isDir) { addRecentDir(d.path); loadFileBrowser(d.path); } };
                fileMenu.appendChild(item);

            var ids=(data.sessions||[]).map(function(s){return s.id;});var toR=saved.filter(function(s){return s.sessionId&&ids.indexOf(s.sessionId)>=0;});
            if(toR.length===0){newTab();return;}var done=0;
            toR.forEach(function(s,i){var c=document.createElement('div');c.className='pane-container';c.id='tab-'+Date.now()+'-'+i;termArea.appendChild(c);reconnectSession(c,s.sessionId,s.title,function(pane){tabs[i]={id:c.id,title:s.title,container:c,panes:[pane],activePaneIdx:0};done++;if(done===toR.length)switchTab(0);});});
        }).catch(function(){newTab();});}catch(e){newTab();}
    }
    function reconnectSession(container,sessionId,title,onComplete){
        var paneDiv=document.createElement('div');paneDiv.className='pane-item focused';paneDiv.id='pane-'+sessionId;
        paneDiv.style.cssText='flex:1;position:relative;min-width:0;min-height:0;padding:2px;';
        var closeBtn=document.createElement('button');closeBtn.className='pane-close';closeBtn.textContent='✕';
        closeBtn.onclick=function(e){e.stopPropagation();closePaneById(sessionId);};
        var serverBtn=document.createElement('button');serverBtn.className='pane-server-btn';serverBtn.textContent='服务器';serverBtn.title='选择服务器';
        serverBtn.onclick=function(e){showServerPickerMenu(e, findPane(sessionId));};
        var fileBtn=document.createElement('button');fileBtn.className='pane-file-btn';fileBtn.textContent='文件';fileBtn.title='文件管理';
        fileBtn.onclick=function(e){e.stopPropagation();openRemoteFilePanel(findPane(sessionId));};
        paneDiv.appendChild(serverBtn);paneDiv.appendChild(fileBtn);paneDiv.appendChild(closeBtn);container.appendChild(paneDiv);
        var term=new Terminal(Object.assign({cursorBlink:true,cursorStyle:'bar',theme:getTheme(),scrollback:5000,allowProposedApi:true,windowsMode:true}, getTerminalFontOptions()));
        var fitAddon=new FitAddon.FitAddon();term.loadAddon(fitAddon);
        var searchAddon=new SearchAddon.SearchAddon();term.loadAddon(searchAddon);
        term.open(paneDiv);installShiftSelectionReset(term);installTerminalWheelSupport(term,paneDiv);
        var wsUrl=_wsBase+_wsPath+sessionId;if(_wsPath.indexOf('/api/')===0)wsUrl+='?token='+token;
        var shellName='',ws=new WebSocket(wsUrl);
        installTerminalShortcuts(term, ws);
        ws.onopen=function(){fitAndSyncTerminal(fitAddon,term,ws);term.focus();focusedPaneId=sessionId;};
        paneDiv.addEventListener('contextmenu',function(e){handleTerminalContextMenu(e, term, ws);});
        paneDiv.addEventListener('mouseup',function(e){scheduleSendSelectionMenu(term,e);});
        term.parser.registerOscHandler(7,function(d){var p=d.replace(/^file:\/\/[^\/]*/,'');if(p){sessionCwds[sessionId]=p;}});
        ws.onclose=function(){saveLocalSessionHistory(findPane(sessionId), false);term.writeln('\r\n\x1b[31m连接已断开\x1b[0m');};
        ws.onmessage=function(e){if(typeof e.data==='string'){try{var msg=JSON.parse(e.data);if(msg.type==='meta'){shellName=msg.shell||shellName;if(focusedPaneId===sessionId)stShell.textContent=shellName||'-';return;}}catch(ex){}term.write(e.data);appendPaneOutput(sessionId,e.data);return;}if(e.data instanceof Blob){var r=new FileReader();r.onload=function(){term.write(r.result);appendPaneOutput(sessionId,r.result);};r.readAsText(e.data);return;}var decoded=new TextDecoder().decode(e.data);term.write(decoded);appendPaneOutput(sessionId,decoded);};
        inputBuffers[sessionId]='';
        term.onData(function(data){if(ws&&ws.readyState===1)ws.send(data);if(focusedPaneId===sessionId){var b=term.buffer.active;stCursor.textContent=(b.cursorY+1)+':'+(b.cursorX+1);}recordTerminalInput(sessionId,data);});
        term.onResize(function(size){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'resize',cols:size.cols,rows:size.rows}));if(focusedPaneId===sessionId)stSize.textContent=size.cols+'×'+size.rows;});
        setTimeout(function(){fitAndSyncTerminal(fitAddon,term,ws);},50);
        paneDiv.addEventListener('mousedown',function(){focusedPaneId=sessionId;container.querySelectorAll('.pane-item').forEach(function(p){p.classList.remove('focused')});paneDiv.classList.add('focused');term.focus();var fp=findPane(sessionId);if(fp)updateStatus(fp);});
        if(onComplete)onComplete({id:sessionId,term:term,ws:ws,fitAddon:fitAddon,searchAddon:searchAddon,paneDiv:paneDiv,shellName:shellName,server:null,serverButton:serverBtn,fileButton:fileBtn,sessionStartTime:new Date().toISOString(),logSaved:false});
    }

    // ===== New Tab =====
    function newTab(opts){
        opts = opts || {};
        var container=document.createElement('div');container.className='pane-container';container.id='tab-'+Date.now();
        termArea.appendChild(container);
        var title = opts.agentName || nextTerminalTitle();
        createTerminalSession(container,function(pane){tabs.push({id:container.id,title:title,container:container,panes:[pane],activePaneIdx:0});if(opts.server)applyServerToPane(pane,opts.server);switchTab(tabs.length-1);},opts);
    }
    function newTabWithPath(path){newTab();setTimeout(function(){var p=getActivePane();if(p&&p.ws&&p.ws.readyState===1)p.ws.send('cd "'+path.replace(/\\/g,'/')+'"\r');},1000);}
    function quoteSshArg(value){
        value = String(value || '');
        if (/^[A-Za-z0-9._@:%+-]+$/.test(value)) return value;
        return "'" + value.replace(/'/g, "''") + "'";
    }
    function sshTarget(server){
        var host = server.ip || server.host || '';
        var user = server.username || server.jump_user || '';
        var target = user ? user + '@' + host : host;
        if (server.port && Number(server.port) !== 22) target += ':' + Number(server.port);
        return target;
    }
    function getSshJumpChain(server) {
        var chain = Array.isArray(server.jump_chain) ? server.jump_chain.slice() : [];
        if (!chain.length && server.jump_enabled && server.jump_ip) {
            chain.push({
                ip: server.jump_ip,
                port: server.jump_port || 22,
                username: server.jump_user || server.username || '',
                password: server.jump_password || '',
                ssh_key: server.jump_key || ''
            });
        }
        return chain;
    }
    function getSshPasswordQueue(server) {
        return getSshJumpChain(server).map(function(j){return j.password || j.jump_password || '';}).concat([server.password || '']).filter(function(p){return !!p;});
    }
    function buildSshCommand(server){
        var host = server.ip || server.host || '';
        var user = server.username || '';
        var target = user ? user + '@' + host : host;
        var cmd = 'ssh -o StrictHostKeyChecking=accept-new';
        var chain = getSshJumpChain(server);
        if (chain.length) cmd += ' -J ' + quoteSshArg(chain.map(sshTarget).join(','));
        if (server.port && Number(server.port) !== 22) cmd += ' -p ' + Number(server.port);
        cmd += ' ' + quoteSshArg(target);
        return cmd;
    }
    function startServerTerminalById(serverId, title){
        title = title || '服务器终端';
        fetch('/api/servers/' + encodeURIComponent(serverId) + '/full', {headers:{'Authorization':'Bearer '+token}})
            .then(function(r){return r.json();})
            .then(function(server){
                if(!server || server.error){throw new Error((server&&server.error)||'无法读取服务器配置');}
                newTab({
                    agentName: server.name || title,
                    startupCommand: buildSshCommand(server),
                    autoPasswords: getSshPasswordQueue(server),
                    server: server
                });
            })
            .catch(function(err){
                alert('打开服务器终端失败: ' + err.message);
                newTab({agentName:title});
            });
    }
    function startServerTerminal(){
        startServerTerminalById(startupServerId, startupTitle || '服务器终端');
    }
    window.addEventListener('message', function(e) {
        var data = e && e.data;
        if (!data || data.type !== 'open-server-terminal' || !data.serverId) return;
        startServerTerminalById(data.serverId, data.title || '服务器终端');
    });

    // ===== Init =====
    if(startupServerId) startServerTerminal();
    else restoreSessions();
})();
</script>
