<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 部署管理系统</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <style>
body { font-size: 10px; }
.dark .dark\:bg-gray-800 { background-color: #1f2937; }
.dark .dark\:bg-gray-900 { background-color: #111827; }
.dark .dark\:bg-gray-700 { background-color: #374151; }
.dark .dark\:bg-gray-600 { background-color: #4b5563; }
.dark .dark\:bg-blue-500 { background-color: #3b82f6; }
.dark .dark\:bg-blue-900 { background-color: #1e3a5f; }
.dark .dark\:bg-green-500 { background-color: #22c55e; }
.dark .dark\:bg-green-900 { background-color: #14532d; }
.dark .dark\:bg-purple-500 { background-color: #a855f7; }
.dark .dark\:bg-purple-900 { background-color: #3b0764; }
.dark .dark\:bg-red-500 { background-color: #ef4444; }
.dark .dark\:bg-red-900 { background-color: #7f1d1d; }
.dark .dark\:bg-yellow-900 { background-color: #713f12; }
.dark .dark\:text-white { color: #fff; }
.dark .dark\:text-gray-300 { color: #d1d5db; }
.dark .dark\:text-gray-400 { color: #9ca3af; }
.dark .dark\:text-blue-200 { color: #bfdbfe; }
.dark .dark\:text-blue-400 { color: #60a5fa; }
.dark .dark\:text-green-200 { color: #bbf7d0; }
.dark .dark\:text-green-400 { color: #4ade80; }
.dark .dark\:text-purple-200 { color: #e9d5ff; }
.dark .dark\:text-red-200 { color: #fecaca; }
.dark .dark\:text-red-400 { color: #f87171; }
.dark .dark\:text-yellow-200 { color: #fef08a; }
.dark .dark\:border-gray-600 { border-color: #4b5563; }
.dark .dark\:border-gray-700 { border-color: #374151; }
.dark .dark\:divide-gray-700 > * + * { border-color: #374151; }
.dark .dark\:hover\:bg-gray-600:hover { background-color: #4b5563; }
.dark .dark\:hover\:bg-gray-700:hover { background-color: #374151; }
.dark .dark\:hover\:text-gray-200:hover { color: #e5e7eb; }
.dark .dark\:hover\:text-gray-300:hover { color: #d1d5db; }
.dark .dark\:hover\:text-white:hover { color: #fff; }
</style>
    <script>
(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})()
function toggleTheme(){var d=document.documentElement;if(d.classList.contains('dark')){d.classList.remove('dark');localStorage.setItem('theme','light')}else{d.classList.add('dark');localStorage.setItem('theme','dark')}}
</script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

<script>
window.addEventListener('beforeunload',function(){localStorage.removeItem('access_token');localStorage.removeItem('user');});
</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex items-center justify-center text-sm">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded p-8">
            <div class="text-center mb-8">
                <h1 class="text-lg font-bold text-gray-900 dark:text-white">部署管理系统</h1>
                <p class="text-gray-600 dark:text-gray-400 mt-2">登录到您的账户</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        用户名
                    </label>
                    <input type="text" id="username" required
                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white"
                        placeholder="请输入用户名">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        密码
                    </label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white"
                        placeholder="请输入密码">
                </div>

                <div id="errorMsg" class="hidden text-red-600 dark:text-red-400 text-sm"></div>

                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition duration-200">
                    登录
                </button>
            </form>
        </div>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('access_token') || new URLSearchParams(window.location.search).get('token');
        if (token) {
            window.location.href = '/';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');

            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.error || '登录失败';
                    errorMsg.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登录';
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请重试';
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
